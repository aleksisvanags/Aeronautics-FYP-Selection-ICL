troller and its performance with respect to fully traditional methods."}, {"id": "GP02", "title": "Flow and Parameter Estimation from Sparse Data", "supervisor": "Papadakis, George Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Theoretical"], "skills": ["OpenFOAM"], "description": "Data Assimilation techniques allow the incorporation of sparse measurement data into a computational model in order to extract velocity or pressure in the whole domain. It is also possible to extract unknown parameters, such as the approaching velocity. For example, we can predict the flow around an aerofoil using only pressure and shear stress measurements at the surface of the aerofoil, without any other information, such as the approaching velocity or the angle of attack. In this project, we will extend and apply an algorithm recently developed by the supervisor to find the lift and drag coefficients using only surface data on the aerofoil. A critical question is the optimal sensor location, are there locations that are better than others? Which variable provides more information, pressure or shear stress? There are numerous applications in many other fields, such an environmental flows, cardiovascular flows etc."}, {"id": "GP03", "title": "Foundational Models in Fluid Dynamics", "supervisor": "Papadakis, George Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Theoretical"], "skills": ["OpenFOAM"], "description": "The central objective of the project is to explore foundational models in fuid dynamics. More specifically we aim to predict an unsteady flow without performing a simulation, only using prior training data. We will apply the idea to the unsteady flow in a bifurcation. Simulations will be performed for different bifurcation angles to build a database, and the flow in another angle will be predicted using only information from the database. The key challenge is the geometric change of the new bifurcation with respect to the members of the database and how this can be handled. There are numerous applications of this technology in all areas of aerospace and beyond, for example bioengineering flows, environmental flows etc."}, {"id": "GP04", "title": "Flow Super-Resolution from under-Resolved Data", "supervisor": "Papadakis, George Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Theoretical"], "skills": ["OpenFOAM", "PIV"], "description": "The idea of the project is the super-resolution of a flow using under-resolved data. For example, experimental PIV data resolve the flow at limited resolution, can we couple the PIV data with the governing equations to resolve the flow at scales not seen by the PIV? The supervisor believes that the answer is YES! We will apply an algorithm proposed recently by the supervisor to real PIV data to extract features not seen in the data. There are numerous applications of the algorithm to denoise experiments and extract information that cannot be obtained from the equations or the experiments alone. It is only through the combination of these two methods that we can get very rich information about the flow."}, {"id": "GP05", "title": "Forecasting of 3D Flows Using Sparse Data", "supervisor": "Papadakis, George Prof", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": ["MATLAB", "OpenFOAM"], "description": "Forecasting the future evolution of a dynamical system from present data has received considerable attention in meteorology but not in fluid dynamics. The ability to estimate the future state of a flow from current data has many applications, examples include urban safety (prediction of toxic pollutant trajectory than can guide evacuation measures), prediction of extreme events (such as heat waves) ahead of time etc. The central aim of the project is the forecasting of turbulent flows using a methodology that was developed recently by the supervisor. The methodology will be employed to flow problems that exhibit strong rare events that in practise can cause severe damage. Can we predict the occurrence of these events before they occur? What is the lead time? What is the probability to predict correctly the event at a given future time? These are crucial questions that will be considered during the project."}, {"id": "GP06", "title": "Turbulence Modelling from DNS Data", "supervisor": "Papadakis, George Prof", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": ["DNS", "MATLAB", "Turbulence"], "description": "The objective of this project is to extract a turbulence model from DNS data. In particular the project will focus on extracting an eddy viscosity model that accounts for non-local effects. Current approaches are very time consuming, and in the project a new approach will be trialled. The new idea will be applied to the flow between parallel flat plates (channel flow) where reference data exist. Extraction of a turbulence model from DNS data has many applications. The non-locality of the model also allows the extraction of new physical information, that can be exploited for the synthesis of new control and estimation strategies."}, {"id": "JP01", "title": "Simulation of Air Flow and Heat Transfer in Networks of Tunnels", "supervisor": "Peiro, Joaquim Prof", "space": false, "bothTerms": false, "categories": ["Computational", "Design", "Theoretical"], "skills": ["C++", "CFD", "Fortran", "MATLAB", "Python", "Star-CCM+"], "description": "Passenger comfort and safety are the main concerns in the design of tunnels. A train travelling at high speed through a tunnel generates a pressure wave that might cause discomfort to the passengers. Similarly, the transit of trains in a network of tunnels generates heat that affects the temperature environment. These are a few of the projects proposed under this theme:\n1. Aerodynamic interaction of a train entering a tunnel: A 1D code for the modelling of pressure waves in tunnels will be used to select the optimal tunnel section so that the increase in pressure does not go beyond the threshold of discomfort.\n2. Analysis and design of a tunnel ventilation system in the event of a fire. Fires increase the resistance to air flow due temperature increases which also lead to significant bouyancy efects for large fires. The CFD code STARCCM+ will be used to model this \"throttling\" effect of the fire and flow stratification due to heat-induced buoyancy.\n3. Long term evolution of the temperature in an underground network: To ensure that the fluctuations of temperature within the network are within acceptable limits for passenger comfort. The major challenge is the slow release of heat through the tunnel walls that often requires to model temperature fluctuations over several years.\n4. Modeling of tunnel boom cause by micro-pressures waves generated by the entry in the tunnel of trains traveling at high speeds (above 300 km/h). The sound produced at the exit of the tunnel is a function of the pressure history. This will be calculated by the 1D code and the results processed using a suitable model of sound generation from pressure fluctuations.\n5. CFD modelling of the pressure wave generated by the entry of a train in a tunnel using StarCCM+. For short tunnels three-dimensional effects are important and the one-dimensional approximation is no longer accurate. This project will compare CFD simulations with those of the 1D and experimental. These comparisons will be used to validate the CFD simulation and investigate the range of validity of of the one-dimensional approach."}, {"id": "JP02", "title": "Simulation of Flow in Physiological Networks", "supervisor": "Peiro, Joaquim Prof", "space": false, "bothTerms": false, "categories": ["Computational", "Literature", "Numerical"], "skills": ["C++", "Fortran", "MATLAB", "Python"], "description": "Arterial, venous, lymphatic and respiratory networks are made up of millions of vessels so 3-D flow simulations are just not feasible. Reduced 1-D models of such physiological systems based on the area-averaged governing equations provide a computationally affordable and reasonably accurate simulation capability to study the flow in networks of vessels. These are a few of the projects proposed under this theme:\n1. A 1-D model of the venous system: To adapt an existing 1-D solver for the arterial system to the venous system. This will require investigating suitable constitutive laws to represent the elastic behaviour of veins and the effect of their valves and implement these by means of an appropriate pressure-area relation in the existing solver.\n2. A 1-D model of the respiratory network: To adapt an existing 1-D solver for the arterial system to the respiratory system. This will require devising suitable constitutive pressure-area relations to represent the distensibility of the airways and implement these in the existing solver.\n3. Modelling auto-regulation in the arterial system: To investigate the mechanisms of regulation of blow flow in the arterial system when it is subject to external actions such as, for instance, changes in temperature, pressure or posture. To devise suitable models and to implement them in an existing 1-D solver for the arterial system.\n4. A 1-D model of the lymphatic system: To devise a set governing equations to model of the lymphatic system that connects tissues to the bloodstream. The model of the collecting lymphatic vessels will consist of lymphangions, deformable vessels which contract and propel lymph, enclosed between valves which promote unidirectional flow. To develop a numerical method of solution of the set of differential equations."}, {"id": "JP03", "title": "Uncertainty Quantification in Simulation", "supervisor": "Peiro, Joaquim Prof", "space": true, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["MATLAB", "Python"], "description": "There many sources of uncertainty in modelling any type of physical phenomena: operational, geometric, and model inadequacy. We will look at a number of methods to investigate the effect of operational and geometrical uncertainty:\n1. Markov Chain and Multi-level Monte Carlo;\n2. Intrusive polynomial chaos;\n3. Non-intrusive polynomial chaos;\n4. Surrogate models.\nThese can be used in a to compute probabilistic expectations in a number of application areas such as aerofoil performance, financial modelling, vehicle trajectories, epidemic modelling, and predictive microbiology, to name but a few."}, {"id": "JP04", "title": "Aerodynamic Modelling and Simulation of Flapping Flight", "supervisor": "Peiro, Joaquim Prof", "space": false, "bothTerms": true, "categories": ["Computational"], "skills": ["Aerodynamics", "C++", "CFD", "MATLAB", "Python", "Star-CCM+"], "description": "The outstanding performance of animal flapping flight at low Reynolds numbers has sparked an interest in the design, development and deployment of bio-inspired flapping-wing micro-air vehicles. However, the aerodynamic characteristics of flapping flight are significantly different from those of conventional-flight vehicles due to their unsteady nature and low Reynolds number. This project will investigate the aerodynamics of flapping flight, and analyse and implement computer models for the simulation of aerodynamic forces and, possibly flow control, with a range of fidelities: from reduced models to, more complex, CFD models. The ultimate aim is the rapid prediction of aerodynamic performance in preliminary design, control, and optimization of flapping-wing micro-air vehicles."}, {"id": "SP01", "title": "Structural Simulation of a Hydrogen-Powered Aircraft Dry-Wing", "supervisor": "Pinho, Silvestre Prof", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Design"], "skills": ["Abaqus", "CAD"], "description": "Hydrogen is the most promising technology to allow aviation to meet NetZero by 2050. Airbus carried out an extensive programme (ZEROe) where they proposed three aircraft concepts that could meet NetZero requirement for different market segments. Two of these solutions include dry-wing solutions. In the UK, the Aerospace Technology Institute recently concluded another project (FlyZero) with similar aims where they proposed three new concepts, all of which including dry-wings. In dry-wing solutions, the fuel is not carried inside the wings, and these can therefore be thinner. A thinner, more highly loaded wing is not only harder to size for strength \u2014 it is also less forgiving of impact damage, and the bird-strike and damage-tolerance requirements set out in CS-25 are not relaxed simply because the fuel has changed.\nIn this project, you will start by reviewing the outcome of the FlyZero project and a previous FYP in which the CAD and FEM model of a dry wing for one of the FlyZero concepts was developed. You will then use that model to assess the damage tolerance of the design against the relevant CS-25 requirements: running quasi-static load cases up to ultimate failure, simulating bird-strike events using explicit dynamics, and evaluating the residual strength of the structure after damage. The objective is not simply to determine when the wing breaks, but to understand how and why, and what that implies for the design of the next generation of hydrogen-powered aircraft."}, {"id": "SP02", "title": "Physics-Informed AI and Bayesian Optimisation", "supervisor": "Pinho, Silvestre Prof", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["AI", "Abaqus", "Composite", "TensorFlow"], "description": "Currently, material models for advanced composite materials used in aircraft structures are based on sophisticated analytical idealisations of the material at very small scales. This physical basis gives engineers some confidence that their structural designs will be sound. However, then manufactured at large scales, materials are often different to those manufactured at small scales. There is therefore a need for developing material models from information arising at larger scales.\nDigital Image Correlation allows us to obtain the stain field for a large component being tested, including during failure, all while measuring the external work done by the applied forced.\nIn this project, you will design, train and test a physics-informed AI model to extract the constitutive response (including during damage growth) from the strain field and external work in one or more simple components. Rather than use experimental strain data (which would be the ultimate aim but is more time consuming), you will create FE models of these simple components to generate the training strain data. You will then train your model and iterate the model architecture until your model is able to predict the constitutive response. Once your ML model is built and validated, you will use Bayesian Optimisation to find out the configuration of the FE model (shape, layup, features such as holes, etc) that maximise the predictive capability of the ML model.\nThe outcome of this project will be a proposed architecture for the ML model, as well as the definition of the corresponding experimental test specimens that should be manufactured and tested to apply your model in a real scenario."}, {"id": "SP03", "title": "Bio-Inspired Structures Manufactured by Automated Fibre Placement", "supervisor": "Pinho, Silvestre Prof", "space": false, "bothTerms": false, "categories": ["Experimental"], "skills": ["Composite"], "description": "We recently acquired an AFP machine suitable for manufacturing continuous fibre reinforced composites which provides us with unique manufacturing capabilities extremely relevant for industry.\nAFP can be used to design and automatically manufacture complex CFRP parts that would otherwise be overly labour intensive or even impossible.\nIn this project, you will design, simulate, manufacture (using AFP) and test a bio-inspired structure, such as a skin-stiffener structure."}, {"id": "SP04", "title": "Numerical Simulation of Impact on Critical Aircraft Structures", "supervisor": "Pinho, Silvestre Prof", "space": true, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["Abaqus", "Composite", "Drones"], "description": "The rapid proliferation of uncrewed aerial systems has created a new class of impact threat for which civil aviation has no established certification framework. Bird-strike requirements in CS-25 have been refined over decades and are grounded in a well-characterised impactor: a soft, roughly homogeneous body of known mass. A drone is a fundamentally different projectile (a mix of stiff plastic, metal motors, lithium-ion batteries and carbon-fibre frames) and both experimental and numerical studies, notably the FAA-sponsored ASSURE programme and subsequent EASA work, have shown that drone impacts can be significantly more damaging than bird strikes of equivalent mass. The problem is particularly acute for the next generation of composite-intensive airframes: thin-walled dry wings for hydrogen aircraft, composite hydrogen pressure vessels, and carbon/epoxy fan blades, where the response to localised, hard-body impact is governed by damage mechanisms that conventional failure criteria do not capture.\nIn this project, you will use advanced composite failure models to simulate the impact of projectiles and representative drone components on critical aircraft structures: e.g. a wing leading edge, an H2 tank wall, or an engine fan blade. You will build the explicit dynamics model from geometry to validated output, calibrate the material response against published experimental data, and use the simulations to investigate which impact scenarios cause critical damage and which do not. This project requires a keen interest in modelling and finite elements, and you can expect to finish it with a genuinely deep proficiency in Abaqus/Explicit and in the progressive damage modelling of composite structures under impact."}, {"id": "SP05", "title": "Graph Neural Networks for Strength Prediction", "supervisor": "Pinho, Silvestre Prof", "space": true, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["Abaqus", "Composite", "Finite Element", "Fracture", "Machine Learning", "Neural Networks", "TensorFlow"], "description": "Predicting the strength of open-hole composite laminates remains a standard challenge in aerostructure design. Classical criteria (Whitney\u2013Nuismer, finite fracture mechanics) capture first-order behaviour but do not fully account for the combined effect of stacking sequence, hole size, hole shape, and interactions between multiple holes. Progressive damage finite element models are accurate but too expensive to sweep across the thousands of cases a preliminary design demands, and conventional machine learning surrogates force the laminate and geometry into a flat feature vector that limits generalisation. Graph Neural Networks (GNNs) are a more natural fit: plies and their interfaces form a graph, the finite element mesh is a graph, and holes embed as features on it.\nIn this project, you will build a progressive damage FE model in Abaqus for an open-hole CFRP specimen and generate a dataset of failure loads across stacking sequences, hole sizes, and hole shapes. You will then design, train and iterate a GNN architecture that encodes both the laminate and the specimen geometry, benchmarking predictions against published experimental data (Green, Wisnom and Hallett; Camanho and co-workers). Finally, you will use Bayesian Optimisation to identify the FE configurations that best probe the limits of your model and thus most deserve to be tested experimentally. The outcome will be a proposed GNN architecture for open-hole strength prediction in CFRP laminates, together with a recommended set of physical test specimens for experimental validation."}, {"id": "GQQ01", "title": "Testing 2.0 of High-Performance Materials", "supervisor": "Quino Quispe, Gustavo Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["Abaqus", "Composite", "Dragonfly", "Finite Element", "MATLAB"], "description": "Conventional mechanical testing methods require direct measurement of force and deformation to obtain the material's constitutive response (e.g. stress versus strain). While these methods are reliable, they can be costly and time-consuming. \"Testing 2.0\" represents a new approach to material characterisation, combining computational simulations and non-conventional data-rich tests to achieve a more complete understanding of complex behaviour and properties.\nThis project aims to utilise finite element modelling updating/virtual field method to characterise the mechanical response of high-performance materials. A case of study will be the property identification of high-performance polymers or composites based on full field surface or 3D volumetric measurements. The researcher will utilise both experimental full-field strain data and numerical modelling simulations to develop an optimization framework for characterising constitutive material parameters. The project will involve coding, analysis of experimental data, Digital Image Correlation, and FE software such as Abaqus."}, {"id": "GQQ02", "title": "Degradation/Durability of Advanced Materials", "supervisor": "Quino Quispe, Gustavo Dr", "space": false, "bothTerms": true, "categories": ["Experimental", "Experimental: Structures"], "skills": ["Composite"], "description": "Composite materials are extensively used in various industries due to their numerous advantages, including lightweight, high strength, and corrosion resistance. However, in-service exposure to environmental factors such as heat and humidity can adversely affect the mechanical performance of these materials over time, posing significant challenges in designing safe and durable structures.\nThis project seeks to explore the impact of humidity exposure on the mechanical properties of advanced materials. The experimental approach will involve subjecting the materials to humidity pre-conditioning followed by mechanical testing. The student will utilise specialized testing rigs and employ advanced techniques such as microscopy, image analysis, and digital image correlation to analyse the results."}, {"id": "GQQ03", "title": "Impact Behaviour of Polymers and Polymer Based Composites", "supervisor": "Quino Quispe, Gustavo Dr", "space": false, "bothTerms": true, "categories": ["Experimental: Structures"], "skills": ["Composite"], "description": "Real engineering structures and components may be subjected to dynamic or impact loads, such as hail or bird strikes. In addition, polymers and polymer-based composites are known to be strain rate dependent, meaning their mechanical behaviour can change according to the rate of deformation. In this project, the researcher(s) will investigate how the mechanical behaviour of high-performance materials changes when loads are applied up to one million times faster than in standard quasi-static experiments.\nThis project will involve the design and execution of mechanical impact experiments. Experiments will be conducted using specialised rigs and advanced techniques, including split Hopkinson bar, microscopy, high-speed imaging, and digital image correlation. The findings from this project will contribute to the development of strain rate dependent models for polymers and polymer-based composites."}, {"id": "GQQ04", "title": "Micromechanical Modelling of Advanced Composites", "supervisor": "Quino Quispe, Gustavo Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["Abaqus", "Composite", "FEA", "Finite Element", "MATLAB", "Python"], "description": "The development of new materials, or the improvement of existing ones, often requires extensive manufacturing and testing iterations, which can be both costly and time-consuming. Micromechanical modelling stands as a powerful tool for this, enabling the rapid exploration of how microstructural features, such as constituents, defects, and microarchitecture, affect the expected macroscopic mechanical response of heterogeneous materials.\nThis project will focus on the creation of micromechanical models to investigate the behaviour of composite materials. Implicit or explicit finite element simulations will be performed on unit cells, utilising a semi-automated or fully automated approach. The outcomes of this work will contribute to the development of strain rate-dependent models for polymers and polymer-based composites, thereby supporting and accelerating material development.\nExperience with finite element analysis (FEA) and programming would be advantageous for this project."}, {"id": "MRV01", "title": "Helicopter Rotor Wake/Fuselage Aerodynamic Interaction", "supervisor": "Ribera Vicent, Maria Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational"], "skills": ["Fortran", "MATLAB"], "description": "A free-vortex rotor wake model can improve the aerodynamic modelling of a helicopter and its predictions of the dynamic response using a comprehensive flight dynamics model. The proposed project will follow up on two previous projects studying the aerodynamic model of the UH-60 helicopter using a panel method and modelling the rotor wake with free vortex wake, modified to account for the presence of the fuselage. The combined models will be used to study and validate the performance of the helicopter in low to mid speed flight."}, {"id": "MRV02", "title": "Modelling of a Rotor Wake Distortion Due to the Presence of the Fuselage", "supervisor": "Ribera Vicent, Maria Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational"], "skills": ["Fortran", "MATLAB"], "description": "The aerodynamic environment of a helicopter is very complex, with the main rotor wake interacting with the fuselage, empennage and tail rotor wake. A comprehensive helicopter flight dynamics model is available which has been validated against the UH-60 flight test program. This code includes a time-marching rotor vortex wake model which is capable of capturing the wake dynamics during manoeuvres and allows the wake vortices to distort under their mutual influence. The free wake model, however, does not currently distort due to the presence of the fuselage. The proposed project will investigate approaches to modelling the distortion of the wake filaments and implement the most suitable one into the free wake code. The model will be compared to the current approach (without distortion) and to flight test data for the UH-60 Blackhawk helicopter."}, {"id": "MRV03", "title": "Helicopter Tail Rotor Modelling Effect on the Yaw Performance of a UH-60 Helicopter", "supervisor": "Ribera Vicent, Maria Dr", "space": false, "bothTerms": false, "categories": ["Computational"], "skills": ["Fortran", "MATLAB"], "description": "The aerodynamic environment of a helicopter is very complex, with the main rotor wake interacting with the fuselage, empennage and tail rotor wake. A comprehensive helicopter flight dynamics model is available which has been validated against the UH-60 flight test program. While the flight dynamics model correlates well with the flight test data in general, the tail rotor control is poorly predicted. This project aims to explore the current simplified tail rotor aerodynamic model and propose improvements to augment the yaw performance of the helicopter simulation model."}, {"id": "MRV04", "title": "Exploration and Augmentation of the Downwash Modelling on a Helicopter Flight Dynamics Simulation Model", "supervisor": "Ribera Vicent, Maria Dr", "space": false, "bothTerms": false, "categories": ["Computational"], "skills": ["Fortran", "MATLAB"], "description": "The aerodynamic environment of a helicopter is very complex, with the main rotor wake interacting with the fuselage, empennage and tail rotor. A comprehensive helicopter flight dynamics model is available which has been validated against the UH-60 flight test program. While the flight dynamics model correlates well with the flight test data in general, the pitch attitude and longitudinal control predictions in the low to mid speed range, where the main rotor wake interacts with the fuselage and empennage, could be improved. This project will explore the current simplified implementation of the downwash effects and explore, using any tools necessary, ways to validate and improve the existing downwash model."}, {"id": "MRV05", "title": "Multifidelity Helicopter Blade Design Using NeuralFoil", "supervisor": "Ribera Vicent, Maria Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Design"], "skills": ["Fortran", "MATLAB", "NeuralFoil"], "description": "A comprehensive helicopter flight dynamics code, capable of modelling both steady-state and transient manoeuvres for a range of flight conditions is available as a baseline for this project. The code includes data for the UH-60 helicopter, although much of the data corresponds to the baseline models and there is room to improve the helicopter performance by optimising the blades.\nThe proposed project will perform a parametric design optimisation of the UH60 Blackhawk helicopter blades. It is proposed to use NeuralFoil to explore different aerofoil configurations."}, {"id": "GR01", "title": "Wind Tunnel Exploration of Flapping and Rotating Wing Aerodynamics", "supervisor": "Rigas, Georgios Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Experimental"], "skills": ["Aerodynamics", "LabVIEW", "MATLAB", "RobotStudio", "Wind Tunnel"], "description": "Unlike fixed wings, flapping wings generate lift through a suite of unsteady aerodynamic mechanisms\u2014such as wake capture, delayed stall, and rotational lift\u2014which play a vital role in the flight of birds and insects. These effects, although complex, are key to achieving the agile, efficient flight seen in nature.\nThis experimental project will investigate how these unsteady mechanisms differ between fixed and flapping wing configurations, using a state-of-the-art wind tunnel setup. At its core is a newly acquired ABB IRB-140 six-axis robot arm, which will control the wing\u2019s position and motion in 3D, enabling the execution of complex, bird-inspired trajectories such as the figure-eight path observed in hovering flight. Key aspects of the project include:\n\u2022 Conducting wind tunnel tests to explore the impact of parameters like aspect ratio, Reynolds number, and flapping frequency\n\u2022 Measuring and analyzing lift, drag, and flow instabilities linked to leading-edge vortices and vortex shedding\n\u2022 Programming and operating the industrial robot using RobotStudio\n\u2022 Rapid prototyping of flapping/rotating wing designs This is an exciting opportunity to combine hands-on experimentation, robotics, and fluid mechanics to better understand one of nature\u2019s most effective forms of locomotion.\nStudents with interests in aerodynamics, experimental techniques, or bio-inspired engineering are encouraged to apply. Some experience in any of the following areas\u2014 robotics, wind tunnel testing, or unsteady aerodynamics\u2014will be advantageous."}, {"id": "GR02", "title": "Drag and Flow Instabilities in the Wake of Realistic Car Geometries", "supervisor": "Rigas, Georgios Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Theoretical"], "skills": ["Aerodynamics", "CFD", "Fatigue", "Fluent", "FreeFEM++", "Star-CCM+"], "description": "The unsteady wake behind bluff bodies\u2014such as cars and trucks\u2014is a major contributor to aerodynamic drag, structural fatigue, and noise. These effects arise from hydrodynamic instabilities like vortex shedding, which are often challenging to predict and control in realistic, three-dimensional flows.\nIn this project, you will explore the fundamental mechanisms of these instabilities using advanced computational tools applied to geometries of direct industrial relevance and flow control techniques to improve performance. Building on prior work in simplified settings, we will now investigate the wake dynamics of the Ahmed body\u2014a canonical car model widely used in the automotive industry to study aerodynamics or the Generic Truck Model. The focus will be on identifying and analyzing three-dimensional bifurcations and global instabilities in the wake, providing insight into how complex flow features contribute to drag and flow unsteadiness. Another opportunity will be to optimise the geometry of additive aerodynamic devices like boat-tails/rear-flaps.\nYou will gain experience in:\n\u2022 High-fidelity numerical simulations\n\u2022 Global stability analysis and bifurcation theory\n\u2022 Applied aerodynamics with industrially relevant geometries anf flow control.\nThis project is ideal for students with a strong interest in fluid dynamics, applied mathematics, or CFD, and is especially relevant to those considering careers in the automotive or aerospace industries. Prior exposure to numerical methods or fluid simulations will be helpful but not strictly required. \u2e3b"}, {"id": "GR03", "title": "Reinforcement Learning and Behavioural Flow Control for Road-Vehicle Aerodynamics", "supervisor": "Rigas, Georgios Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Theoretical"], "skills": ["AI", "Aerodynamics", "CFD", "Control Systems", "Data-driven", "Machine Learning", "PyTorch", "Python", "Reinforcement Learning", "TensorFlow", "Wind Tunnel"], "description": "Many high-performance street and F1 cars have recently added moving surfaces (moving spoilers and wings) for adjusting the downforce at various speed regimes. The position of the surface is determined for static conditions based on a look-up table. In this study, we will exploit modern data driven control techniques (reinforcement learning & behavioural control) for discovering optimal control laws and dynamically adapting the position of the control surfaces during attitude changes in the car (yaw, speed). The demonstration will be performed using simplified 2D Direct Numerical Simulations, and will guide the current wind tunnel experiments.\nRL: https://arxiv.org/abs/1808.07664 Behavioral control: https://imarkovs.github.io/tutorial.pdf Experiment: https://doi.org/10.1017/jfm.2016.495 This project is ideal for students interested in AI for engineering, flow control, and automotive aerodynamics. Prior experience in machine learning, CFD, or control systems will be an asset."}, {"id": "GR04", "title": "Experimental Reinforcement Learning for Road-Vehicle Flow Control", "supervisor": "Rigas, Georgios Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Experimental"], "skills": ["AI", "Aerodynamics", "Control Systems", "Reinforcement Learning", "Wind Tunnel"], "description": "Active aerodynamic surfaces\u2014like movable spoilers and wings\u2014are increasingly used in high-performance and Formula 1 vehicles to optimize downforce across different speed regimes. Traditionally, these surfaces are controlled using precomputed look-up tables, which do not account for real-time changes in vehicle attitude such as yaw and speed. This project breaks new ground by experimentally applying reinforcement learning (RL) to aerodynamic flow control. For the first time, RL algorithms will be trained in the loop with wind tunnel experiments to dynamically adjust control surfaces based on live flow conditions. The aim is to discover and implement control strategies that adapt in real time, improving aerodynamic efficiency far beyond what static logic allows.\nProject highlights:\n\u2022 Implementation of modern RL techniques (ref below)\n\u2022 Exploration of behavioural control concepts (tutorial below)\n\u2022 Real-time control of active surfaces in wind tunnel tests (related experiment below)\n\u2022 Hands-on experience with flow measurement and experimental control systems This is a cutting-edge project at the intersection of AI, fluid mechanics, and experimental aerodynamics. It is ideal for students eager to explore reinforcement learning in a physical, high-impact setting. Prior experience with RL, control systems, or experimental setups is beneficial.\nRL: https://arxiv.org/abs/1808.07664 Behavioral control: https://imarkovs.github.io/tutorial.pdf Experiment: https://doi.org/10.1017/jfm.2016.495"}, {"id": "GR05", "title": "Wake Steering in Wind Farms: Improving Aerodynamic Efficiency Using Experimental Wind-Tunnel Data", "supervisor": "Rigas, Georgios Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Theoretical"], "skills": ["Data-driven", "Wind Tunnel"], "description": "Wind farms often operate below their optimal aerodynamic efficiency because wind turbines interact through their wakes. When an upstream turbine extracts energy from the wind, it generates a lower-momentum wake that can reduce the power output and increase the unsteady loading of downstream turbines. A promising strategy to mitigate these losses is wake steering, where upstream turbines are intentionally yawed relative to the incoming wind direction so that their wakes are deflected away from downstream turbines. Although this may slightly reduce the power of the yawed turbine, it can increase the total power output of the wind farm.\nThis project will investigate wake steering using experimental wind-tunnel data from scaled wind-farm configurations. The student will analyse measurements of turbine power, flow fields, and wake behaviour under different yaw angles and turbine arrangements. The aim is to understand how wake deflection affects downstream turbine performance and to identify operating conditions that improve overall farm efficiency.\nThe project will combine elements of fluid mechanics, data analysis, and aerodynamic optimisation. Depending on progress, the student may compare experimental trends with simplified wake models, quantify uncertainty in the measurements, and explore data-driven approaches for predicting optimal yaw settings.\nThe main objectives of the project are to:\n1. Analyse experimental wind-tunnel data for wind-turbine wake interactions.\n2. Quantify the effect of yaw misalignment on wake deflection, wake recovery, and downstream turbine performance.\n3. Evaluate the trade-off between power loss at the yawed upstream turbine and power gain at downstream turbines.\n4. Identify yaw-control strategies that maximise total wind-farm power output.\n5. Compare experimental results with simple analytical or engineering wake-steering models, where appropriate."}, {"id": "PR01", "title": "FE Investigation of Thermoplastic Interleaved Composites Short Strip Composites", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Computational"], "skills": ["Abaqus", "Composite", "MATLAB"], "description": "A considerable amount of waste carbon-fibre epoxy prepreg (carbon fibres in a partially cured resin) is generated in the UK. Currently waste treatment of these materials consists of landfilling, incineration or pyrolysis to recover the fibres. This project will investigate a new proposal to convert prepreg waste into mouldable fully cured panels and mouldable mats made from thermoplastic-coated short prepreg strips. The thermoplastic coating of the strips enables the moulding capability in the cured composite and also provides the potential for closed loop recycling. This project will investigate FE simulation to guide optimisation of the new material and the associated manufacturing process."}, {"id": "PR02", "title": "Investigation of an Interleaved Strategy for Easy Repair of Impact Damage in Composites", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": true, "categories": ["Experimental: Structures"], "skills": ["Composite", "Fracture"], "description": "Impact damage in a laminated composite often consists of interlaminar fracture between the laminae and repair of this damage usually involves removal of the damaged material by machining and adhesive bonding of a repair patch. Recent work at Imperial has explored an easy repair concept in which a thermoplastic interleaf is added to the composite to provide a repairable 'weak link'. The properties of the interleaf are chosen such that on impact the damage occurs preferentially within the interleaf. The composite can then be heated and the damage repaired. This project will perform further experimental investigations to help develop and assess this easy repair concept."}, {"id": "PR03", "title": "Finite Element Investigation of Strategies for Improving the Resistance of Laminated Composites to Delamination", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Computational"], "skills": ["Abaqus", "Composite", "Finite Element"], "description": "Laminated polymer matrix composites are susceptible to delamination (i.e. crack growth between the laminae). In this project strategies to improve the resistance to delamination will be investigated using finite element modelling. For example, some composites possess a high resistance to delamination because they develop a considerable amount of fibres which bridge between the delaminated surfaces in the wake of the crack tip. FE modeling will be used to investigate methods for modifying the composite to ensure that extensive fibre bridging will occur in the event of a delamination. The student must be familiar with Abaqus."}, {"id": "PR04", "title": "Experimental Investigation of Strategies for Improving the Resistance of Laminated Composites to Delamination", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Experimental: Structures"], "skills": ["Composite"], "description": "Laminated polymer matrix composites are susceptible to delamination (i.e. crack growth between the laminae). In this project strategies to improve the resistance to delamination will be investigated. For example, some composites possess a high resistance to delamination because they develop a considerable amount of fibres which bridge between the delaminated surfaces in the wake of the crack tip. This experimental study will investigate methods for modifying the composite to ensure that extensive fibre bridging will occur in the event of a delamination."}, {"id": "PR05", "title": "Experimental Investigation of the Compression Performance of Unidirectional Composites", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Experimental: Structures"], "skills": ["Composite"], "description": "The compression strength of unidirectional composites is low compared to the tensile strength. NextCOMP is a current research project being undertaken jointly by Imperial and Bristol University and is exploring strategies to improve the compression properties of high performance composites. In this project, composite rod specimens will be manufactured and tested to evaluate the effectiveness of an eccentric strut buckling test for measurement of compression strength."}, {"id": "PR06", "title": "Experimental Investigation of the Effect of Lamina Prestress on the Compression Performance of Composite Laminates", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Experimental"], "skills": ["Composite"], "description": "Fibre reinforced composite laminates commonly fail by kink band formation when subjected to in-plane compression. This project will use thermoplastic interleaved composite laminates in which the prestress can be changed after curing. Unidirectional and multidirectional laminates will be manufactured and tested to investigate how changes in the lamina prestress levels influence the compression behaviour."}, {"id": "PR07", "title": "Experimental Investigation of Thermoplastic Interleaved Composites Short Strip Composites", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Experimental: Structures"], "skills": ["Composite"], "description": "A considerable amount of waste carbon-fibre epoxy prepreg (carbon fibres in a partially cured resin) is generated in the UK. Currently waste treatment of these materials consists of landfilling, incineration or pyrolysis to recover the fibres. This project will investigate a new proposal to convert prepreg waste into mouldable fully cured panels and mouldable mats made from thermoplastic-coated short prepreg strips. The thermoplastic coating of the strips enables the moulding capability in the cured composite and also provides the potential for closed loop recycling.\nThis project will investigate processes for production of the interleaved strip-based mouldable cured panel and mouldable bonded mat ensuring the required strip distribution and orientation, and will evaluate the mechanical performance and moulding capability of the new composite material."}, {"id": "PR08", "title": "Experimental Investigation of Interlaminar Creep Fracture Growth in Composites", "supervisor": "Robinson, Paul Prof", "space": false, "bothTerms": false, "categories": ["Experimental: Structures"], "skills": ["Composite", "Fatigue", "Fracture"], "description": "Laminated polymer matrix composites are susceptible to interlaminar fracture (i.e. crack growth between the laminae). The critical energy release rate, Gc, of of a laminated composite is a measure of its resistance to interlaminar fracture and is measured under quasi static load conditions. However, interlaminar crack growth can occur at an applied energy release rate lower than Gc; the threshold energy release rate for interlaminar crack growth in fatigue is substantially less than the Gc. This project will investigate whether creep growth of interlaminar cracks will occur at an applied energy release rate less than Gc and will measure the associated crack growth rates. Techniques to perform the creep tests will be devised to perform the creep fracture tests but will include the use of an existing constant energy release rig fixture."}, {"id": "MSA01", "title": "Multiphysics Metamaterials for Space", "supervisor": "Santer, Matthew Prof", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": ["Firedrake", "Python"], "description": "Metamaterials are materials that are designed and optimized with features over multiple length scales. This can access novel and unexpected properties that would not otherwise exist in nature. In addition, different physics can be coupled to achieve highly multifunctional systems. For example, coupling electro-magnetic and structural properties can enable novel antenna architectures; coupling optical and structural properties can enable cloaking and low visibility; coupling thermal and structural properties can enable integrated thermal protection and management systems; and so on.\nSpace is an application environment where the properties enabled by metamaterials are particularly attractive. The specific objectives (including the application and the physics to be coupled) will be defined at the beginning of the project based on the intersection of the research state of the art and the interests of the student.\nAt the core of the work will be the use of the Firedrake python-based PDE solver which enables the coupled constitutive equations to be straightforwardly defined. This builds on several research activities already carried out within the Department. A strong proficiency in python is a prerequisite."}, {"id": "MSA02", "title": "Deployable Structures and In-Space Assembly and Manufacture", "supervisor": "Santer, Matthew Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Design", "Experimental"], "skills": ["Abaqus", "Finite Element", "MATLAB", "Python", "Spacecraft"], "description": "A perennial challenge in the design of large space systems is that the volume required for operation in space can substantially exceed the available volume within the launch vehicle. This has been partially addressed by the development of deployable structures based on mechanisms and other less conventional approaches, although there are still significant challenges remaining to be overcome, particularly with respect to precision, robustness and efficiency. However, recently a new class of space mega structure has been proposed which will enable observatories, power stations, data centres, habitation modules and more. This will require the assembly in space, potentially based on deployable units, but may also potentially be manufactured and assembled in orbit. How to achieve this is not a solved problem.\nSpecific objectives for this project will be defined at the beginning of the project based on the intersection of the research state of the art and the interests of the student. It is expected that the project will involve the design, analysis and potentially bench-top experimental validation of deployable and/or in-space assembled structural concepts.\nThe requirements of the project will depend on the agreed objectives but is likely to include the use of finite element analysis in addition to coding with python or matlab. Taking the Spacecraft Structures module either before or during the project is a requirement."}, {"id": "MSA03", "title": "Aero-Thermo-Structural Optimization of Hypersonic Vehicles", "supervisor": "Santer, Matthew Prof", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": ["Finite Element", "Firedrake", "Hypersonics", "Python"], "description": "The design of hypersonic vehicles is immensely challenging due to the need to manage simultaneously extremely high heat loads, thermal stresses, and flight loads. Solving this problem is essential for both space \u2014 atmospheric re-entry \u2014 and defence applications.\nOver the last decade in the Department of Aeronautics we have developed and validated a python-based engineering-level simulation capability which couples modified Newtonian aerodynamic solver with a nonlinear thermo-structural finite element solver and is at the forefront of European capability. In addition, the solver has been coupled with an interior point optimizer to enable design optimization.\nThis project will contribute to the continued development of the code and augment its capabilities. The specific objectives \u2014 and the application domain \u2014 will be defined based on the current requirements and the student\u2019s interests but are likely to focus on the thermo-structural aspects of design and optimization. The project will require a strong proficiency with python and numerical methods."}, {"id": "MSE01", "title": "Investigation of Piezoelectric Materials for Health Monitoring, Sensors, and Energy Harvesting in Aerospace Applications", "supervisor": "Seifikar, Masoud Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Theoretical"], "skills": ["Abaqus", "Finite Element", "MATLAB"], "description": "Piezoelectric materials generate an electrical charge when subjected to mechanical stress, making them useful in various applications, including in the field of aeronautics. In recent years, piezoelectric materials have played a vital role in the aerospace industry, particularly in health monitoring, sensors, and energy harvesting. The objective of this project is to investigate the potential use of piezoelectric materials in these applications and explore effective methodologies for simulating and analysing their electrical and structural properties.\nThe project will employ the finite element method to make precise numerical models of piezoelectric materials when dielectric, piezoelectric, and mechanical properties are known. We will investigate the static and dynamic responses of piezoelectric material using commercially available finite element software ABAQUS. The project will also design and test various types of sensors, specifically tailored to meet the requirements of the aerospace industry. We will evaluate the performance of these sensors and optimize their design for maximum efficiency. Furthermore, we will explore energy harvesting techniques and investigate how piezoelectric materials can be used to harvest energy from ambient sources. We will compare and evaluate various harvesting techniques to determine the most efficient and cost-effective methods."}, {"id": "MSE02", "title": "Developing Dilute Nitride Multi-Junction Solar Cells for Space Applications", "supervisor": "Seifikar, Masoud Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Theoretical"], "skills": ["MATLAB", "Python"], "description": "Achieving a clean energy society through renewable sources hinges on the advancement of high-performance solar cells. Space applications, with their demanding power needs and extended missions, require solar technology of the highest efficiency. Multi-junction solar cells have emerged as superior to traditional silicon-based cells, and the integration of dilute nitride materials holds the promise of further enhancing their performance in the challenging space environment.\nTo improve the efficiency of multi-junction solar cells beyond existing triple-junction architectures, a sub-cell with a bandgap of around 1 eV is essential. The development of dilute nitride GaInNAs material system offers a compelling solution. This material system, initially proposed for 1 eV lasers and subsequently for 1 eV solar cells, shows promise when lattice-matched to GaAs. Current triple-junction solar cells based on GaInP/GaInAs/Ge have achieved efficiencies up to 41.6%. By incorporating a middle junction with a band gap around 1 eV, utilizing dilute nitride materials such as GaInNAs(Sb), even higher efficiencies are predicted while maintaining lattice-match compatibility with GaAs or Ge. Additionally, replacing Ge with a 0.9 eV GaInNAs(Sb) subcell in a GaInP/GaAs/GaInNAs configuration is forecasted to achieve efficiencies up to 44.5%.\nThis project aims to theoretically investigate the photovoltaic (PV) performance of GaInNAs and GaInNAsSb diodes, previously developed for photodetectors, to assess their viability for integration into multi-junction solar cells for space applications. This project is anticipated to provide insights into the potential of dilute nitride materials, particularly GaInNAs and GaInNAsSb, for improving the efficiency and performance of multi-junction solar cells in space applications. The theoretical investigation will lay the foundation for future experimental studies and the development of high-efficiency space solar technology."}, {"id": "MSE03", "title": "Critical Assessment of Piezoelectric Wind Energy Harvesting", "supervisor": "Seifikar, Masoud Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Experimental", "Experimental: Structures", "Literature", "Theoretical"], "skills": ["3DExperience", "Abaqus", "Finite Element", "MATLAB", "SHM", "Star-CCM+", "Vibration", "Wind Tunnel"], "description": "This project aims to critically assess the potential and limitations of piezoelectric wind energy harvesting (PWEH) systems, particularly for low-power aerospace applications such as structural health monitoring or autonomous sensor nodes. Piezoelectric energy harvesting relies on converting mechanical vibration\u2014typically caused by wind-induced mechanisms such as flutter, vortex-induced vibration (VIV), or galloping\u2014into electrical energy through materials like PVDF or PZT.\nThe first part of the project will involve a comprehensive literature review of recent developments and benchmark studies, including both modelling and experimental data. The student will evaluate various PWEH configurations, comparing their performance, operational bandwidth, and scalability. This will lead to the identification of key limitations in material selection, mechanical robustness, energy output, and interface electronics.\nIn the second phase, the student will develop analytical or finite element models of a selected PWEH configuration, using simplified representations of flutter or VIV systems.\nThese models will help explore parameter sensitivities\u2014such as geometry, wind speed, and piezo material properties\u2014and be compared against experimental results.\nA possible practical component will complement the computational work. A simple bench-scale prototype will be constructed using a piezoelectric beam and a bluff body (e.g., flag-style or cantilever setup). Output voltage and power will be measured under varying wind conditions using a controlled fan or small wind tunnel. Basic circuit rectification and load testing will be performed to assess real-world efficiency.\nThe project will conclude with a critical analysis of the results and a set of design recommendations for future scalable PWEH systems suitable for aerospace applications."}, {"id": "SRS01", "title": "Damping Properties of Thermoplastic Film Interleaved Thermosetting Composite", "supervisor": "Shamsuddin, Siti Ros Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Experimental", "Experimental: Manufacturing Intensive", "Theoretical"], "skills": ["Composite"], "description": "Advanced fibre reinforced polymer composite materials are often used in load-bearing and structural applications due to their high strength, high modulus and low density. Interleaved composites have been studied extensively as composite toughening or composites with controllable stiffness. Some thermoplastic materials are also compatible with epoxies (such as PSU, PES, PS, PA, etc.). In this study, the damping properties of thermoplastic interleaved CFRP with various interleaved architectures (0deg, 0/90 deg and 90 deg) will be studied and compared with conventional CFRP through DMA analysis. The experimental results will also be compared to existing theoretical models."}, {"id": "SRS02", "title": "Predicting Mechanical Properties of Interleaved CFRP Composites Using Machine Learning", "supervisor": "Shamsuddin, Siti Ros Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Literature", "Numerical", "Theoretical"], "skills": ["Abaqus", "Composite", "MATLAB", "Machine Learning", "Neural Networks", "Python"], "description": "Carbon fibre reinforced polymer composites (CFRP) are becoming increasingly relevant in lightweight structures due to its high specific strength and stiffness properties. However, the nature of composite materials having many constituents can lead to complex behaviour under load, which makes prediction of its mechanical properties very challenging. The brittleness of traditional composite materials can also lead to catastrophic failure which is undesirable. To increase toughness of CFRP, interleaving techniques can be employed but choosing the appropriate interleaving material is also crucial to guarantee perfect adhesion between all the constituents. With recent development in artificial intelligent tools such as Linear Regression, Artificial Neural Network, the prediction of mechanical responses of composites can be achieved. This project will compare previous experimental results and the predicted mechanical properties using machine learning tools to study the adaptability of these tools in predicting the mechanical properties of interleaved CFRP. The integration of machine learning approaches in composite design can reduce experimental costs while enhancing material optimisation."}, {"id": "SRS03", "title": "Training Deep Learning for Adhesion Properties with Single Fibre Fragmentation Test on Carbon Fibre Reinforced Thermoplastic Composites", "supervisor": "Shamsuddin, Siti Ros Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Numerical", "Theoretical"], "skills": ["Composite", "Deep Learning", "MATLAB", "Neural Networks", "Python"], "description": "The fibre-matrix adhesion is critical in any fibre reinforced thermoplastic composite materials for optimising the mechanical performance of the composite. This is because stress transfer between fibres happens through the interface and subsequently the matrix. The single fibre fragmentation test is a widely used experimental method to determine the interfacial shear strength (IFSS), which is translated to the adhesion property at the fibre-matrix interface. This study will utilise the use of artificial neural network (ANN) method to predict the IFSS between various carbon fibres and matrices. The data set will be extracted from published data and used in the prediction."}, {"id": "SRS04", "title": "Machine Learning Methods on Predicting Fracture Toughness of Interleaved Composites", "supervisor": "Shamsuddin, Siti Ros Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Numerical", "Theoretical"], "skills": ["Composite", "Fracture", "MATLAB", "Machine Learning", "Neural Networks", "Python"], "description": "Thermoplastic interleaves are widely used to improve the delamination resistance of fibre-reinforced composites, but the resulting fracture behaviour depends on a complex interaction between material properties, laminate configuration and processing conditions.\nConventional experimental characterisation is time-consuming and costly, making data- driven prediction an attractive alternative. This project investigates the use of machine learning to predict the interlaminar fracture toughness of composite materials containing thermoplastic interleaving. The study will develop machine learning models using input features that may include interleaf type, thickness, fibre volume fraction, laminate lay-up, matrix properties and processing parameters. Experimental data collected from literature and previous laboratory testing will be used to train and validate regression models such as random forests, support vector regression, or neural networks. Model performance will be evaluated using standard statistical metrics and compared with simpler empirical or analytical approaches."}, {"id": "SRS05", "title": "Interlaminar Fracture Toughness of Interleaved Composites: FEA vs Experimental Data Analysis", "supervisor": "Shamsuddin, Siti Ros Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Literature", "Numerical", "Theoretical"], "skills": ["Abaqus", "Composite", "FEA", "Fracture", "MATLAB", "Python"], "description": "CFRP laminates are prone to delamination due to its anisotropic and heterogeneous nature thus limiting their use in certain structural applications. To overcome this as well as the brittle nature of thermoset matrices, a new way of manufacturing interleaved composites is introduced. Interleaves refers to adding other materials between the prepreg layers to control delamination and enhance interfacial properties. One of the easiest interleaving methods is to use thermoplastic films. This study will focus on FEA analysis of perforated and unperforated PES film interleaved CFRP for interlaminar fracture toughness. An FEA analysis will be conducted, and the results will be compared and analysed against experimental values."}, {"id": "ZSK01", "title": "Fault/Anomaly Detection", "supervisor": "Sharif Khodaei, Zahra Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Experimental: Ready-Made Experiment"], "skills": ["Abaqus", "MATLAB", "Machine Learning", "Python", "SHM"], "description": "Structural Health monitoring is based on diagnosing the health state of a structure based on the recorded response from permanently installed sensors. However, the reliability of the diagnosis is directly linked to the health of the sensors and the quality of the recorded data.\nThis project focuses on developing methods for real-time sensor fault detection and data credibility assessment in structural monitoring systems. By analyzing signals from sensors (e.g. acceleration, strain, or guided waves) , the project aims to distinguish between structural anomalies and sensor malfunctions. Advanced statistical analysis, redundancy checks, and machine learning algorithms can be applied to evaluate data integrity, isolate faulty sensors, and ensure the reliability of measurements. The outcome will enhance the robustness of structural health monitoring (SHM) frameworks, ensuring accurate decision-making and reducing maintenance risks. A library of experimental data are already available which can be used for verification and validation of the algorithms. There could be a possibility of small scale tests carried out in the lab to simulate a faulty sensor readings. In the absence of lab access, numerical simulation with Abaqus can be carried out to support the developments."}, {"id": "ZSK02", "title": "Digital Twin Updating via Modal Data Assimilation for Structural Integrity Assessment", "supervisor": "Sharif Khodaei, Zahra Prof", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Experimental: Structures", "Numerical"], "skills": ["Abaqus", "Finite Element", "MATLAB", "Python", "SHM", "Vibration"], "description": "This project aims to develop and demonstrate a physics-based digital twin (DT) framework for structural integrity assessment through modal data assimilation, with a particular focus on aeronautical structures. The core objective is to establish a robust methodology for reconciling discrepancies between finite element (FE) model predictions and measured vibration characteristics, thereby enabling reliable detection and quantification of structural degradation. The motivation stems from a key limitation in current SHM practice: modal features such as natural frequencies and mode shapes are widely used due to their global sensitivity and ease of measurement, yet their effectiveness for damage identification is often constrained by model uncertainty, environmental variability, and limited sensor density. Addressing these challenges is central to advancing certifiable digital twin concepts for aircraft structures.\nTechnically, the project will involve constructing a high-fidelity FE model of a representative structure (e.g. plate, beam, or simplified wing section) and generating baseline modal properties under both pristine and damaged conditions. Synthetic \u201cmeasured\u201d datasets will be created by introducing controlled perturbations to account for noise and modelling discrepancies. A sequence of model updating strategies will then be implemented, starting from deterministic approaches (e.g. sensitivity-based or least-squares updating of stiffness parameters) and progressing towards simplified data assimilation techniques (e.g. Kalman filtering concepts or regularised inverse formulations). The student will quantify the sensitivity of modal observables to different damage scenarios, assess identifiability limits, and investigate the influence of sensor placement and sparsity on update accuracy. The final outcome will be a validated computational workflow demonstrating how modal data can be systematically integrated into a digital twin to improve state estimation, reduce uncertainty, and support structural health and usage monitoring in an aerospace context."}, {"id": "ZSK03", "title": "Real-Time Usage Monitoring of Aircraft Structures via Strain-Based Digital Twin Reconstruction", "supervisor": "Sharif Khodaei, Zahra Prof", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Experimental: Ready-Made Experiment", "Numerical"], "skills": ["Composite", "Finite Element"], "description": "This project aims to develop a computational framework for real-time usage monitoring of aircraft structures based on sparse strain measurements, forming the basis of a strain-driven digital twin. The central objective is to infer the full-field structural response from strain data recorded at a limited number of sensor locations, enabling continuous estimation of structural states under realistic operational conditions. The motivation arises from a fundamental constraint in practical Structural Health and Usage Monitoring (SHUM) systems: while strain sensors (e.g. strain gauges or fibre optic systems) provide high-fidelity local measurements, they do not directly capture the global structural response required for robust assessment of load distribution and structural behaviour. Bridging this gap is essential for scalable, sensor-efficient digital twin implementations in aerospace applications.\nTechnically, the project will begin with the development of a finite element (FE) model of a representative aircraft structure (e.g. wing panel, fuselage section, or stiffened plate), which serves as the physics-based backbone of the digital twin. Synthetic or provided strain data at discrete locations will be used to emulate onboard sensing. The student will then implement methodologies to reconstruct the full-field strain distribution from sparse measurements, exploring approaches such as interpolation techniques (e.g. radial basis functions), reduced-order modelling, or inverse methods based on FE model superposition. Following strain reconstruction, the corresponding stress field will be derived using appropriate constitutive relations, accounting for material behaviour (isotropic or composite). The reconstructed stress or strain fields will then be used to characterise structural usage in real time, for example through load spectrum reconstruction, identification of critical load events, or statistical descriptors of operational exposure. The project may further investigate the sensitivity of reconstruction accuracy to sensor placement, noise, and model-form uncertainty. The final outcome will be a computational workflow that demonstrates how sparse strain sensing can be systematically transformed into actionable structural usage information within a digital twin framework, supporting next-generation SHUM systems for aerospace structures."}, {"id": "ZSK04", "title": "Structural Health Monitoring of Composite Structures under Operational and Environmental Variability", "supervisor": "Sharif Khodaei, Zahra Prof", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Experimental: Ready-Made Experiment", "Literature"], "skills": ["Composite", "Data-driven", "Finite Element", "SHM", "Vibration"], "description": "This project aims to investigate the state of the art in structural health monitoring of composite aerospace structures, with a specific focus on how damage detection and characterisation methods perform under realistic operational and environmental conditions.\nThe motivation is that composite structures are increasingly used in aircraft due to their high specific stiffness and strength, but their damage mechanisms\u2014such as delamination, matrix cracking, fibre breakage, impact damage and debonding\u2014can be difficult to detect and quantify using conventional inspection methods. A key challenge is that SHM signals are strongly influenced not only by damage, but also by temperature, loading condition, boundary condition variation, moisture, ageing and sensor variability. Distinguishing damage-sensitive features from variability-induced changes is therefore essential for reliable and certifiable SHM systems.\nTechnically, the project will begin with a thorough literature review covering guided waves, vibration/modal methods, strain-based monitoring, acoustic emission, data-driven SHM, and hybrid approaches for composite structures. Particular attention will be given to methods that address environmental and operational variability, including baseline compensation, baseline-free approaches, transfer learning, statistical pattern recognition, physics-informed modelling, and uncertainty-aware damage diagnosis. The computational part of the project will use either existing experimental datasets, analytical signals, or finite-element-generated responses to develop and test new damage detection and characterisation techniques.\nDepending on data availability, the student may analyse guided wave signals, modal parameters, strain fields, or other SHM observables from pristine and damaged composite configurations. The work will involve signal processing, feature extraction, damage-sensitive index formulation, classification or regression models, and assessment of robustness under simulated or measured variability. The final outcome will be a critical review of current SHM capability for composites, together with a prototype computational methodology demonstrating how existing or simulated data can be used to improve damage detection, localisation, and severity estimation under realistic aerospace operating conditions."}, {"id": "SS01", "title": "Computational Fluid Dynamics Using Spectral/Hp Element Methods", "supervisor": "Sherwin, Spencer Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["Finite Element", "GPU", "Nektar++", "ParaView", "VisIt"], "description": "Projects are available in the development and application of high order finite element methods known as spectral/hp element discretisations. These project will be based around the library, Nektar++, details of which can be found under ( www.nektar.info ). The primary focus of the projects will be the development and/or application of these techniques to incompressible and compressible flow problems similar to those shown under www.nektar.info. Although there are no specific prerequisites for the projects computing and coding skills are preferable. Interest in development of GPU based solvers is also attractive."}, {"id": "SS02", "title": "Pulse Wave Modelling of Arterial Networks", "supervisor": "Sherwin, Spencer Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["GPU", "Nektar++", "ParaView"], "description": "The 1D Euler equations which commonly arise in Aeronautics are the equations that govern pulse wave propagation in the human arterial system, indeed Euler\u2019s original work was related to blood flow rather than gas dynamics. In this project we will develop an arterial pulse wave model to reproduce the waves in the human cardiovascular system on GPUs. This will leverage on-going developments in the Nektar++ redesign project for GPU and vectorized capable solvers. Additional development may also include a new visco-elastic formulation and an implicit in time discretisation for greater efficiency."}, {"id": "SS03", "title": "Software Engineering in Open Source CFD Package Nektar++", "supervisor": "Sherwin, Spencer Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Numerical"], "skills": ["CFD", "Nektar++", "ParaView", "Python", "VisIt"], "description": "Software engineering is an integral part of any computational package. For example, to improve the robustness and flexibility of the Nektar++ (www.nektar.info) flow solver and to help provide an easier way to understand the fundamentals of the spectral/hp element methods we have been developing a python interface. We also maintain a Continual Integration environments within gitlab (gitlab.nektar.info) which helps us ensure that previous developments are robust with respect to new developments. However we do not currently have a performance monitoring framework. This project is therefore focussed on the software engineering aspects of the code development and can be tailored depending on mutual discussion on your interests and the needs of the project."}, {"id": "KS01", "title": "Machine Learning of Hidden Symmetries in Turbulence", "supervisor": "Steiros, Kostas Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Aerodynamics", "Data-driven", "MATLAB", "Machine Learning", "Neural Networks", "Python", "Star-CCM+", "Turbulence"], "description": "Many theoretical results in fluid dynamics, as well as in other areas of mechanics, rely on identifying symmetries in the governing field equations. Classic examples in the field of turbulent flows include the logarithmic law of the wall in turbulent boundary layers and Kolmogorov\u2019s \u22125/3 scaling law for the turbulent kinetic energy cascade, both of which are derived using symmetry arguments.\nA rigorous mathematical framework for identifying such symmetries is provided by Lie group theory. However, this approach is generally limited to highly simplified and idealized problems, such as the Blasius boundary layer that we studied in Aerodynamics 3. Despite these limitations, if symmetries are present in a physical system, they must also manifest in observable quantities, such as experimental or numerical data. This suggests that, in principle, symmetries could be identified using data-driven techniques. The aim of this project is to develop a neural network\u2013based algorithm capable of extracting symmetries (or self-similarities) from turbulent velocity fields. As a first step, the method will be applied to a relatively simple flow configuration obtained from a RANS solver, for example a bluff body wake generated by the student. If successful, the approach will then be extended to real experimental datasets.\nThis is a challenging project that requires a strong foundation in both the underlying mathematics and fluid mechanics."}, {"id": "KS02", "title": "Analytical and Numerical Modelling of Wind Turbines Under Dynamically Yawed Conditions", "supervisor": "Steiros, Kostas Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["Reinforcement Learning", "Turbulence"], "description": "There is currently significant interest in dynamically optimizing the yaw angle of wind turbine rotors, as recent studies suggest that this strategy can substantially improve the overall efficiency of wind farms. However, there are presently no simplified models capable of accurately predicting the aerodynamic behaviour of wind turbines or entire wind farms under time-varying yaw conditions.\nThe aim of this project is to develop a time-dependent analytical wake model that can capture these dynamic yaw effects. To support this effort, the student will perform unsteady simulations\u2014using either URANS or LES\u2014of a single wind turbine or a full wind farm operating under realistic conditions, including variations in incoming turbulence, wind direction, and turbine control settings.\nA key objective will be to identify and characterize a convection parameter governing wake evolution, which will then be incorporated into a two-dimensional, time-dependent analytical wake model. There is scope to extend this framework further by including wake superposition methods, three-dimensional wake formulations, and atmospheric boundary layer inflow conditions.\nFinally, the project will investigate how the developed model can be used to optimize wind farm performance under time-varying operating strategies, potentially leveraging techniques such as reinforcement learning.\nThis project requires a strong interest in analytical modelling, scientific computing, and wind energy systems."}, {"id": "KS03", "title": "Wind Tunnel Measurements of Aerofoils", "supervisor": "Steiros, Kostas Dr", "space": false, "bothTerms": false, "categories": ["Design", "Experimental"], "skills": ["Wind Tunnel"], "description": "We have recently developed a revised formulation of the classical Blade Element Momentum (BEM) theory for wind turbines and aircraft propellers. The key innovation in this framework is the explicit modelling of rotor wake pressure, which is not accounted for in the original BEM formulation. Further work is now required
