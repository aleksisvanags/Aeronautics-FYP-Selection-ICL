 to validate and extend this model through laboratory experiments.\nBEM relies on accurate lift and drag data for aerofoils over a range of angles of attack and Reynolds numbers. However, such data are often incomplete or unavailable in the literature. To address this, the student will carry out aerofoil force-balance measurements in the T2 wind tunnel at Imperial College London. This project is well suited to a student with a strong interest in experimental fluid mechanics and measurement techniques."}, {"id": "KS04", "title": "Aerodynamics of Selective Laser Melting", "supervisor": "Steiros, Kostas Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["Aerodynamics"], "description": "Selective Laser Melting (SLM) is an advanced additive manufacturing technology that is gaining increasing attention due to its ability to produce components that are not feasible using traditional methods, particularly complex geometries at low production volumes. In SLM, a thin layer of powder is spread over a build platform and selectively melted using a heat source, typically a Nd:YAG laser. Successive layers are then deposited and fused, with the process repeated until the full geometry is formed.\nA critical feature of SLM systems is the presence of a jet of inert gas, usually Argon, which is used to remove by-products of the melting process such as spatter and smoke. However, this gas flow is also believed to generate large-scale vortical structures and stagnation regions within the build chamber. These flow features may contribute to part defects that are not yet fully understood.\nThe aim of this project is to investigate and demonstrate the existence of these flow structures using RANS simulations of the internal flow within an SLM machine. The numerical results will be complemented and validated using a dataset provided by the industrial partner Alloyed."}, {"id": "KS05", "title": "Manufacturing and Testing of a Wind Tunnel Active Grid System", "supervisor": "Steiros, Kostas Dr", "space": false, "bothTerms": false, "categories": ["Design", "Experimental", "Experimental: Manufacturing Intensive"], "skills": ["Aerodynamics", "Turbulence", "Wind Tunnel"], "description": "While wind tunnels are well suited for generating steady, laminar inflows, many practical applications require controlled unsteady or gusty flow conditions. Examples include the aerodynamics of tall buildings, wind turbines, and a wide range of fundamental studies in turbulence. However, such \u201cgusty\u201d wind tunnel capabilities are rare, and currently do not exist at Imperial College London.\nTo address this limitation, this project will focus on the design and manufacture of an \u201cactive grid\u201d\u2014a system of multiple paddles that oscillate in a controlled manner to generate tailored turbulent flow conditions. The paddles will be 3D-printed and actuated using miniature stepper motors and microcontrollers, enabling precise control over the properties of the generated turbulence.\nThis project is ideally suited to a student with a strong interest in experimental design, electronics, and manufacturing, particularly in the context of fluid mechanics. The successful development of this system will provide a valuable experimental capability for several research groups within the department, enabling new investigations into unsteady aerodynamics and turbulence."}, {"id": "VT01", "title": "Research Topics in Experimental Solid Mechanics", "supervisor": "Tagarielli, Vito Dr", "space": true, "bothTerms": true, "categories": ["Experimental: Structures"], "skills": ["Composite", "Fracture", "Machine Learning"], "description": "Select this project if you want to perform research in one of the areas below; the detailed topic is to be agreed in the future, based on your inclinations and skills, as well as demand. Please be aware that attending campus and working hard will be essential, from October to June. Please discuss informally with the supervisor the details of the possible activities. Activities this year might include: - Development of new mechanical testing techniques, including multiaxial tests on highly instrumented specimens. - Experiments in fracture mechanics of composites and high performance materials. - Dynamic mechanical testing using the Hopkinson bar setup. - Manufacturing (by bacteria) and testing of biomaterials like bacterial nanocellulose. - Analysing real x-ray scans of composites microstructures and developing advanced digital image/volume correlation and machine learning to generate virtual microstructures. These activities will involve operating delicate equipment and dangerous materials, sometimes substantial coding (x-ray project), keeping clear logs of all measurements and processing, presenting the associated data, but they will also require an understanding of the theoretical basis of the phenomena observed, a review of the existing literature and some degree of inventive. The experimental activities can be tailored, to some limited degree, to the inclinations of the student and might be complemented by theoretical/numerical modelling and applications of machine learning for students interested in these additional themes. These experimental projects are harder, not easier than average! Note that this project proposal dates to April 2026 and my interests might have slightly changed by October."}, {"id": "VT02", "title": "Research Topics in Experimental Fluid Mechanics", "supervisor": "Tagarielli, Vito Dr", "space": true, "bothTerms": true, "categories": ["Experimental"], "skills": ["Machine Learning"], "description": "Select this project if you want to perform research in one of the areas below; the detailed topic is to be agreed in the future, based on your inclinations and skills, as well as student demand. Please be aware that attending campus and working hard will be essential, from October to June. Please discuss informally with the supervisor the details of the possible activities. These are likely to be finalised closer to the project start, however this year they might include: - Development of deflagration and deflagration-to-detonation transition experiments for flammable gaseous mixtures, following and expanding the work done in previous years in this area in the department. - Development (from the ground up) of an experimental setup and technique to drive oscillation, cavitation and collapse of bubbles in rubbery media (this involves playing with rubbers, hydrogels, liquid metals and high voltages). - Development (from the ground up) of an experimental setup and technique to measure the laminar/turbulent transition in liquid metals and polymers, including mercury, Galinstan and a polymeric resin at room temperature.\nThese activities will involve operating delicate equipment and dangerous materials, keeping clear logs of all measurements and processing/presenting the associated data, but they will also require an understanding of the theoretical basis of the phenomena observed, a review of the existing literature and some degree of inventive. The experimental activities can be tailored, to some limited degree, to the inclinations of the student and might be complemented by theoretical/numerical modelling and applications of machine learning for students interested in these additional themes. These experimental projects are harder, not easier than average! Note that this project proposal dates to April 2026 and my interests might have slightly changed by October."}, {"id": "VT03", "title": "Applications of Machine Learning to Problems in Mechanics", "supervisor": "Tagarielli, Vito Dr", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": ["Abaqus", "CFD", "Machine Learning"], "description": "Select this project if you want to perform research in this area. This might require knowledge of the basics of the numerical techniques used in FEM, CFD and coupled multiphysics simulations, basic knowledge of machine learning techniques, coding and software skills, ability to read and digest difficult papers containing advanced physics and maths. Some activities might require using external online tools (eg Nvidia Physics Nemo). The project will be 100% computational and regular attendance to campus is not essential. Please discuss informally with the supervisor the details of the possible research. These are likely to be finalised closer to the project start, and this year they might include: - Novel machine learning algorithms for numerical simulations: conceptual studies and theoretical development (math/coding enthusiast(s) sought) - Machine learning in solid mechanics: new algorithms for scaling-up and generalisation problems (FE/coding enthusiast sought) - Machine learning in fluid mechanics and fluid-structure interaction. Coupled CFD/FE Eulerian/Lagrangian simulation of explosive events and development of fast surrogate models (FE/CFD/coding enthusiast sought) - Ensemble learning, knowledge-based ML, data fusion, and techniques to integrate and homogenise information from multiple sources into intelligent agents (math/coding enthusiast sought) - Surrogate models of particle-based simulations and their coupling with CFD and FE models (math/coding enthusiast sought).\nAll projects will include a review of the existing literature. The research and its supervision will be tailored to some limited degree to the inclinations and skills of the student, and allocated to specific students after preliminary discussions."}, {"id": "VT04", "title": "Agent-Based Simulation of Physical or Socioeconomic Systems", "supervisor": "Tagarielli, Vito Dr", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": [], "description": "This project requires full-time efforts and a good degree of initiative and confidence. It can be undertaken fully remotely. The project aims at developing agent-based modelling frameworks of complex systems. In such frameworks, the system is analysed by modelling the response of individual agents, who operate following simple rules, and interacting with each other and the external world, while following or reacting to some system-level directions, which are in turn affected by the collective behaviour of the agents. An example could be a colony of bacteria (agents) living and reproducing in a liquid medium, affected by their mutual interactions but also by the concentration of oxygen and nutrients in the liquid (high-level system dynamics), which is in turn affected by the collective behaviour of the bacteria (look at my paper in Cellulose).\nThis year i'd like to select the type of project based on inclination and conversation with the allocated student. I am interested in physical systems (eg applications to solid mechanics, biology, applied mechanics) but also in political and socioeconomic systems (where agents are typically individuals or groups of individuals, and policies represent system-level dynamics).\nThe student will gain experience in computational modelling, simulation design, data integration, and the analysis of complex adaptive systems. From my perspective, this project is an excuse to get closer to emergence in complex systems and so I would like the chosen topic to be able to observe some emergent phenomena. By October, I might have additional and more detailed topic proposal for this activity."}, {"id": "VT05", "title": "Training Lightweight LLMs", "supervisor": "Tagarielli, Vito Dr", "space": true, "bothTerms": true, "categories": ["Computational"], "skills": ["Machine Learning", "Neural Networks"], "description": "This project is purely computational and can be undertaken fully remotely. It is obviously heavy in machine learning, and ideally the students should be inclined towards computation and should have already had some exposure to training of neural networks (or be very confident to pick that up quickly).\nThe objectives are: - identify open-source LLM platforms that are sufficiently light in computational terms, to be able to run on mobile phones or ordinary desktops/laptops; - learn how to train these LLMs from scratch, retrain them with new data, perform transfer learning, add and train additional layers, etc. We would like to use LLM-based agents to control applications running on mobile phones or ordinary computers. We would like to impart different specific bits of sectorial knowledge to different LLM agents, and explore collective decision making by multiple LLM agents. The project could suit a team of 2-3 students working in parallel, as it requires expertise in software, computation and machine learning. Get in touch with the supervisor if you have ideas about who the members of that team could be."}, {"id": "DV01", "title": "Geometric Tolerancing Effects on the Axial Crush Performance of Additive Manufactured Strut-Based Lattice Architectures", "supervisor": "Venetsanos, Demetrios Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Numerical"], "skills": ["ANSYS", "Abaqus", "Composite", "LS-Dyna", "MATLAB", "Python"], "description": "A lattice structure is a space-filling unit cell that can be tessellated along any axis with no gaps between cells. These structures are of primary importance in aerospace engineering, as they can combine, in an optimum manner, weight, energy and advanced manufacturing time reduction.\nThe aim of this project is to investigate the effect of size and geometric tolerances on the mechanical performance of additively manufactured strut-based lattice structures, when an axial crushing force is applied. To this end, lattice unit cells, such as (but not limited to) Body-Centred Cubic (BCC), Face-Centred Cubic (FCC), Simple Cubic (SC), and Kelvin Unit (KU), will be considered. Also, well-known distributions of tolerances, taken from the literature, will be introduced. Furthermore, industry-standard software will be used to simulate the application of the axial crushing load.\nThis project is within an on-going collaboration with the National Technical University of Athens (Greece) \u2013 Section of Manufacturing Technology.\nReferences Li, D., Qin, R., Chen, B., Zhou, J. (2021) Analysis of mechanical properties of lattice structures with stochastic geometric defects in additive manufacturing. Materials Science and Engineering: A, vol. 822, 141666, ISSN 0921-5093. DOI: 10.1016/j.msea.2021.141666.\nCao., X., et al. (2020) Compression experiment and numerical evaluation on mechanical responses of the lattice structures with stochastic geometric defects originated from additive-manufacturing. Composites Part B: Engineering, vol. 194, 108030, ISSN 1359-8368; DOI:10.1016/j.compositesb.2020.108030.\nLozanovski, B., et al. (2019) Computational modelling of strut defects in SLM manufactured lattice structures. Materials & Design, vol.171, 107671, ISSN 0264-1275.\nDOI:10.1016/j.matdes.2019.107671"}, {"id": "DV02", "title": "Geometric Tolerancing Effects on the Oblique Crush Performance of Additive Manufactured Strut-Based Lattice Structures", "supervisor": "Venetsanos, Demetrios Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Numerical"], "skills": ["ANSYS", "Abaqus", "Composite", "LS-Dyna", "MATLAB", "Python"], "description": "This project is similar to the project titled \"Geometric Tolerancing effects on the axial crush performance of Additive Manufactured strut-based lattice structures\", the difference being that an oblique crushing load, instead of an axial one, is considered. All other information is the same.\nReferences Li, D., Qin, R., Chen, B., Zhou, J. (2021) Analysis of mechanical properties of lattice structures with stochastic geometric defects in additive manufacturing. Materials Science and Engineering: A, vol. 822, 141666, ISSN 0921-5093. DOI: 10.1016/j.msea.2021.141666. Cao., X., et al. (2020) Compression experiment and numerical evaluation on mechanical responses of the lattice structures with stochastic geometric defects originated from additive-manufacturing. Composites Part B: Engineering, vol. 194, 108030, ISSN 1359-8368; DOI:10.1016/j.compositesb.2020.108030.\nLozanovski, B., et al. (2019) Computational modelling of strut defects in SLM manufactured lattice structures. Materials & Design, vol.171, 107671, ISSN 0264-1275.\nDOI:10.1016/j.matdes.2019.107671"}, {"id": "DV03", "title": "Crashworthiness of Impact Attenuators under Axial Crushing for Electric Vertical Take-Off and Landing (eVTOL) Vehicles", "supervisor": "Venetsanos, Demetrios Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Numerical"], "skills": ["AI", "ANSYS", "Abaqus", "LS-Dyna", "MATLAB", "Python"], "description": "For the emerging electric Vertical Take-Off and Landing (eVTOL) vehicle industry, as well as for formula cars, there is a need for crash mitigation systems, which will be able to attenuate impact energy during a crash. One solution is to introduce impact attenuators, in the form of tubular structures suitably attached to the vehicle. The impact energy these systems should absorb are described in specifications (e.g. Federal Aviation Administration, for aerial vehicles; FAA for formula cars).\nThis project concerns the design of impact attenuators in the form of thin-walled unitubular configurations of variable wall thickness, with longitudinal and/or circumferential stiffeners, of variable thickness and profile, under the application of an axial crushing load. It is assumed that the tubular configurations are manufactured using an Additive Manufacturing process (e.g. 3D-printing), thus the stiffeners will, seamlessly and simultaneously, be manufactured along with the main body of the configurations (i.e. the stiffeners will not be added at a later stage as external components).\nThe novelty of this study is the consideration of stiffeners whose both thickness and profile may vary along the longitudinal and/or circumferential direction.\nTo measure the said crashworthiness, typical metrics will be used, e.g. Total Absorbed Energy (TEA), Specific Absorbed Energy (TEA), Peak and Average Crushing Force, Peak and Average Acceleration, Crushing Force Efficiency, etc. For the FE analyses required, an industry-standard CAE software (e.g. Abaqus, Ansys Workbench, LS-Dyna) will be used. For the optimisation, it is possible to use a scheme found in one of the Matlab Optimisation toolboxes, to include Artificial Intelligence-powered approaches. Alternatively, a Taguchi approach may be utilised. For the description of the non-uniform stiffeners, it is possible to use splines or similar geometric entities.\nReferences Littell, J. D. (2019) Challenges in Vehicle Safety and Occupant Protection for Autonomous electric Vertical Take-off and Landing (eVTOL) Vehicles. AIAA/IEEE Electric Aircraft Technologies Symposium (EATS), pp. 1-16. DOI: 10.2514/6.2019-4504.\nFederal Register. \u201cSpecial Conditions: Airbus A350-900 Airplane; Crashworthiness, Emergency Landing Conditions.\u201d Vol 79. No. 43. Friday July 25, 2014.\nSong, J., Xu, S., Zhou, J., Huang. H., Zou, M. (2021) Experiment and numerical simulation study on the bionic tubes with gradient thickness under oblique loading. Thin-Walled Structures, vol.163, 107624, ISSN 0263-8231; doi: 10.1016/j.tws.2021.107624."}, {"id": "DV04", "title": "Crashworthiness of Impact Attenuators under Oblique Crushing for Electric Vertical Take-Off and Landing (eVTOL) Vehicles", "supervisor": "Venetsanos, Demetrios Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Numerical"], "skills": ["ANSYS", "Abaqus", "Composite", "LS-Dyna", "MATLAB", "Python"], "description": "This project is similar to the project titled \"Optimised crashworthiness of variable thickness impact attenuators under axial crushing\", the difference being that an oblique crushing load, instead of an axial one, is considered. All other information is the same.\nReferences Littell, J. D. (2019) Challenges in Vehicle Safety and Occupant Protection for Autonomous electric Vertical Take-off and Landing (eVTOL) Vehicles. AIAA/IEEE Electric Aircraft Technologies Symposium (EATS), pp. 1-16. DOI: 10.2514/6.2019-4504.\nMohamed, M.N., Kumar, A.P. (2017) New Insight to Improve Energy Absorption Characteristics of Long Circular Tubes with Stiffeners as Controllable Energy-dissipating Devices. Procedia Engineering, Vol. 173, pp. 1399-1406, ISSN 1877-7058. DOI: 10.1016/j.proeng.2016.12.199.\nFederal Register. \u201cSpecial Conditions: Airbus A350-900 Airplane; Crashworthiness, Emergency Landing Conditions.\u201d Vol 79. No. 43. Friday July 25, 2014.\nSong, J., Xu, S., Zhou, J., Huang. H., Zou, M. (2021) Experiment and numerical simulation study on the bionic tubes with gradient thickness under oblique loading. Thin-Walled Structures, vol.163, 107624, ISSN 0263-8231; doi: 10.1016/j.tws.2021.107624. Qi, C. & Yang, S. (2014) Crashworthiness and lightweight optimisation of thin-walled conical tubes subjected to an oblique impact. Int. J. Crashworthiness 19, 334\u2013351.\nTran, T. & Baroutaji, A. (2018) Crashworthiness optimal design of multi-cell triangular tubes under axial and oblique impact loading. Engineering Failure Analysis, vol. 93, pp. 241-256, ISSN 1350- 6307; doi: 10.1016/j.engfailanal.2018.07.003.\nAbramowicz, W., & Jones, N. (1984). Dynamic axial crushing of circular tubes. International Journal of Impact Engineering, 2(3), 263\u2013281. DOI: 10.1016/0734-743X(84)90010-1 Zhu, G., Sun, G., Yu, H., Li, S. & Li, Q. (2018) Energy absorption of metal, composite and metal/composite hybrid structures under oblique crushing loading. Int. J. Mech. Sci., 135, 458\u2013483."}, {"id": "DV05", "title": "Student's Own Project Proposal", "supervisor": "Venetsanos, Demetrios Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Design"], "skills": [], "description": "This project recognises that the most motivated research often begins not with an assigned title, but with a question a student has already been living with. Candidates who have identified a substantive and original research problem, whether through industrial experience, prior study, or independent curiosity, are encouraged to propose it as their Final Year or MSc Project.\nProposals should be grounded in structural design, analysis, or optimisation, though genuinely multidisciplinary projects may be considered, where project supervision will be shared with another member of staff.\nStudents returning from an industrial placement are particularly, though not exclusively, encouraged to draw on the technical challenges they encountered in practice."}, {"id": "AW01", "title": "Data-Driven Modelling of Turbulent Flows Using PDEs and Neural Networks", "supervisor": "Wynn, Andrew Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Theoretical"], "skills": ["AI", "Data-driven", "MATLAB", "Neural Networks", "Python"], "description": "Creating reduced-order models for fluid flows opens the door to rapid numerical simulations, drives understanding of their physics, allow estimates of a flow\u2019s state and, ultimately, leads to flow control solutions for improved performance. Low-cost models are important, since resolved numerical simulations of the Navier-Stokes require a large computational. For turbulent flows, this typically prevents a full investigation of a their behaviour. A significant challenge is to create low-cost models that are accurate across a wide range of flow conditions. This question is central to data-driven modelling where it can be easy to train a model which performs well on a specific data-ensemble, yet performs poorly when flow conditions, such as Reynolds number, change.\nThe aim of this FYP is to use powerful AI methods to train simple PDEs which can underpin nonlinear reduced-order models of fluid flows. Technically, this will be achieved by embedding elliptic PDEs in an encoder-PDE-decoder mapping using deep neural networks. The idea is that PDEs can create generalisable models as flow conditions change and can also have low-computational cost if the class of model is chosen carefully. The FYP will train models, then use them to attempt to solve problems related to flow sensing, that is, estimating the current state of a fluid flow from a small number of sensor measurements. This project can be taken by two students."}, {"id": "AW02", "title": "Mathematical Analysis of Fluid Flows", "supervisor": "Wynn, Andrew Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Theoretical"], "skills": ["MATLAB", "Turbulence"], "description": "Due to their complexity, there are very few known closed-form solutions to the Navier-Stokes equations. You would certainly not expect to be able to work out, by hand, the velocity field for a turbulent flow! Given this, it is surprising that it can be possible to prove rigorous bounds on the time-averaged properties of turbulent flows via mathematical analysis of the Navier-Stokes equations. For example, one can prove statements such as \u201cthe average drag or heat transfer must be less than a certainly value\u201d. This gives potentially important information about the performance of a flow, without the need to construct, or simulate, its solution.\nTwo FYP projects are available. One will look at flows of non-Newtonian fluids such as the Oldroyd-B or FENE-P models for polymeric flows. The other will consider bounds on the skin friction for turbulent boundary layers. In both cases, computational optimization may be used to inform the mathematical analysis of the underlying PDE models.\nThese projects are for students who enjoy the mathematical aspects of fluid dynamics and PDEs. Elective models on Turbulence and Mathematics 3 are not strict prerequisites, but are complementary to some of the methods that will be used in this project."}, {"id": "AW03", "title": "Nonlinear Frequency Response Analysis Using Computational Optimization", "supervisor": "Wynn, Andrew Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Control Systems", "MATLAB"], "description": "The frequency response function is a fundamental tool with which to understand the forced response of a control system and is vital for many aspects of control design. Computing the frequency response for linear systems is easy, but much less so for nonlinear systems. This project will investigate methods of bridging this gap using tools from computational optimization, specifically using Lyapunov methods, linear matrix inequalities and semidefinite programming \u2013 topics which are covered on the Advanced Control module (see also the paper with doi: 10.23919/ACC.2004.1383957). Target applications involve the forced response of highly flexible structures of importance to large wind turbines and next-generation high-aspect-ratio wing design."}, {"id": "AW04", "title": "How to Design Fluid Flows for Optimal Heat and Contaminant Transport", "supervisor": "Wynn, Andrew Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Control Systems", "Finite Element", "MATLAB"], "description": "The transport of scalars such as hot air, cold air, pollutants, particulates, or airborne viruses, is of central importance to building ventilation, urban pollution, thermal management, and transport processes across geophysics. Understanding how to best use fluid flows to transport contaminants is extremely difficult, both mathematically and practically, due to the complexity of the Navier-Stokes questions (see for example the paper https://doi.org/10.1137/17M1150220). This project will investigate a recent approach to finding optimal flows for scalar transport using tools from computational optimization, particularly Semi-Definite Programming (students taking the Advanced Control module will see an introduction to this concept). The aim is to convert the question \u201chow to find a fluid flows which removes heat/contaminants as efficiently as possible\u201d into a convex optimization problem that can be solved at a reasonably computational cost. This will involve aspects of PDE analysis, control systems, finite element analysis, and computational optimization."}, {"id": "AW05", "title": "Estimation and Sensing of Fluid Flows Using Sliding Mode Observers", "supervisor": "Wynn, Andrew Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Control Systems", "PIV"], "description": "A fundamental and practically important question in fluid mechanics is how to best estimate the current state of a fluid flow, given only sensor readings such as boundary pressure measurements, or planar PIV data. This question is hard due to both the dynamic complexity of fluid flows and the relative sparsity of typical sensor information in practical situations. This project will investigate how to use the nonlinear state estimation technique of sliding mode observers to try to solve the fundamental problem in fluid mechanics. Estimator design is covered in 3rd year control systems for linear systems, while this project will consider nonlinear extensions of this method required to solve nonlinear problems in fluid mechanics. Examples from turbulent channel flows will be considered as part of the project."}];
        let starredIds = new Set(JSON.parse(localStorage.getItem('starredProjects') || '[]'));
        let hiddenIds = new Set(JSON.parse(localStorage.getItem('hiddenProjects') || '[]'));
        let finalIds = new Set(JSON.parse(localStorage.getItem('finalProjects') || '[]'));
        let showShortlistOnly = false;
        let showHiddenOnly = false;
        let showFinalOnly = false;
        let showSpaceOnly = false;
        let showTermsOnly = false;
        let expandedIds = new Set();
        let allTextExpanded = false;

        // Pseudo-option so projects without any detected skills can still be
        // narrowed down via the Skills section instead of always showing.
        const NO_SKILLS = '(No software listed)';
        // group -> option name -> badge element, for live count updates
        const badgeEls = { categories: {}, skills: {}, supervisors: {} };
        
        // Everything starts checked. Within each group, a project stays
        // visible as long as AT LEAST ONE of its tags is still checked —
        // so unchecking options progressively narrows the list, and
        // "None + re-check X" shows exactly the projects tagged X.
        let excluded = {
            categories: new Set(),
            skills: new Set(),
            supervisors: new Set()
        };

        function init() {
            syncThemeButton();
            buildSidebar();
            restoreState();
            updateShortlistUI();
            updateHiddenUI();
            updateFinalUI();
            document.getElementById('spaceCount').innerText = projectsData.filter(p => p.space).length;
            document.getElementById('termsCount').innerText = projectsData.filter(p => p.bothTerms).length;
            renderProjects();
            document.getElementById('searchInput').addEventListener('input', renderProjects);
        }

        // ---- Filter/search/toggle persistence across reloads ----
        const STATE_KEY = 'dashboardFilters';

        function saveState() {
            localStorage.setItem(STATE_KEY, JSON.stringify({
                excluded: {
                    categories: [...excluded.categories],
                    skills: [...excluded.skills],
                    supervisors: [...excluded.supervisors]
                },
                search: document.getElementById('searchInput').value,
                // The Space and Equal Effort toggles deliberately reset to
                // OFF on every load, so they are not saved here.
                showShortlistOnly, showHiddenOnly, showFinalOnly
            }));
        }

        function restoreState() {
            let saved = null;
            try { saved = JSON.parse(localStorage.getItem(STATE_KEY)); } catch (e) {}
            if (!saved) return;

            // Re-apply unchecked options via the checkboxes that actually
            // exist, so stale values (e.g. after the PDF is re-parsed with
            // different tags) are dropped silently.
            const savedEx = saved.excluded || {};
            document.querySelectorAll('input[data-group]').forEach(cb => {
                const group = cb.dataset.group;
                if ((savedEx[group] || []).includes(cb.value)) {
                    cb.checked = false;
                    excluded[group].add(cb.value);
                }
            });

            document.getElementById('searchInput').value = saved.search || '';
            showShortlistOnly = !!saved.showShortlistOnly;
            showHiddenOnly = !!saved.showHiddenOnly;
            showFinalOnly = !!saved.showFinalOnly;
            if (showShortlistOnly) document.getElementById('btnShortlist').classList.add('active');
            if (showHiddenOnly) document.getElementById('btnHidden').classList.add('active-hidden');
            if (showFinalOnly) document.getElementById('btnFinal').classList.add('active-final');
            updateActiveCount();
        }

        function syncThemeButton() {
            const dark = document.documentElement.getAttribute('data-theme') === 'dark';
            const btn = document.getElementById('themeToggle');
            btn.innerText = dark ? '☀️' : '🌙';
            btn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
        }

        function toggleTheme() {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
            syncThemeButton();
        }

        function getCounts(field) {
            const counts = {};
            projectsData.forEach(p => {
                let items = Array.isArray(p[field]) ? p[field] : [p[field]];
                items.forEach(item => {
                    if(item && item.trim() !== '') {
                        counts[item] = (counts[item] || 0) + 1;
                    }
                });
            });
            return Object.entries(counts).sort((a, b) => b[1] - a[1]);
        }

        function buildSidebar() {
            const container = document.getElementById('filtersContainer');
            container.innerHTML = '';

            const createSection = (title, items, filterKey) => {
                if (items.length === 0) return;
                const section = document.createElement('div');
                section.className = 'filter-section';
                section.innerHTML = `<h3><span>${title} <span style="font-weight:normal; text-transform:none;">(${items.length})</span></span>
                    <span style="font-weight:normal; text-transform:none;">
                        <a href="#" onclick="setGroup('${filterKey}', true); return false;" style="color: var(--primary);">All</a> /
                        <a href="#" onclick="setGroup('${filterKey}', false); return false;" style="color: var(--primary);">None</a>
                    </span></h3>`;

                items.forEach(([name, count]) => {
                    const label = document.createElement('label');
                    label.className = 'checkbox-label';
                    label.innerHTML = `
                        <div style="display:flex; align-items:center; overflow:hidden; padding-right:8px;">
                            <input type="checkbox" checked value="${name}" data-group="${filterKey}" onchange="toggleFilter(this)">
                            <span style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;" title="${name}">${name}</span>
                        </div>
                        <span class="badge-count">${count}</span>
                    `;
                    badgeEls[filterKey][name] = label.querySelector('.badge-count');
                    section.appendChild(label);
                });
                container.appendChild(section);
            };

            const skillCounts = getCounts('skills');
            const noSkillCount = projectsData.filter(p => p.skills.length === 0).length;
            if (noSkillCount > 0) skillCounts.push([NO_SKILLS, noSkillCount]);

            createSection('Categories', getCounts('categories'), 'categories');
            createSection('Skills & Software', skillCounts, 'skills');
            createSection('Supervisors', getCounts('supervisor'), 'supervisors');
        }

        // Keep sidebar counts in sync with what is actually on screen
        function updateBadges(filtered) {
            const counts = { categories: {}, skills: {}, supervisors: {} };
            filtered.forEach(p => {
                p.categories.forEach(c => counts.categories[c] = (counts.categories[c] || 0) + 1);
                if (p.skills.length === 0) {
                    counts.skills[NO_SKILLS] = (counts.skills[NO_SKILLS] || 0) + 1;
                }
                p.skills.forEach(s => counts.skills[s] = (counts.skills[s] || 0) + 1);
                counts.supervisors[p.supervisor] = (counts.supervisors[p.supervisor] || 0) + 1;
            });
            for (const group of Object.keys(badgeEls)) {
                for (const [name, el] of Object.entries(badgeEls[group])) {
                    const n = counts[group][name] || 0;
                    el.innerText = n;
                    el.style.opacity = n === 0 ? '0.45' : '1';
                }
            }
        }

        function toggleFilter(checkbox) {
            const group = checkbox.dataset.group;
            if (checkbox.checked) {
                excluded[group].delete(checkbox.value);
            } else {
                excluded[group].add(checkbox.value);
            }
            updateActiveCount();
            renderProjects();
        }

        function setGroup(group, checked) {
            document.querySelectorAll(`input[data-group="${group}"]`).forEach(cb => {
                cb.checked = checked;
                if (checked) {
                    excluded[group].delete(cb.value);
                } else {
                    excluded[group].add(cb.value);
                }
            });
            updateActiveCount();
            renderProjects();
        }

        function updateActiveCount() {
            const total = excluded.categories.size + excluded.skills.size + excluded.supervisors.size;
            document.getElementById('selectedCount').innerText = `${total} option${total === 1 ? '' : 's'} removed`;
        }

        function resetFilters() {
            excluded.categories.clear();
            excluded.skills.clear();
            excluded.supervisors.clear();
            document.querySelectorAll('.sidebar input[type="checkbox"]').forEach(cb => cb.checked = true);
            document.getElementById('searchInput').value = '';
            clearViews();
            showSpaceOnly = false;
            document.getElementById('btnSpace').classList.remove('active-space');
            showTermsOnly = false;
            document.getElementById('btnTerms').classList.remove('active-terms');
            updateActiveCount();
            renderProjects();
        }

        // The three views (shortlist / final / hidden) are mutually exclusive
        function clearViews() {
            showShortlistOnly = false;
            document.getElementById('btnShortlist').classList.remove('active');
            showFinalOnly = false;
            document.getElementById('btnFinal').classList.remove('active-final');
            showHiddenOnly = false;
            document.getElementById('btnHidden').classList.remove('active-hidden');
        }

        function toggleShortlistFilter() {
            const turnOn = !showShortlistOnly;
            clearViews();
            showShortlistOnly = turnOn;
            if (turnOn) document.getElementById('btnShortlist').classList.add('active');
            renderProjects();
        }

        function toggleFinalFilter() {
            const turnOn = !showFinalOnly;
            clearViews();
            showFinalOnly = turnOn;
            if (turnOn) document.getElementById('btnFinal').classList.add('active-final');
            renderProjects();
        }

        function toggleHiddenFilter() {
            const turnOn = !showHiddenOnly;
            clearViews();
            showHiddenOnly = turnOn;
            if (turnOn) document.getElementById('btnHidden').classList.add('active-hidden');
            renderProjects();
        }

        function toggleTermsFilter() {
            // Constraint like the space toggle — combines with everything else
            showTermsOnly = !showTermsOnly;
            const btn = document.getElementById('btnTerms');
            showTermsOnly ? btn.classList.add('active-terms') : btn.classList.remove('active-terms');
            renderProjects();
        }

        function toggleSpaceFilter() {
            // An eligibility constraint, not a view — combines with the
            // shortlist and hidden views instead of replacing them
            showSpaceOnly = !showSpaceOnly;
            const btn = document.getElementById('btnSpace');
            showSpaceOnly ? btn.classList.add('active-space') : btn.classList.remove('active-space');
            renderProjects();
        }

        function toggleStar(id) {
            if (starredIds.has(id)) {
                starredIds.delete(id);
            } else {
                starredIds.add(id);
            }
            localStorage.setItem('starredProjects', JSON.stringify(Array.from(starredIds)));
            updateShortlistUI();
            renderProjects();
        }

        // Moves a shortlisted project to the final list; clicking again on a
        // final-list card sends it back to the shortlist
        function toggleFinal(id) {
            if (finalIds.has(id)) {
                finalIds.delete(id);
                starredIds.add(id);
            } else {
                finalIds.add(id);
                starredIds.delete(id);
            }
            localStorage.setItem('finalProjects', JSON.stringify(Array.from(finalIds)));
            localStorage.setItem('starredProjects', JSON.stringify(Array.from(starredIds)));
            updateShortlistUI();
            updateFinalUI();
            renderProjects();
        }

        function toggleHide(id) {
            if (hiddenIds.has(id)) {
                hiddenIds.delete(id);
            } else {
                hiddenIds.add(id);
                // A hidden project shouldn't linger on the shortlist or final list
                if (starredIds.has(id)) {
                    starredIds.delete(id);
                    localStorage.setItem('starredProjects', JSON.stringify(Array.from(starredIds)));
                    updateShortlistUI();
                }
                if (finalIds.has(id)) {
                    finalIds.delete(id);
                    localStorage.setItem('finalProjects', JSON.stringify(Array.from(finalIds)));
                    updateFinalUI();
                }
            }
            localStorage.setItem('hiddenProjects', JSON.stringify(Array.from(hiddenIds)));
            updateHiddenUI();
            renderProjects();
        }

        function updateShortlistUI() {
            document.getElementById('shortlistCount').innerText = starredIds.size;
        }

        function updateHiddenUI() {
            document.getElementById('hiddenCount').innerText = hiddenIds.size;
        }

        function updateFinalUI() {
            document.getElementById('finalCount').innerText = finalIds.size;
        }

        // Expand or shrink the description text on every tile at once
        function toggleAllText() {
            allTextExpanded = !allTextExpanded;
            expandedIds = allTextExpanded ? new Set(projectsData.map(p => p.id)) : new Set();
            document.getElementById('btnText').innerText = allTextExpanded ? '⤡ Shrink Text' : '⤢ Expand Text';
            renderProjects();
        }

        function escapeHtml(s) {
            return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        }

        // Turn raw URLs into short clickable links that open in a new tab
        function linkify(text) {
            return escapeHtml(text).replace(/(https?:\/\/[^\s<]+|www\.[^\s<]+)/g, m => {
                let url = m, trail = '';
                // Leave sentence punctuation (and unbalanced parens) outside the link
                while (/[.,;:!?)\]]$/.test(url)) {
                    if (url.endsWith(')') && (url.match(/\(/g) || []).length >= (url.match(/\)/g) || []).length) break;
                    trail = url.slice(-1) + trail;
                    url = url.slice(0, -1);
                }
                const href = url.startsWith('www.') ? 'https://' + url : url;
                let label = url.replace(/^https?:\/\/(www\.)?/, '');
                if (label.length > 50) label = label.slice(0, 47) + '…';
                return `<a class="desc-link" href="${href}" target="_blank" rel="noopener" title="${href}">${label}</a>${trail}`;
            });
        }

        function formatDescription(text) {
            if (!text) return '<i>No detailed description available.</i>';

            // Pull a trailing "References:" section into its own styled block
            let refsHtml = '';
            const rm = text.match(/^([\s\S]*?)\s*\bReferences?\s*:\s*([\s\S]+)$/);
            if (rm && rm[2].length < text.length * 0.6) {
                text = rm[1];
                refsHtml = linkify(rm[2]).replace(/\n/g, '<br>').replace(/\s+(?=\[\d+\])/g, '<br>');
            }

            // Newlines from the extractor separate paragraphs and list items
            let html = '', listOpen = false;
            for (const line of text.split('\n')) {
                const li = line.match(/^•\s*(.*)$/);
                if (li) {
                    if (!listOpen) { html += '<ul>'; listOpen = true; }
                    html += `<li>${linkify(li[1])}</li>`;
                } else {
                    if (listOpen) { html += '</ul>'; listOpen = false; }
                    const cls = /^\[\d+\]\s/.test(line) ? ' class="ref-item"'
                        : /^(\(?\d{1,2}[).]|[ivx]{1,4}\))\s/.test(line) ? ' class="num-item"'
                        : '';
                    html += `<p${cls}>${linkify(line)}</p>`;
                }
            }
            if (listOpen) html += '</ul>';
            if (refsHtml) html += `<div class="refs"><b>References:</b><br>${refsHtml}</div>`;
            return html;
        }

        function toggleDescription(btn, id) {
            const desc = btn.previousElementSibling;
            if (expandedIds.has(id)) {
                expandedIds.delete(id);
            } else {
                expandedIds.add(id);
            }
            desc.classList.toggle('expanded');
            btn.innerText = desc.classList.contains('expanded') ? 'Show less ▲' : 'Read full description ▼';
        }

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            const searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
            const prevScroll = grid.scrollTop;
            grid.innerHTML = '';

            const filtered = projectsData.filter(p => {
                // The default view shows only undecided projects: starred,
                // final and hidden ones each live in their own view.
                if (showHiddenOnly) {
                    if (!hiddenIds.has(p.id)) return false;
                } else if (showShortlistOnly) {
                    if (!starredIds.has(p.id)) return false;
                } else if (showFinalOnly) {
                    if (!finalIds.has(p.id)) return false;
                } else {
                    if (hiddenIds.has(p.id) || starredIds.has(p.id) || finalIds.has(p.id)) return false;
                }

                if (showSpaceOnly && !p.space) return false;
                if (showTermsOnly && !p.bothTerms) return false;

                if (searchQuery) {
                    const matchText = `${p.id} ${p.title} ${p.supervisor} ${p.description} ${p.skills.join(' ')} ${p.categories.join(' ')}`.toLowerCase();
                    if (!matchText.includes(searchQuery)) return false;
                }

                // Within each group: visible if at least one tag is checked
                if (excluded.supervisors.has(p.supervisor)) return false;
                if (!p.categories.some(c => !excluded.categories.has(c))) return false;
                const skillTags = p.skills.length === 0 ? [NO_SKILLS] : p.skills;
                if (!skillTags.some(s => !excluded.skills.has(s))) return false;

                return true;
            });

            updateBadges(filtered);

            document.getElementById('resultsCount').innerText = `Showing ${filtered.length} of ${projectsData.length} projects`;

            if (filtered.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--text-light); background: var(--card-bg); border-radius: 12px; border: 1px dashed var(--border);">
                    <h3 style="color: var(--text-mid); margin-bottom: 8px;">No projects match your exact filters</h3>
                    <p style="font-size: 0.9rem;">Try re-checking some removed options or clearing your search query.</p>
                </div>`;
                return;
            }

            filtered.forEach(p => {
                const isStarred = starredIds.has(p.id);
                const isHidden = hiddenIds.has(p.id);
                const isFinal = finalIds.has(p.id);
                const card = document.createElement('div');
                card.className = 'card';

                const tagsHtml = [
                    ...p.categories.map(c => `<span class="tag tag-cat">${c}</span>`),
                    ...p.skills.map(s => `<span class="tag tag-skill">${s}</span>`)
                ].join('');

                const starBtn = `<button class="btn-star ${isStarred ? 'starred' : ''}" onclick="toggleStar('${p.id}')" title="Add to Shortlist">★</button>`;
                const hideBtn = isHidden
                    ? `<button class="btn-hide restore" onclick="toggleHide('${p.id}')" title="Restore project">↩</button>`
                    : `<button class="btn-hide" onclick="toggleHide('${p.id}')" title="Hide project">✕</button>`;
                // Shortlisted cards get a promote button; final-list cards a demote one
                const promoteBtn = `<button class="btn-final" onclick="toggleFinal('${p.id}')" title="Send to final list">✓</button>`;
                const demoteBtn = `<button class="btn-final infinal" onclick="toggleFinal('${p.id}')" title="Remove from final list (back to shortlist)">✓</button>`;
                let actions;
                if (isHidden) actions = hideBtn;
                else if (isFinal) actions = demoteBtn;
                else if (isStarred) actions = promoteBtn + starBtn + hideBtn;
                else actions = starBtn + hideBtn;

                card.innerHTML = `
                    <div>
                        <div class="card-header">
                            <span style="display:flex; gap:6px; align-items:center;">
                                <span class="proj-id">#${p.id}</span>
                                ${p.space ? '<span class="space-badge" title="Space-related project — pickable by the spacecraft course">🚀 S</span>' : ''}
                                ${p.bothTerms ? '<span class="term-badge" title="Marked * in the PDF: effort must be evenly distributed between the autumn and spring/summer terms">✱ Equal effort</span>' : ''}
                            </span>
                            <div class="card-actions">${actions}</div>
                        </div>
                        <h3>${p.title}</h3>
                        <div class="supervisor">👤 ${p.supervisor}</div>
                        <div class="description ${expandedIds.has(p.id) ? 'expanded' : ''}">${formatDescription(p.description)}</div>
                        ${p.description && p.description.length > 200 ? `<button class="btn-more" onclick="toggleDescription(this, '${p.id}')">${expandedIds.has(p.id) ? 'Show less ▲' : 'Read full description ▼'}</button>` : ''}
                    </div>
                    <div class="tags-container">
                        ${tagsHtml}
                    </div>
                `;
                grid.appendChild(card);
            });

            // Keep the user's place instead of jumping back to the top
            // whenever a star/hide/filter change re-renders the grid
            grid.scrollTop = prevScroll;

            // Every state change goes through a re-render, so persisting
            // here covers filters, search, and the view toggles in one place
            saveState();
        }

        window.onload = init;
    </script>
</body>
</html>
