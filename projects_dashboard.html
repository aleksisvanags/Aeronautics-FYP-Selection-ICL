s to focus the beam of positively charged particles, analogous to an optical lens. Traditionally, the plasma lens is formed of electrons confined in a configuration of electric and magnetic fields. The aim of this project is to investigate a new approach based on negatively charged ions that are trapped using inertial electrostatic confinement.\nThis project will make use of an existing code, PlasmaSim, that is written in Julia language. No prior plasma physics experience is necessary, but I\u2019m looking for students with an openness to learn new things. Through this project you will learn many practical skills that are specific to modelling plasmas numerically, so it\u2019s an ideal opportunity for those interested in becoming involved in the field of applied plasma physics."}, {"id": "AK02", "title": "Design of a Compact Plasma Toroid Generator", "supervisor": "Knoll, Aaron Dr", "space": true, "bothTerms": false, "categories": ["Analysis", "Design", "Theoretical"], "skills": ["Autodesk Fusion 360", "Turbulence"], "description": "The pursuit of fusion energy through magnetic plasma confinement is an enduring challenge for humankind. While generating the required temperatures and pressures needed to produce fusion energy is theoretically possible, natural instabilities and turbulence occurring within the plasma allow the high energy particles to escape the magnetic field and rapidly drain energy from the system.\nThe goal of this project is to design an experimental test-bed to study the turbulence within a magnetically confined plasma, and investigate possible strategies to control (tame) this turbulence. This project will involve the development of a generator for a compact plasma toroid \u2013 a self-stable magnetically confined plasma structure, with a donut-like shape. This project builds on three previous MSc/MEng projects (2020/21, 2021/22, 2022/23, 2025/26)."}, {"id": "AK03", "title": "Design of a 3-Axis Langmuir Probe Instrument for Plasma Thruster Plume Characterization", "supervisor": "Knoll, Aaron Dr", "space": true, "bothTerms": false, "categories": ["Design", "Theoretical"], "skills": ["Autodesk Fusion 360", "LabVIEW", "Propulsion"], "description": "A Langmuir probe instrument is used to directly measure physical properties of a plasma including density, temperature and potential (voltage). To understand/verify the underlying physics of operation of plasma thrusters, it is useful to profile the plasma parameters of the thruster plume over a 3-dimensional volume. The purpose of this project is to construct a 3-axis translating Langmuir probe instrument capable of surveying the plasma properties with minimal disruption to the plasma thruster discharge. The translation mechanism will operate within a vacuum chamber environment, and interface with an external PC via LabView. This project builds on the design that was developed during an MSc project in 2019/20. It is anticipated that this instrument will play an essential role in future experimental activities conducted within Imperial\u2019s Plasma Propulsion Lab."}, {"id": "AK04", "title": "Experimental Testing of an E\u00d7B Probe for Plasma Thruster Plume Characterization", "supervisor": "Knoll, Aaron Dr", "space": true, "bothTerms": false, "categories": ["Analysis", "Experimental", "Experimental: Ready-Made Experiment"], "skills": ["CAD", "LabVIEW", "MATLAB", "Propulsion", "Spacecraft"], "description": "An E\u00d7B probe is an instrument used to measure the velocity and charge state of ions. While there are various methods for determining the average velocity of an ion beam, the advantage of the E\u00d7B probe is that it also distinguishes the velocity of each ion type (singly ionized, doubly ionized, triply ionized, etc.). The aim of this project is to experimentally qualify a new E\u00d7B probe that can be used to measure the plume of spacecraft plasma thruster (Electric Thruster) within Imperial\u2019s new large vacuum test facility: the Boltzmann Vacuum Chamber. This will involve the initial testing of the probe, as well as the development of a LabView software interface to collect and analyse the data. It is anticipated that this instrument will play an essential role in future experimental activities conducted within Imperial\u2019s Plasma Propulsion Lab. This project builds on four prior MSc projects (2019-20, 2020-21, 2022-23, 2025-26) that involved the theory, sizing, CAD modelling and construction of the probe. No prior plasma physics experience is necessary, but I\u2019m looking for students with an openness to learn new things. Through this project you will learn concepts and theory related to applied plasma physics, so it\u2019s an ideal opportunity for those interested in becoming involved in the field of spacecraft electric propulsion."}, {"id": "AK05", "title": "Conceptual Design of a Hypersonic Wind Tunnel for Very Low Earth Orbit Conditions", "supervisor": "Knoll, Aaron Dr", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Design"], "skills": ["C++", "Hypersonics", "Julia", "LEO", "MATLAB", "Propulsion", "Satellite", "Spacecraft", "Wind Tunnel"], "description": "There is a growing interest within the research communities and spacecraft industry to achieve air breathing electric propulsion at Very Low Earth Orbit (VLEO) conditions. A number of exciting propulsion concepts have already been proposed, which can sustain the orbital altitude of VLEO satellites using the rarified atmosphere in orbits between 250 to 350 km altitudes.\nOne of the key challenges in VLEO propulsion development is a lack of test facilities that replicate the conditions in a VLEO orbit. This project will investigate a \"VLEO wind tunnel\" that uses an plasma thruster to accelerate a population of ions to orbital velocities, followed by a charge neutralization and screening chamber to transform the charged ion beam into a neutral particle beam that will enter a test cell. The aim of the project is to create a conceptual design of a facility that can recreate the atmospheric composition, density, and velocity encountered in VLEO conditions."}, {"id": "AK06", "title": "System-Level Trade Study for a MicroGEO Satellite Using Gridded Ion Thrusters", "supervisor": "Knoll, Aaron Dr", "space": true, "bothTerms": false, "categories": ["Analysis", "Design"], "skills": ["Propulsion", "Satellite"], "description": "This project is done in collaboration with Thales Alenia Space UK, who helped prepare the project briefing below.\nIntroduction and Study Case The GEOsat industry has a current value of \u20ac17.88 billion (projected to reach \u20ac22.54 billion by 2030). Within this, MicroGEO Satellites represent a fast-growing market segment. In 2023, three-quarters of GEOsat orders were in this category. The rise of reconfigurable satellites capable of performing both broadcast and broadband functions is expected to further grow the market and increase the number of GEOsat launches per year. The GEOsat segment remains the highest-revenue part of the commercial satellite industry and is evolving, with new mission profiles emerging.\nThe MicroGEO satellite (up to 500 kg) is defined by the high cost of orbit access typical of GEO, high reliability standards for long-duration missions (>15 years), but reduced development, manufacture costs and deployment time.\nFor example, MicroGEO sat launched in 2024 include those capable of orbit relocation to serve multiple customers. Due to maturity, MicroGEO satellite propulsion has defaulted to chemical and Hall Effect Thruster (HET) systems, both characterized by low specific impulse and limited lifetime. Gridded Ion Thrusters (GITs), historically HET competitors, are more complex and costly to develop but offer unmatched specific impulse and lifetime. This notable increase enables longer-duration GEO missions and therefore increased revenue for satellites in operation.\nAnalysis of Business segment and Mission needs What are the proposed different business models?\n\u2022 S/C owned by the TeleCOM entity vs S/C operated by the manufacturer to sell service on demand to different customers\n\u2022 Fixed Geo orbit position vs orbital relocation to serve customers in different geographical locations\n\u2022 Existing business cases: Astranis and Swiss12 Mission Needs\n\u2022 Top level mission requirements: Mass/Volume (fairing allocation, n. of units)\n\u2022 Redundancy -> multiple satellites\n\u2022 Delta-V needs and mission lifetime\n\u2022 EP propulsion class: power, thrust, ISP. HETs vs GIEs trade-off\n\u2022 Size, mass, ISP Thrust, Thrust to power, lifetime Impact on S/C system\n\u2022 Impact on orbit raising (if needed), manoeuvring time, orbit relocation\n\u2022 Impact on Business / service, cost of orbit raising and orbit relocation delay"}, {"id": "SL01", "title": "Quantum Algorithms to Solve PDEs", "supervisor": "Laizet, Sylvain Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Numerical", "Theoretical"], "skills": [], "description": "Many scientific events can be explained by tracking the changes of a specific variable over space and time, which is typically represented by a partial differential equation (PDE). These equations are pervasive across various fields, from the study of plasmas and fluid dynamics to finance and biological systems, but they can be incredibly difficult to solve. Using quantum computers to solve PDEs more efficiently than current conventional methods could greatly hasten advancements in science. Despite the plethora of quantum algorithms suggested for tackling PDEs, the extent of their practical advantage remains uncertain. Quantum algorithms for tackling PDEs fall into two distinct groups: fully quantum algorithms, which utilise quantum circuits to manipulate the quantum state in accordance with the relevant PDE, and hybrid quantum-classical algorithms, in which a quantum computer plays a role in a broader classical computing process. In this project, various existing quantum algorithms will be implemented and tested to evaluate their performance for solving a wide range of PDEs."}, {"id": "SL02", "title": "Learning to Optimise Wind Farms with Machine Learning Algorithms", "supervisor": "Laizet, Sylvain Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Numerical"], "skills": ["Deep Learning", "Machine Learning", "Reinforcement Learning"], "description": "Wind farm optimisation presents a complex challenge involving multiple variables such as turbine placement, wind dynamics, and operational parameters. Machine learning algorithms offer promising solutions by analysing vast datasets to extract specific patterns. This research project aims to develop novel ML approaches that can maximise energy output while minimising environmental impact and operational costs. The project will explore reinforcement learning for real-time turbine control, deep learning for wind pattern prediction, and evolutionary algorithms for optimal spatial configuration. The goal will be to significantly increase renewable energy production efficiency, contributing to global sustainability goals and reducing the cost of wind energy. Practical implementations will be tested through simulations and published data at existing wind farms."}, {"id": "SL03", "title": "Prediction Models for Gravity Currents", "supervisor": "Laizet, Sylvain Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["MATLAB", "Python"], "description": "Gravity currents are common in nature, either in the atmosphere due to sea-breeze fronts, in avalanches of airborne snow or debris flows, or in the ocean due to turbidity currents and river plumes. They are created by the release of a fixed volume of a heavy suspension into a lighter ambient fluid. The aim of this project is to investigate various models to predict the extent of gravity current in various configurations. The gravity current will be modelled by either the single- or the two-layer shallow-water equations, the two-layer equations being necessary to include the effects of the overlying fluid, which are important when the depth of the current is comparable to the depth of the overlying fluid. The key element of the project is the implementation of numerical methods which can deal with discontinuities. Comparison will be made with existing experimental and numerical data. Previous experience using Matlab or Python would be very useful but is not mandatory."}, {"id": "SL04", "title": "Wind Farm Power Maximisation with Analytical Wake Models", "supervisor": "Laizet, Sylvain Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["FLORIS", "Fatigue", "Python", "Turbulence"], "description": "Modern large\u2013scale offshore wind farms consist of multiple turbines clustered together usually in well\u2013structured formations. Such a clustering exhibits a number of drawbacks during the operation of the wind farm, as some of the downstream turbines will inevitably have to operate within the wake of the upstream ones. A wind turbine operating within a wake field is an issue for two reasons. First, the apparent reduction of its power output due to the wind speed de-acceleration and second an increase of the fatigue loads due to experiencing the upstream wake-laden turbulence. Power losses due to wake effects were recently reported to be in the order of 10\u201325 % while the fatigue\u2013related failures were reported to be around the same levels owing to a limited understanding of the offshore turbulence. To summarise, currently installed wind farms do not produce as much power as expected. Two common wind farm control strategies to deal with these issues are wake steering and axial induction control. Wake steering typically uses yaw misalignment of the turbines to redirect the wake around downstream turbines. In this project, optimisation campaigns will be performed for large-scale wind farms using FLORIS, which is a controls-focused wind farm simulation software incorporating steady-state engineering wake models into a performance-focused Python framework. The aim is to demonstrate the potential of wake steering to increase the power output of existing wind farms."}, {"id": "KL01", "title": "Image Recognition for Conservation and Preservation Science", "supervisor": "Lee, Koon-Yang Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Literature", "Numerical", "Survey"], "skills": ["AI", "Neural Networks", "Python"], "description": "The Oddy test is a simple conservation screening method used to see whether a material releases harmful gases that could damage museum objects, especially metals, in enclosed display cases. It works by sealing the test material with silver, copper, and lead coupons under warm, humid conditions and checking the metal for corrosion after about 28 days. Its main problems are that the results can be subjective, poorly reproducible, and sensitive to small differences in procedure or evaluator experience. It is also non-specific, so it shows that something is being emitted but not exactly what the pollutant is or how risky it will be in real use. We believe that AI and image recognition can help reduce the subjective nature of Oddy\u2011test interpretation by providing a more standardized, quantitative way to assess corrosion on the metal coupons. Instead of relying solely on a conservator\u2019s visual judgment, this project will train an image\u2011analysis model to interpret Oddy test results to reduce the \"subjectiveness\" in the test. You are expected to be proficient at Python for this project. Project keywords: Oddy test, corrosion, convolutional neural networks Recommended reading: Long, E.R., Bone, A., Breitung, E.M. et al. Automated corrosion detection in Oddy test coupons using convolutional neural networks. Herit Sci 10, 150 (2022). https://doi.org/10.1186/s40494-022-00778-3"}, {"id": "KL02", "title": "How Sustainable Is Sustainable Materials?", "supervisor": "Lee, Koon-Yang Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Design", "Literature", "Survey"], "skills": ["3DExperience", "Abaqus", "SimaPro"], "description": "If one were to do a quick search for \u201csustainable materials\u201d on Google, one could find numerous sustainable material innovations that could potentially reduce our dependency on fossil derived resources. In fact, many of the companies or research groups who invented these innovations will boldly claim that their materials are truly environmental friendly without any proof because they are using \u201csustainable feedstock\u201d. This is very misleading as using sustainable feedstock as the raw material does not automatically imply the final finished product is truly sustainable. The environmental impact associated with the processing of these sustainable feedstock could be higher than processing fossil-derived resources. In this project, the students will be supporting existing research activities in Professor Koon-Yang Lee\u2019s group on vegan friendly sustainable leather, biodegradable espresso coffee pods, flexible paper packaging and many other wood-derived biobased products by conducting lifecycle assessment (LCA) for these different material innovations.\nThe actual material and process to be modelled will be decided upon first meeting. Potential students taking on this project must have taken or is taking AERO70002 Advanced Manufacturing.\nProject keyword: Lifecycle assessment, sustainability, goal and scope definition, cradle-to-gate, cradle-to-grave, mid point and end point impact. Recommended reading: Kooduvalli K, Vaidya UK, Ozcan S. Life Cycle Assessment of Compostable Coffee Pods: A US University Based Case Study. Sci Rep. 2020 Jun 8;10(1):9158. doi: 10.1038/s41598-020-65058-1."}, {"id": "KL03", "title": "Materials Analysis Using Diffraction (MAUD): Can It Be Used for Semi-Crystalline Materials?", "supervisor": "Lee, Koon-Yang Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Literature", "Numerical"], "skills": ["MAUD"], "description": "Crystallinity refers to the degree at which the atoms or molecules are arranged in an orderly pattern, forming a crystalline structure. The higher the crystallinity, the higher the mechanical performance. Generally speaking, crystallinity of a material can be quantified using Rietveld refinement. However, this refinement method possess a significant challenge to the analysis of semi-crystalline materials. In particular, Rietveld refinement requires information about crystal lattice structure but the presence of an amorphous phase, by the very definition, does not have a crystal lattice structures. In this project, students will be using developing a suitable protocol to use MAUD (https://luttero.github.io/maud/) to analyse the crystallinity of semi-crystalline materials, specifically cellulose.\nKeywords: Bragg's law, microstructure analysis, crystallography and symmetry, unit cell, least-squares optimisation, cellulose I alpha, cellulose I beta Recommended video: https://www.youtube.com/watch?v=ygDWgvs1cg8&t=208s"}, {"id": "EL01", "title": "Design of Small UAVs for Joined Formation Flight", "supervisor": "Levis, Errikos Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Design"], "skills": ["MATLAB", "UAV"], "description": "Current research into formation flying has concentrated on close or extended formation flying, which promises reductions of induced drag to a theoretical maximum of 50% for trailing aircraft. Joining multiple vehicles in flight would allow the wetted area and aspect ratio to be manipulated, optimising the swarm for the intended mission. For example joining the lifting surfaces of just two aircraft side by side could result in increases of up to 40% in endurance or 20% in range. Even greater improvements in range, and an increase in optimum cruise speed would be obtained if the wings of the aircraft were to overlap, reducing the overall wetted area and associated viscous drag and increasing the overall wing loading. Past work has shown substantial improvements in aerodynamic performance are possible but highlighted issues with vehicle stability and the added weight of joining mechanisms. This project will concentrate on the effect of different joining formations on the vehicle's overall mission performance."}, {"id": "EL02", "title": "Design and Optimization of Wing-In-Ground Effect Vehicles", "supervisor": "Levis, Errikos Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Design"], "skills": ["Aerodynamics", "MATLAB"], "description": "The Wing-In-Ground Effect (WIG) concept has been around for some time and was investigated in depth by Soviet designers, resulting in number of vehicles known as Ekranoplans. Due to the potential reduction in drag achieved by flying in close proximity to the ground the concept has recently been revived by Boeing and other research institutes. Flying near the surface however does also complicate the aerodynamics and stability of the craft. The project will build on the work of previous students to design and optimize sample aircraft and evaluate the effect that size and operating points have on their performance and thus commercial viability."}, {"id": "EL03", "title": "Prediction of Seaplane Hull Hydrodynamics", "supervisor": "Levis, Errikos Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["MATLAB", "Machine Learning", "Python"], "description": "Predicting the hydrodynamic performance of planning hulls is a key step in determining the thrust requirement for seaplanes. While some semi-empirical methods have been developed in the past they fail to capture the hull's behaviour throughout the different regimes encountered during takeoff and landing. This project will thus aim to make use of machine learning tools to develop better design methods for seaplane hulls."}, {"id": "EL04", "title": "Hybrid-Electric/Distributed Propulsion for Aircraft", "supervisor": "Levis, Errikos Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Design"], "skills": ["Propulsion"], "description": "In June 2016, NASA announced that the X-57 research plane would be used to study the aerodynamic and propulsive efficiency improvements made possible by the use of hybrid electric distributed propulsion systems. Projects on this area will build on the work of past students and concentrate on:\n1) Investigating the applicability of such technologies to aircraft of different types and sizes.\n2) The design and optimization of a wing-distributed propulsion system.\n3) The effects that using such systems may have on the stability and controllability of aircraft.\n4) The design & optimization of hybrid electric aircraft for minimum cost vs CO2 and the impact of extraneous factors A good understanding of the principles of aircraft design and good coding skills are required."}, {"id": "EL05", "title": "Approximating Real Aircraft Flight Models Using Flight Path Data", "supervisor": "Levis, Errikos Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": [], "description": "This project will aim to develop methods of approximating key performance metrics of aircraft using freely available ADS-B flight tracking data. Students applying for this project will require a strong understanding of aircraft performance and have an interest in learning about aircraft operations."}, {"id": "EL06", "title": "Development of a Static Bleriot XI Flight Simulator with Force Feedback Controls", "supervisor": "Levis, Errikos Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Design", "Experimental: Manufacturing Intensive"], "skills": ["Aerodynamics", "Control Systems"], "description": "The department is working with a team intending to reproduce a historical air race, using simulators of the Bleriot XI aircraft. This project thus aims to develop a prototype of a fixed base flight simulator for a Bleriot XI. The project is composed of two sub-projects, namely the development of a flight model for the aircraft, and the design of the flight simulator hardware. The flight model will be developed using technical data from one (or more) of the surviving aircraft, coupled with analytical and computational methods to further characterise its aerodynamics and flight mechanics.\nTo develop the prototype flight simulator, students will have to consider the original aircraft's layout, as well as manufacturing and budgetary constraints in order to develop, prototype and test solutions for the simulator's control system. The development of a hardware solution will include developing an interface with the flight simulation software."}, {"id": "QL01", "title": "Nanoparticle Reinforced Lightweight Metal Composites via Melt Stirring", "supervisor": "Li, Qianqian Dr", "space": true, "bothTerms": false, "categories": ["Experimental", "Experimental: Manufacturing Intensive", "Experimental: Ready-Made Experiment"], "skills": ["Composite"], "description": "Nanoparticles such as nanocarbon and nano-SiC have attracted great attention as reinforcements in composites due to their excellent physical and mechanical properties. They are considered as ideal reinforcements to produce composites. Much research has been done on polymer composites; while metal composites have not been fully exploited due to the more difficult production process and more complicated reinforcing mechanisms, despite hugh potential of such composites. In this project, the student will produce nanoparticle reinforced magnesium composites via melting route and investigate the composites mechanical properties and microstructure. The production parameters will be investigated and optimised."}, {"id": "QL02", "title": "Nanocarbon Based Thermoplastic Composites: Manufacturing and Characterisation", "supervisor": "Li, Qianqian Dr", "space": true, "bothTerms": false, "categories": ["Experimental", "Experimental: Manufacturing Intensive", "Experimental: Ready-Made Experiment"], "skills": ["Composite"], "description": "Nanocarbon such as carbon nanotubes and graphene based polymer composites have become a hot topic in composites in recent years. This is due to nanocarbon extraordinary physical and mechanical properties (very high Young\u2019s modulus, high electrical conductivity etc.), which makes it a highly interesting candidate for multifunctional composites. In this project, the student will optimise the production process and check the influence of the different parameters on the procedure (e.g. different concentration of graphene, different dispersion methods\u2026) and manufacture such composites using casting and hot pressing. Characterisation of the mechanical properties, electrical and thermal conductivity of the composites will be a second focus point."}, {"id": "QL03", "title": "CFD Simulation of Nanoparticle Dispersion in Metal Melt", "supervisor": "Li, Qianqian Dr", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["CFD", "Composite", "Star-CCM+"], "description": "The use of carbon nanotubes (CNTs) in nano-composites is increasingly attracting interest due to their ability to increase the ductility and tensile properties of the composite. The focus of this project is on the use of CNTs in magnesium-based metal matrix composites (MMCs) which have extensive application in the automotive, aerospace and biomedical industries, especially for components working at temperatures above 150\u00b0C. Our interest is on MMCs produced using methods involving molten metal. The major drawback of this type of methods is that CNTs tend to agglomerate resulting in poor interfacial bonding between the CNTs and the metal matrix after solidification, which deteriorates the mechanical properties of the nano-composite.\nThis project aims at investigating, through flow simulations, suitable configurations of the stirrer and crucible in the furnace to promote shear stresses that can be used to reduce or ideally prevent agglomeration. The flow simulations will be performed using STARCCM+ and validated against experimental data. Initially we will consider SiC nano-whiskers (650 nm in diameter and 5 \u03bcm in length, rigid stick like) dispersing in magnesium melt at about 650 C. Then we will proceed to simulate melts with nano-particles of smaller diameters such as multiwall carbon nanotubes (15 nm diameter and 1 \u03bcm length, softer tube shape). As part of the investigation, we will assess a few furnace configurations with different nanoparticle concentration, energy input, stirring speed etc."}, {"id": "QL04", "title": "Elevated Temperature Mechanical Behaviour of High-Strength Aluminium Matrix Composites", "supervisor": "Li, Qianqian Dr", "space": true, "bothTerms": false, "categories": ["Experimental", "Experimental: Ready-Made Experiment"], "skills": ["Composite"], "description": "This project will investigate the mechanical performance of high-strength aluminium matrix composites (AMCs) across a range of temperatures relevant to aerospace and high-performance automotive applications. The focus will be on understanding how material composition and product form influence elevated-temperature tensile behaviour.\nA systematic design of experiments will be developed in collaboration with an industrial partner (Materion UK), considering variables such as alloy matrix composition, reinforcement fraction (e.g. SiC content), and product form (e.g. billet, bar, plate, or sheet).\nThe student will carry out mechanical testing (primarily tensile testing) from room temperature up to 200 \u00b0C, alongside detailed microstructural characterisation (e.g. optical microscopy and SEM). The aim is to establish clear processing-structure-property relationships and identify key factors governing performance.\nThe project offers strong potential for generating publishable results and will provide the student with experience in both experimental materials engineering and industry-relevant research."}, {"id": "RLI01", "title": "Sensitivity Studies of Aircraft Sizing and Cost to Top Level Aircraft Requirements (Including Environmental Metrics)", "supervisor": "Liem, Rhea Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Literature", "Theoretical"], "skills": ["AeroFuse", "Julia", "MATLAB"], "description": "Aircraft design is a highly multidisciplinary process, where changing one parameter in one discipline will change several others in other disciplines. This makes the process iterative (hence time consuming), since there is no closed-form solution in designing a system as complex as aircraft. There are some intuitions involved in the process (e.g., a larger aircraft will need a bigger engine and can typically fly faster) and some physicists have even shown that aircraft must obey some theoretical alometric rules, which put aircraft in the same category as birds and animals (e.g., a bigger bird also has bigger motive organs and also generally flies faster). However, some of the so-called intuitions are not easy to develop \u2013 as evident in the many students struggling with their aerospace vehicle design (AVD) projects! In this project, the student will work towards creating a \u201cdashboard\u201d that can show how aircraft sizing and cost are affected by top level aircraft requirements (TLARs) that drive aircraft design at the conceptual level. With the growing importance of environmental impact assessments in aviation, the TLARs might include some environmental metrics as well (e.g., fuel consumption, or even how contrail avoidance impact flight mission profile). Student can choose to focus on fundamental, theoretical studies (e.g., using the constructal law) or to use an existing open-source aircraft design framework AeroFuse (implemented using Julia programming with Pluto notebook interface) \u2013 or by combining both approaches. The deliverable of this project is expected to be able to help people (students, professionals, enthusiasts, hobbyists, etc.) have better intuition on aircraft design. More importantly, the dashboard can support decision-making processes in aircraft design."}, {"id": "RLI02", "title": "Developing and Using Statistical Physics Modelling to Study the Underlying, Unapparent Behaviours of Air Transportation Systems", "supervisor": "Liem, Rhea Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Theoretical"], "skills": ["Python"], "description": "Complexity science, or complex systems science, was established in the mid-1980s as a response to the emergence of complex systems (be it in physical, biological, or social systems). Complex systems are typically characterized by the presence of: (1) self-organisation, (2) interdependence and non-linearity, (3) connectivity, and (4) autonomy and adaptation. Understanding the connections and patterns of interaction between the components is key in understanding how the entire system behaves. However, with the above-mentioned characteristics, and the fact that the system can evolve, modelling and analysing complex systems are challenging.\nStatistical physics modelling has emerged as a reliable method to study the macroscopic behaviour of a complex system by modelling the microscopic interactions between the components/elements in the model. In a way, it can be perceived as a form of agent-based modelling, with each component acts as an agent. While this modelling approach might not be able to realistically represent the real-world system, it has several benefits, including generality and its ability to model hypothetical situations (thanks to its datafree approach). In addition, statistical physics modelling is typically computationally efficient.\nWe can find some demonstrated success of statistical physics modelling in studying diverse fields such as ground traffic, pedestrian traffic, social networks, and population dynamics.\nThe models can help identify phase transitions (e.g., from free-flow to congested in traffic-flow modelling) and critical density (e.g., when the traffic flow reaches its peak), which can be useful in designing relevant infrastructure. Despite its effectiveness in modelling ground and pedestrian traffic, its adoption to air traffic management (ATM) is still limited, owing to the higher level of complexity observed in aircraft movement. Some of these complexities are attributed to the ATM regulations and rules that aircraft must obey, as well as the reduced freedom of movement that aircraft encounter (e.g., an aircraft cannot freely turn like a pedestrian can, nor can it stop mid-air). Inspired and motivated by how statistical physics modelling has helped identify underlying behaviours in other traffic modes, this project is aimed to adapt statistical physics approach (e.g., cellular automaton [CA]) to suit aircraft traffic movement.\nIn this project, student will learn new topics such as statistical physics and air traffic. In addition to performing a literature review pertaining to these topics, the project will involve some theoretical work and a substantial amount of programming (mostly in Python)."}, {"id": "RLI03", "title": "Investigation of the Hydrodynamic, Aerodynamic, and Stability Requirements for Amphibious Firefighting Aircraft", "supervisor": "Liem, Rhea Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Theoretical"], "skills": ["Julia", "Python"], "description": "More frequent forest fires and wildfires have increased firefighting fleets in the recent years, motivating the development of amphibious firefighting aircraft equipped with a scooping mechanism. Some recent developments in Europe include: SEAGLE by Roadfour, FREGATE-100 by HYNAERO, and 19-01. Amphibious aircraft are defined as air vehicles that can take-off and land from both ground and water, offering operational flexibility especially in areas with rough terrain or with limited areas for proper runways. Designing such vehicles is notably more complex than designing their conventional counterparts, primarily due to the trade-off between aerodynamic and hydrodynamic performance, watertightness requirements, and additional water stability requirements. Designing an amphibious firefighting aircraft is therefore not an easy feat \u2013 in addition to the challenges mentioned above, we now also need to ensure the effectiveness and quality of scooping mechanism and determine the optimum flight conditions and performance during scooping. In this project, student will investigate the aerodynamic, hydrodynamic, and stability performance requirements during the scooping procedure. The project will involve theoretical studies and developing some code modules (in Python or Julia) for these disciplines, which will be crucial in the development of aircraft design and performance analysis framework for this special-purpose air vehicle."}, {"id": "RLI04", "title": "Investigating Formation Flight Implementation in Commercial Aviation", "supervisor": "Liem, Rhea Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature"], "skills": ["Python"], "description": "The aerodynamic benefits of formation flight have been demonstrated in literature, potentially reducing fuel consumption by 10% to 15%. However, their practical application in commercial aviation remains limited by current operational frameworks. Indeed, one of the major challenges in integrating formation flight strategy into the air transportation system is its coordination with the existing air traffic management system and route networks (i.e., flight schedules). Planned flight formations might not work as intended when some of the flights experience departure delays, which commonly occur. Existing studies are mostly limited to static flight missions, where mission parameters are determined pre-flight and without considering any air traffic management and airline operational constraints. This project goes beyond a feasibility study of formation flight implementation in commercial aviation. The student will incorporate operational constraints into the assessment of formation flight strategies suitable for commercial aviation and identify the trade-off between aerodynamic benefits and operational penalties (e.g., fuel penalties incurred when aircraft loiter or adjust speeds). Ideally, we want to find a break-even point where aerodynamic gain outweighs tactical cost (or show that such a point does not exist, or only exists under specific conditions). To close the study, the student is expected to discuss the required infrastructure and technological advancements (e.g., inter-aircraft communication system, wake tracking systems, improved wing design) to bring formation flights closer to real-world implementation in commercial aviation -- and how they can do so."}, {"id": "RLU01", "title": "Development of an Assistive Knee Brace - Experimental", "supervisor": "Lubbock, Roderick Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental", "Experimental: Manufacturing Intensive", "Experimental: Structures"], "skills": [], "description": "Knee problems such as osteoarthritis and sports injuries to cartilage and ligaments affect millions of people around the world, and can have severe impacts on patients\u2019 physical and mental health. Assistive knee braces allow these patients to live a more normal active lifestyle. Numerous knee brace designs have been proposed [1] however the design problem is far from solved. The aim of this project is to design, build and test an assistive knee brace. Students interested in this project must have a solid understanding of structural mechanics and mechanical design and must be confident in designing, building and testing prototypes and carrying out laboratory experiments.\n[1] L. Zhang, G. Liu, B. Han, Z. Wang, H. Li and Y. Jiao, \"Assistive devices of human knee joint: A review\", Robotics and Autonomous Systems, vol. 125, p. 103394, 2020. Available: 10.1016/j.robot.2019.103394."}, {"id": "RLU02", "title": "A Spatial Impulse Response Technique for Improving the Frequency Response of Thermocouple Probes", "supervisor": "Lubbock, Roderick Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Experimental", "Theoretical"], "skills": [], "description": "Thermocouple probes are ubiquitous in the field flow temperature measurement however they are limited by their low frequency response due to the large thermal inertia of the bead.\nThis experimental project looks at improving the probe frequency response for a given flow by deriving the probe impulse response by traversing it through a spatially varying temperature field at different known velocities. This technique has already been shown to work for pressure probes [1].\nThe project was undertaken previously by an MSc student who obtained some promising results, however there were some significant shortcomings in his experiments. The aim of this project is to repeat these experiments and obtain improved data with the aim of a draft journal paper by the end of the project.\nThe project will make use of an existing experimental rig for traversing thermocouple probes across a hot flow from a heat gun at different velocities, along with a simple PC-based DAQ system. Theoretical aspects will include developing a solid understanding of thermocouple-probe based flow temperature measurements, whilst analytical aspects will include time-frequency analysis (impulse response, deconvolution, FFTs etc.).\n[1] Burdett, Lubbock & Povey, 2018. AN IMPULSE RESPONSE TECHNIQUE TO IMPROVE THE EFFECTIVE FREQUENCY RESPONSE OF PRESSURE PROBES. XXIV Biennial Symposium on Measuring Techniques in Turbomachinery, Prague, Czech Republic, 29 - 31 August 2018.\nPaper No MTT2418B23. Available from: https://meastechturbo.com/paper-archives/2418-prague-2018/item/download/466_1bdd5c50c7ece7b207acee25244b0fac"}, {"id": "RLU03", "title": "Development of an Open-Source Portable Horizontal Axis Wind Turbine - Experimental", "supervisor": "Lubbock, Roderick Dr", "space": false, "bothTerms": true, "categories": ["Experimental"], "skills": [], "description": "This project aims to develop an open-source horizontal axis wind turbine (HAWT) for charging personal devices such as laptops and mobile phones when e.g. camping/hiking in remote areas and during crisis situations (see e.g. mobile phone charging clubs in war-torn Ukraine).\nA closed-source device has recently been developed (https://shineturbine.com) however this is expensive and has relatively low power for its size. Amateur developers have also developed interesting open-source devices (https://hackaday.io/project/185070-3d-printed-portable-wind-turbine) however these are low power offering a lot of scope for development by an experienced engineer.\nThe project will primarily focus on the non-aerodynamic aspects of a HAWT device in order to develop a prototype that can easily accommodate various blade designs, and ideally can also be used as a test stand for continuous development of improved blades by the open-source community (this may however require a separate test vehicle)."}, {"id": "LMG01", "title": "Precursors of Extreme Events and Critical Transitions: A Data-Driven Deterministic Approach", "supervisor": "Magri, Luca Prof", "space": true, "bothTerms": false, "categories": ["Computational", "Machine Learning", "Numerical", "Theoretical"], "skills": ["CFD", "Data-driven", "Machine Learning", "PyTorch", "Python", "TensorFlow"], "description": "This project will investigate how quantum-inspired machine learning can be designed and evaluated for short-horizon forecasting of low-to-mid dimensional chaotic systems. The main aim is to explore the relationship between reservoir architecture, noise, and forecasting performance, using generalized synchronization, echo state property, and dynamical stability as a conceptual guide [1]. The project will focus on one or two benchmark systems, such as the Lorenz, and compare a recurrence-free quantum reservoir architecture against a simple classical reservoir baseline. The goal is to scale this up to larger dimensional systems. The student will develop a reproducible simulation pipeline, test a limited range of reservoir hyperparameters, and measure prediction accuracy, forecast horizon, and robustness to injected noise. A further optional objective is to examine whether the reservoir can also capture qualitative properties of the underlying dynamics, such as attractor geometry or sensitivity to initial conditions.\nThe ideal candidate is a student who is willing to learn things that they have not studied in the Imperial course in Aero, do some pen and paper work (i.e., maths), and coding. No CFD or large-scale simulations of complex turbulent flows will be part of this project.\n[1] https://royalsocietypublishing.org/rspa/article/481/2324/20250550/234346"}, {"id": "LMG02", "title": "Quantum Machine Learning: Time Series Forecasting of Nonlinear Systems and Extreme Events", "supervisor": "Magri, Luca Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Literature", "Theoretical"], "skills": ["MATLAB", "Machine Learning", "Python"], "description": "This project will study an efficient numerical method for a focused class of fluid-flow problems, using the paper as a guide for algorithm design, stability, and accuracy. The student will implement a simplified solver for the governing equations, test it on one or two benchmark cases, and compare performance against a standard baseline in terms of error, runtime, and robustness. The project remains flexible in the choice of discretisation, boundary conditions, and test cases, but specific enough to deliver a working code, quantitative results, and a short evaluation of when the method is most effective. The goal is to design an architecture that can learn a fast-slow decomposition of dynamical systems based on [1] and the theory from [2].\n[1] https://www.sciencedirect.com/science/article/pii/S0045782525008722 [2] https://arxiv.org/abs/2604.12869"}, {"id": "LMG03", "title": "Reduced-Order Modelling of Turbulent Flows with Quantized Local Reduced-Order Models", "supervisor": "Magri, Luca Prof", "space": false, "bothTerms": true, "categories": ["Computational"], "skills": [], "description": "This project investigates quantized local reduced-order modelling in time (ql-ROM) for nonlinear dynamical systems. Using clustering, the solution manifold is partitioned into local regions, and separate POD-Galerkin reduced models are built for each cluster. The method will be tested on the Kuramoto-Sivashinsky equation, comparing ql-ROM with a standard global ROM in terms of stability, short-term prediction error, and long-term statistical accuracy. The project aims to determine whether local models provide improved performance for highly nonlinear, chaotic dynamics. Results will help assess the practicality of ql-ROM as a computationally efficient framework for reduced-order simulation and prediction of complex systems.\n[1] https://www.sciencedirect.com/science/article/pii/S0045782525006656 [2] https://arxiv.org/abs/2511.04586"}, {"id": "LMN01", "title": "Data-Efficient Early Diagnostics and Prognostics for Sustainable Aviation", "supervisor": "Mainini, Laura Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Literature", "Theoretical"], "skills": ["Data-driven", "HPC", "MATLAB", "Machine Learning", "Simulink"], "description": "Next generation aircraft require the development and integration of a deal of innovative technologies to meet the ambitious sustainability goals set for aviation. This transformational effort is associated with a tremendous increase of the complexity of the onboard systems and their multiphysics coupled behaviours. Additional tangles arise from the stringent requirements on safety, reliability and operational performances of aerospace systems which further complicate the introduction onboard of novel technologies. In this scenario, the rapid identification of incipient multimodal faults constitutes a significant opportunity to accelerate the actualization of sustainability ambitions. The project focuses on (i) study of power systems/architectures for low emissions and their fault modes; (ii) investigation of computational methods and active learning strategies for data-efficient diagnostics and reliability assessment of multi-physics onboard systems; (iii) study and assessment of the impact of advanced (early-stage, data-efficient) diagnostics and prognostics on the time-to-adoption/integration of new technologies. The thrusts build upon concepts of modelling and simulation, dynamic data driven methods, uncertainty quantification, data assimilation, predictive digital twins and scientific machine learning."}, {"id": "LMN02", "title": "Multisource Learning for Multidisciplinary Design of Aerospace Vehicles", "supervisor": "Mainini, Laura Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Literature", "Theoretical"], "skills": ["HPC", "MATLAB", "Machine Learning", "Python"], "description": "The adoption of detailed models for the multidisciplinary design of aerospace vehicles permits to enhance the identification of superior design solutions, but would prohibitively rise the demand for computational resources and time. Multisource methods acknowledge the availability of multiple representations (models) of physical systems and phenomena that can be interrogated to inform the design process. Those representations can differ for their underlying governing assumptions, their resolution or level of captured details, the cost required to be evaluated or obtain responses, etc..\nBased on the Box\u2019s principle of model usefulness, these models can be used in concert to achieve major savings of computational time and resources. This project focuses on the study and development of computational methods to dynamically elicit different models to efficiently inform and guide the multidisciplinary design of aerospace vehicles. Specific applications are defined across (i) novel power architecture solutions and non-conventional configurations for sustainable aviation; or (ii) scalable benchmark problems for aeronautics and/or space applications.\nThe project requires interest in enriching the familiarity with the specific application and the associated technologies. The studies build up on modelling and simulations, and leverage concepts of multidisciplinary design optimization, multifidelity methods for design optimization, physics based machine learning, active learning from multiple oracles."}, {"id": "LMN03", "title": "InfoSymbiotics for Next Generation Aerospace Vehicles\u2019 Readiness and Operations", "supervisor": "Mainini, Laura Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Literature", "Theoretical"], "skills": ["Data-driven", "HPC", "MATLAB", "Machine Learning", "Python"], "description": "Reliability and readiness of aerospace vehicles in future operational scenarios can be augmented through a dynamic reshaping of their mission profiles in response to the evolution of their health state and contingencies. The hazards might be hard to characterize a priori, but the impact onto the mission could result in catastrophic failure. The structural integrity or the nominal functioning of the systems could be dramatically jeopardized, eventually leading to the loss of the vehicle. The possibility to reconfigure the mission would allow the aerospace vehicle to complete the mission successfully and continue operating safely under degraded conditions, without over-replacing parts, oversizing components, and multiplying systems redundancies. This project focuses on computational methods to enable dynamic mission replanning: forms of artificial reasoning that (i) learn from sensor measurements and predict in real-time the evolving/residual capabilities,(ii) use those predictions to enable fast and trustworthy autonomous operational decisions, (iii) use sensor measurements, capability predictions and the updated decision space to dynamically refine data acquisition strategies. The thrusts build upon concepts of modelling and simulation, infosymbiotics and dynamic data-driven methods, predictive digital twins, model order reduction, scientific machine learning, data fusion and virtual sensing."}, {"id": "LMN04", "title": "Design of Deformable Wing Solutions for Improved Aircraft Efficiency (3 Projects)", "supervisor": "Mainini, Laura Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Design", "Experimental: Structures"], "skills": ["Wind Tunnel"], "description": "This project aims to design and prototype a deformable wing system to address the limitations of conventional mechanical control structures in aircraft wings by developing a novel approach that integrates deformability into the entire wing structure. The primary objective of this project is to explore design alternatives and construct a deformable wing that can efficiently control an aircraft's motion through complaint shape changes. By utilizing lightweight materials and advanced manufacturing techniques, the goal is to achieve a significant reduction in weight while maintaining or improving aerodynamic performance. The design process will entail selecting appropriate materials and sizing the structural components, as well as determining the optimal assembly configuration to achieve the desired flexibility and aerodynamic properties. A deformable wing prototype will then be built to conduct structural and wind tunnel testing, characterize aerodynamic performance and structural integrity, and conduct comparative assessment to conventional wing structures. The ambitious research outcomes will contribute to advancing the field of aeronautical engineering and may have potential applications in various industries, including aircraft manufacturing, robotics, and renewable energy.\nInterested students will have the freedom to come up with morphing configurations as they deem suitable, e.g. with distributed control solutions. Also, should they wish to, interested students will have the opportunity to explore computational methods for the design (to include generative approaches), rather than go straight into the prototyping."}, {"id": "TM01", "title": "Autonomous Collision Avoidance for Multi-Agent Systems", "supervisor": "Mylvaganam, Thulasi Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Numerical", "Survey", "Theoretical"], "skills": ["MATLAB"], "description": "Teams of autonomous (ground or airborne) vehicles, often referred to as agents, can perform tasks with minimal human intervention. This is of interest to several applications, such as space exploration, search and rescue missions and structural monitoring and maintenance. Recently the problem of distributed autonomous collision avoidance has been considered using a game theoretic framework. The method is remarkable in that it comes with strong performance guarantees, while having low computational demands.\nIn this project, the student will familiarise himself/herself with the aforementioned approach, and perform a thorough comparative study with alternative techniques available in the literature. As such, the project will involve a thorough literature review, and gaining familiarity with various approaches, all of which involve elements of nonlinear dynamical systems and control. It is therefore crucial that the student has a strong background and interest in mathematics and control. As such, it will be beneficial for the student to follow the optional module on \"Advanced Control\"."}, {"id": "TM02", "title": "Data-Driven (Approximate) Solutions of Nonlinear Optimal Control Problems", "supervisor": "Mylvaganam, Thulasi Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Literature", "Numerical", "Survey", "Theoretical"], "skills": ["Data-driven", "MATLAB"], "description": "The solution of optimal control problems involving nonlinear systems is characterised by means of the so-called Hamilton-Jacobi-Bellman partial differential equation (PDE). Obtaining closed-form solutions to PDEs is, in general, not feasible and obtaining numerical solutions is, in general, computationally expensive. To circumvent this issue, we have developed a method to systematically construct approximate solutions to nonlinear optimal control problems. The method requires the solution of nonlinear algebraic equations (in place of PDEs). Recently, we presented a method to solve these using data in place of accurate model knowledge.\nThis project is centered about this data-driven approach. Starting from the basics, the student will delve into the details of the underlying theory, gain familiarity via the consideration of simple numerical examples and, subsequently, delve into meaningful simulation studies involving an application of the student's choice (e.g. related to robotic systems, biomedical systems, space systems, etc.). In doing so the student may be required to look into further theoretical aspects (yet to be formally established), e.g. to consider the impact of noise.\nThe project will inevitably involve topics in nonlinear control (related to the control method considered) and it will be of a highly mathematical nature. Thus, a strong background in mathematics and control is essential. It will be beneficial to follow the optional module \"Advanced Control\". The project will involve programming in MATLAB."}, {"id": "TM03", "title": "Control of Robotic Systems for Space Applications", "supervisor": "Mylvaganam, Thulasi Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Numerical", "Theoretical"], "skills": ["Data-driven", "MATLAB"], "description": "Robotic systems are ubiquitous, and space is no exception. In this project the student will consider robotic systems that are of interest to space applications (e.g. robotic arms). For certain types of missions, accurate models describing the behaviour of such robotic systems may be lacking (e.g. due to the robotic system operating in an unknown environment) and, simultaneously, efficient operation may be crucial (e.g. due to energy limitations).\nNamely, robotic systems in space may be required to operate efficiently and reliably in unknown environments. Motivated by this, the student will consider data-driven and/or optimal control of robotic systems for space applications. The student will explore existing models describing the dynamics of such systems in \u201ctypical\u201d environments and exploit these to build a \u201csimulation environment\u201d in Matlab. The student will then consider data-driven control (treating the dynamics as fully/partially unknown) and/or optimal control of the considered robotic system. Both objectives may necessitate the consideration of nonlinear control techniques. The performance of developed controllers will be studied via simulations.\nThe project will involve the consideration of nonlinear dynamical systems and advanced control techniques, as well as convex optimisation. For this reason, an excellent background and a keen interest in mathematics and control theory is absolutely essential. The project will involve a significant amount of programming in Matlab (and will require gaining familiarity with various toolboxes available for solving semidefinite programming problems)."}, {"id": "TM04", "title": "Data-Driven Control of Snake-Like Robots", "supervisor": "Mylvaganam, Thulasi Dr", "space": true, "bothTerms": false, "categories": ["Computational", "Design", "Literature", "Numerical", "Theoretical"], "skills": ["CVX", "Data-driven", "MATLAB"], "description": "Snake-like robots have gained interest for various applications, e.g. fire fighting, subsea inspection and space exploration. However, as they may operate in unknown environments, often models describing their behaviour are not known exactly. Recently, we have considered data-driven control of such systems and the application of the developed control method has been validated via relatively simple simulation studies. In this project the student will explore applications of the developed method further, specialising on one/two specific application avenues (potentially involving space applications). The work will involve gaining familiarity with the developed control framework, which is based on a simplified \"control-oriented model\". Having gained familiarity with the state-of-the art, the student will consider the application of the developed control method to a more accurate (and more complex) model of the snake robot, and they will perform detailed simulation studies (including the development of visual demonstrations) related to the chosen application avenues. This will involve undertaking a detailed literature review, to understand how to represent \"typical\" environmental conditions and robot configurations for the selected application avenues.\nThe project is of a highly mathematical nature and will, inevitably, involve consideration of nonlinear dynamical systems and nonlinear control. It is therefore essential that the student has an excellent background in mathematics and control engineering (the optional module \"Advanced Control\" will be beneficial). The project will involve significant programming in Matlab and the use of various toolboxes (e.g. cvx)."}, {"id": "TM05", "title": "Autonomous Collision Avoidance for Multi-Agent Systems (Experimental)", "supervisor": "Mylvaganam, Thulasi Dr", "space": false, "bothTerms": true, "categories": ["Experimental: Ready-Made Experiment"], "skills": ["C++", "Drones", "MATLAB", "Python"], "description": "Teams of autonomous (ground or airborne) vehicles, often referred to as agents, can perform tasks with minimal human intervention. This is of interest to several applications, such as space exploration, search and rescue missions and structural monitoring and maintenance. Recently the problem of distributed autonomous collision avoidance has been considered using a game theoretic framework. The method is remarkable in that it comes with strong performance guarantees, while having low computational demands.\nIn this project, the student will familiarise himself/herself with the aforementioned approach. Once the student has gained sufficient familiarity with the theory, they will validate the results experimentally using off-the-shelf platforms available in the Aerial Robotics Lab (this includes small drones and ground robots). Note that any experimental work can take place only if/when sufficient understanding of the theory is in place. The student may then also be required to consider scenarios which require further developing the existing theory. The project will inevitably involve elements of nonlinear dynamical systems and control. It is therefore crucial that the student has a strong background and interest in mathematics and control. As such, it will be beneficial for the student to follow the optional module on \"Advanced Control\". Considering that the project involves significant experimental work, it is also crucial that the student has an aptitude for experimental work and is motivated to undertake such work independently, gaining familarity with the platforms used."}, {"id": "TM06", "title": "Data-Driven Control of Nonlinear Systems", "supervisor": "Mylvaganam, Thulasi Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Numerical", "Theoretical"], "skills": ["CVX", "Data-driven", "MATLAB"], "description": "Modern dynamical systems are increasingly complex. As a consequence accurate models may be either unavailable or too complex for control design. Motivated by this, the student will consider recently developed data-driven control techniques for nonlinear systems. Specifically, the student will consider methods that consider techniques that build upon ideas that utilise Willems' Fundamental Lemma (for linear systems).\nIn the first part of the project the student will gain familiarity with the aforementioned theory. Subsequently, the student will perform thorough simulation studies (involving an application of the student's choice -- provided it is amenable with the considered control technique). The project will inevitably involve aspects of nonlinear dynamical systems and control. It will therefore be beneficial for the student to follow the optional module on \"Advanced Control\". The project will involve programming in MATLAB (and related toolboxes, eg. cvx). The project will be of a highly mathematical nature, so it is important that the student has an interest and aptitude for such work."}, {"id": "AN01", "title": "Data-Driven Reduced Order Modelling in Fluid Mechanics", "supervisor": "N\u00f3voa, Andrea Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Data-driven", "JAX", "MATLAB", "Machine Learning", "Python"], "description": "This project explores data-driven reduced-order modeling (ROM) in fluid mechanics to address the computational challenges of simulating complex flows. By leveraging linear and nonlinear encoding-decoding techniques, the project aims to construct efficient ROMs that capture dominant flow structures while minimizing computational costs. A key focus is to increase the ROM accuracy for turbulent and transient flows, where traditional methods struggle due to nonlinear dynamics and missing scales. The project will exploit machine learning tools to perform tasks such as closure modelling, nonlinear manifold learning, or control. The application of the project will be relevant to aeronautic and environmental engineering."}, {"id": "AN02", "title": "Real-Time Modelling with Data Assimilation", "supervisor": "N\u00f3voa, Andrea Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Python"], "description": "This project aims to introduce physical knowledge into real-time data assimilation methods to enable real-time physical modelling. Physics-constrained data-assimilation frameworks will be developed by integrating conservation laws, statistics, and Kalman filtering approaches. The challenge is to ensure that the models remain physically plausible while adapting to incoming data. Students will explore concepts from signal processing, constrained optimization and Bayesian theory. These methods will be applied to complex, real-world systems\u2014such as aviation and weather prediction\u2014where real-time decision-making under uncertainty is critical."}, {"id": "AN03", "title": "Real-Time Modelling in High Dimensional Systems", "supervisor": "N\u00f3voa, Andrea Dr", "space": false, "bothTerms": false, "categories": ["Theoretical"], "skills": [], "description": "This project aims to introduce physical knowledge into real-time data assimilation methods to enable real-time physical modelling. The challenge is to ensure that the models remain computationally tractable in high-dimensional systems. Students will explore concepts from signal processing, Bayesian theory, and potentially quantum computing. These methods will be applied to complex, real-world systems\u2014such as aviation and weather prediction\u2014where real-time decision-making under uncertainty is critical."}, {"id": "RP01", "title": "Control System Design for Wind Tunnel Demonstration of Flutter Suppression", "supervisor": "Palacios, Rafael Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Design", "Experimental"], "skills": ["Aeroelasticity", "Composite", "Control Systems", "LabVIEW", "MATLAB", "Python", "Wind Tunnel"], "description": "This project is an investigation on aeroservoelastic vehicle design, in particular, the integration of control systems on wings to increase their flutter speed (an stability augmentation control problem). This can tilt the trade-off between aerodynamic and structural constraints towards much lighter wing designs, but at the expense of a much complex design evaluation. In this project, flutter suppression strategies will be first numerically investigated on an existing actuated composite wing. A flap driven by an Arduino card has been shown to produce efficient actuation for a wind-tunnel implementation with minimum delays, but the optimal layout of sensors (accelerometers and strain gauges) and the identification of the closed-loop system dynamics needs to be identified. The project will address those issues to identify and demonstrate effective aeroelastic stability augmentation strategies, both through simulation and experiments."}, {"id": "RP02", "title": "Data-Driven Model for Wing Loads under Gusts", "supervisor": "Palacios, Rafael Prof", "space": false, "bothTerms": true, "categories": ["Computational"], "skills": ["Data-driven", "MATLAB", "Python", "Turbulence"], "description": "A classical aerodynamic solution due to W. P. Sears describes the interactions between an airfoil and an incoming flow. It is however cumbersome to use directly for simulation and numerous approximations have been proposed, with mixed success. In this project we will explore data-driven solution using recently developed algorithms for sparse identifcation in nonlinear dynamics. We will further seek extensions of the approach to wings in atmospheric turbulence. This is a computational project that can will need both python and matlab. Further reading: https://doi.org/10.2514/1.J060863"}, {"id": "RP03", "title": "Hinged Winglets for Aircraft Load Alleviation", "supervisor": "Palacios, Rafael Prof", "space": false, "bothTerms": true, "categories": ["Computational"], "skills": ["Aeroelasticity", "Python"], "description": "Hinged winglets have been recently proposed to reduce adverse aerodynamic loading due to atmospheric gusts (https://www.airbus.com/newsroom/stories/the-albatross-is-inspiring-tomorrows-next-generation-of-aircraft-wings.html). As this is a passive mechanism, the challenge is to obtain a single design that shows good performance in different flight segments. In this project, this will be investigated using an in-house aeroelastic solver for flexible aircraft dynamics that includes a multibody implementation to model the hinge dynamics (www.imperial.ac.uk/aeroelastics/sharpy). The aeroelastic response of wings of increased flexibility and aspect ratio, under different hinge partitions will be explored aiming to identify any sweet spots in the design space for this setup. This project extensively uses python.\nFurther reading: https://doi.org/10.2514/1.C035602"}, {"id": "AP01", "title": "Scientific ML in Advanced Manufacturing Process Simulations", "supervisor": "Panesar, Ajit Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Numerical"], "skills": ["ANSYS", "Abaqus", "Data-driven", "Machine Learning", "Neural Networks", "Physics-Informed Neural Networks (PINNs)", "Python"], "description": "Scientific Machine Learning (SciML) in additive manufacturing (AM) process simulations is an emerging field that blends physics-based models with machine learning to improve simulation fidelity, reduce computational cost, and enable real-time or data-driven insights. The group\u2019s earlier efforts have included solving PDEs related to AM processes (e.g., heat conduction) using neural nets that embed physical laws to estimate the Temperature field in metal AM. The aspiration is to predict part distortions and utilise this capability for both inverse problem (process parameter identification) and design optimisation. ML models could include: Physics-Informed Neural Networks (PINNs); Gaussian Processes for uncertainty quantification; Autoencoders for dimensionality reduction; Neural operators (e.g., DeepONet, FNOs) for learning operators between function spaces (great for PDE-based simulations); and Bayesian optimization for tuning process parameters.\nFor more context, refer https://idea-lab-ic.github.io/#/README"}, {"id": "AP02", "title": "ML Enabled Discovery of Metamaterials for Demanding Engineering Application", "supervisor": "Panesar, Ajit Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["ANSYS", "Abaqus", "Python"], "description": "ML is rapidly transforming how materials are designed for mechanical, thermal, acoustic, and electromagnetic functions. These smart materials can be tailored to perform specific engineering tasks and ML makes it possible to explore massive design spaces, optimize performance, and reduce cost/time in ways traditional methods can't. We will utilise inverse design coupled with topology optimisation to realise the multiscale solutions for end-use engineering applications. Multiple materials, material orthotropy and geometric non-linearities will be considered. Prior work in the group has explored Mixture Density Networks (MDNs) to enable one-to-many solutions which will be leveraged in this project to allow a portfolio of solutions to be obtained.\nFor more context, refer https://idea-lab-ic.github.io/#/README"}, {"id": "AP03", "title": "Metal Additive Manufacturing in Space (Experimental)", "supervisor": "Panesar, Ajit Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Experimental", "Experimental: Manufacturing Intensive", "Experimental: Ready-Made Experiment", "Numerical"], "skills": ["ANSYS", "Python"], "description": "Maturing additive manufacturing in space involves developing space grade hardware and revisit the parameters required for an optimal print to succeed in microgravity, vacuum, and extreme thermal environments. These are radically different from Earth, so parameters needs adaptation \u2014 and in many cases, require support from numerical models. This project will focus on material extrusion based process but employ Martian/Lunar-regolith with Clay to explore the feasibility of a drying based consolidation method. Previous projects have documented knowhow on vacuum chamber testing, developing hardware for polymer blend extrusion, and computational simulation of such processes in-Space conditions. Maturing the manufacturing readiness levels of these technologies brings us one step closer to fabricate in Space environment.\nFor more context, refer https://idea-lab-ic.github.io/#/README"}, {"id": "AP04", "title": "Multimaterial Topology Optimisation for Multifunctional Applications", "supervisor": "Panesar, Ajit Dr", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Design", "Numerical"], "skills": ["Abaqus", "Machine Learning", "Python"], "description": "Multimaterial topology optimisation (MMTO) is an advanced computational design technique that determines not only the optimal shape of a structure but also how multiple materials should be distributed within it to achieve the best performance under given constraints.\nUnlike traditional single-material methods, it enables the use of materials with different mechanical, thermal, or functional properties\u2014making it ideal for high-performance applications in aerospace, automotive, biomedical implants/devices, and additive manufacturing. Using methods like SIMP, level-set, or phase-field models, and often enhanced with machine learning or surrogate models, designers can optimize structures for stiffness, weight, thermal resistance, and manufacturability simultaneously. This approach is especially powerful when combined with multi-material 3D printing, allowing for the creation of highly efficient, functionally graded, or hybrid-material components. This project will explore utilisation of MMTO for both small (cm) and large (m) scale parts considering appropriate manufacturing routes therefore progressing towards process-aware design-optimisation. For more context, refer https://idea-lab-ic.github.io/#/README"}, {"id": "AP05", "title": "Foundational Models for Multifunctional Component Design", "supervisor": "Panesar, Ajit Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Literature", "Numerical", "Theoretical"], "skills": ["Abaqus", "CAD", "Python"], "description": "Foundational models (e.g. LLMs) are revolutionising complex engineering multifunctional CAD design by enhancing the ability to create and optimise designs that meet diverse performance requirements across multiple engineering domains. By analysing vast amounts of design data, LLMs can assist in automating the generation of CAD models, optimise for multiple objectives (such as mechanical strength, thermal efficiency, and material usage), and offer real-time design suggestions. These models enable multi-disciplinary integration, facilitating the design of components or systems with complex, interdependent functions.\nLLMs also streamline the iterative design process, reducing the time spent on adjustments and improving collaboration across different engineering disciplines, making them invaluable tools for industries like aerospace, automotive, and industrial design. This project explores the value added through these models in both the iterative design-optimisation stage and the design-to-fabrication workflow. There is flexibility to take a more systems approach or deep-dive into a more specific computational aspect of the study. For more context, refer https://idea-lab-ic.github.io/#/README"}, {"id": "AP06", "title": "Topology Optimisation of Shape Morphing Lenses for Space Applications", "supervisor": "Panesar, Ajit Dr", "space": true, "bothTerms": true, "categories": ["Computational", "Design", "Experimental: Ready-Made Experiment", "Numerical"], "skills": [], "description": "This project focuses on designing flexible (compressible/twistable), jointless multiscale structure that perform specific electromagnetic functions \u2014 such as lenses or antennas \u2014 while operating under combined thermal and mechanical loading conditions, mainly relevant to launch and in-orbit conditions. Methods like SIMP, level-set, and phase-field are commonly employed to determine the optimal material layout, which will be leveraged to identify superior multi-objective performance. There is an expectation that prototypes will be fabricated to demonstrate the mechanical and where possible the thermal response. Possibility to undertake electromagnetic characterisation at partner institution will be explored. The primary objective of this project will be to develop a computational framework that can reveal manufacture-ready performance optimal solutions."}, {"id": "GP01", "title": "Application of Machine Learning to Flow Control", "supervisor": "Papadakis, George Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["MATLAB", "Machine Learning", "Turbulence"], "description": "The aim of this project is to combine machine learning and more traditional techniques to control non-linear flow systems that exhibit chaotic behaviour. The method will be based on a recent development by the supervisor that allows the forecasting of a chaotic system from sparse data. The performance of the new approach will be assessed in two test cases, (a) non-linear model that describes the self-sustaining process in near-wall turbulence and (b) the Kuramoto Sivashinsky equation that exhibits chaotic behaviour for a certain set of parameters. The project will examine the time that it takes to synthesise the con
