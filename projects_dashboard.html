rk. This project is therefore focussed on the software engineering aspects of the code development and can be tailored depending on mutual discussion on your interests and the needs of the project."}, {"id": "TC01", "title": "Microfabrication of Bistable Deployable Structures", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Experimental: Manufacturing Intensive"], "skills": ["CAD", "Python", "Spacecraft"], "description": "Deployable structures are mechanical systems that transform from a compact stowed configuration to a larger operational one, and they are critical in applications ranging from spacecraft antennas and solar arrays to biomedical implants. Recent work has shown that wafer-scale microfabrication offers a powerful route to producing planar precursors that mechanically deploy into complex 3D geometries, combining the precision of semiconductor processing with the programmability of structural mechanics. However, exploiting microfabrication for deployable structures at Imperial requires first establishing a baseline process flow using the College cleanroom facilities.\nThis project will familiarise the student with Imperial's microfabrication capabilities and use them to produce a set of bistable deployable micro-structures. The student will design planar precursors with engineered stress or geometric features that snap into a stable 3D configuration upon release, fabricate them using photolithography and etching, and characterise their deployment behaviour. The project will produce both a documented process recipe for use by future students and a working demonstrator of micro-scale bistable deployment.\nA willingness to work in a cleanroom environment is essential, along with basic proficiency in CAD and Python. No prior microfabrication experience is required.\nFor inspiration, watch some previous results from our group: https://www.youtube.com/watch?v=vrOjy-v5JgQ."}, {"id": "TC02", "title": "Robotic Extrusion Deposition for Automated Damage Repair", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Design", "Experimental"], "skills": ["Python", "ROS"], "description": "Automated repair of damaged structural surfaces \u2014 aerospace components, industrial tooling, or infrastructure \u2014 is a long-standing goal of advanced manufacturing. The core challenge is the tight coupling between sensing, motion planning, and material deposition: the robot must identify the damaged region, generate an appropriate toolpath, and deposit material in a way that conforms to the existing geometry.\nThis project will develop the hardware and control pipeline for a robotic extrusion-deposition system aimed at local surface repair. The student will interface a robotic arm with an extrusion head, develop motion-control software that follows a specified toolpath, and integrate the system end-to-end with input from a 3D scan of a damaged region. A simplified curvature-based metric (provided) will be used to identify the repair region, and the student will demonstrate closed-loop deposition on a set of test specimens with engineered defects. The project suits a student with strong interests in robotics, mechatronics, and hands-on system integration, and requires good Python skills. Prior exposure to ROS is helpful but not required."}, {"id": "TC03", "title": "Robotic Ceramic Shaping as Kinetic Art", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Design", "Experimental"], "skills": ["Computer Vision", "Deep Learning", "Python"], "description": "Robotic manipulation of soft, yield-stress materials such as clay sits at an unusual intersection of mechanics, control, and craft. It is also a domain in which contemporary artists \u2014 most famously in works such as Sun Yuan and Peng Yu's Can't Help Myself \u2014 have used robots not to perform a utilitarian task, but to stage an open-ended, absurd, or meditative action. This project embraces that framing: a robot that engages repeatedly and imperfectly with a ceramic medium, producing an artefact whose value lies in the process rather than the end product.\nThis project will design, build, and operate a robotic system that performs a repeated shaping or throwing action on clay. The student will interface a robotic arm with a simple end effector, program a control routine that executes an open-ended shaping behaviour, and document the resulting artefacts and process. The engineering contributions are the hardware integration, the motion-control routine, and an analysis of how the clay's rheology constrains the achievable motions; the broader output is a physical art piece that can be exhibited.\nThe project suits a student with strong mechatronics and coding skills who is interested in the intersection of engineering and art. A willingness to iterate experimentally and tolerate messy outcomes is essential. ---- A robot that repeatedly engages with a deformable medium \u2014 clay, for example \u2014 requires a perception system that tracks the state of the material and adapts its actions accordingly.\nWhen the goal is an open-ended, aesthetically driven interaction rather than a specified end shape, the perception and control problem is particularly interesting: the robot is not pursuing a target but reacting to what is there, producing behaviour that is responsive without being goal-directed in a conventional sense.\nThis project will develop the perception and behavioural-control layer for a robotic ceramic art installation. The student will integrate a camera system with a robotic arm performing shaping operations on clay, train a computer-vision pipeline to track the geometry and deformation of the clay in real time, and design a behavioural control loop in which the robot's actions are modulated by what it perceives. The work builds on a parallel hardware-focused project (3a) and offers the opportunity to contribute to an exhibited artefact as well as a technical thesis.\nThe project requires strong programming skills in Python, familiarity with computer vision and/or deep learning, and an interest in robotics. Willingness to engage with the artistic framing of the project is essential."}, {"id": "TC04", "title": "Design and Characterisation of a Locally Interacting Reconfigurable Module", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental"], "skills": ["CAD"], "description": "Modular reconfigurable materials \u2014 imagine a collection of small units that can rearrange themselves into different global configurations \u2014 have long been a goal of robotics and programmable-matter research, with the microbots of Big Hero 6 serving as a popular cultural reference. Achieving this in practice requires modules that can couple to their neighbours, change their coupling state on command, and slide or rotate relative to each other under some form of local interaction. This project focuses on the fundamental building block: a single module and its interaction with one or two neighbours.\nThis project will design, fabricate, and characterise a reconfigurable module with a controllable local interaction. The student will propose and prototype a coupling mechanism (magnetic, mechanical, electro-adhesive, or other), characterise its engagement and release behaviour, and demonstrate at least one reconfiguration action \u2014 typically sliding, rotation, or snap-attach \u2014 between a pair of modules. The project will produce a working prototype, a characterised coupling mechanism, and a proposed scaling strategy for larger assemblies. The project suits a student with strong design and fabrication instincts and an interest in mechatronics. Prior exposure to CAD and basic electronics is expected."}, {"id": "TC05", "title": "Frictional Characterisation of 3D-Printed Textile Filaments", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Experimental"], "skills": ["Python"], "description": "Textiles \u2014 both traditional (knits, weaves) and non-traditional (chainmails, crochets) \u2014 derive much of their mechanical behaviour from frictional interactions between the filaments that make them up. Additive manufacturing opens the possibility of designing filaments with programmed surface textures, which could in turn programme the frictional and therefore mechanical response of an entire textile. Understanding this connection requires accurate characterisation of filament-scale friction, including how it depends on filament surface topography at the microscopic scale.\nThis project will characterise frictional behaviour of 3D-printed filaments with a range of deliberately varied surface textures. The student will design and print filament specimens with controlled surface features, develop a benchtop friction-testing setup suitable for filament-on-filament contact, and quantify the dependence of friction on texture, load, and sliding direction. The resulting dataset will form the foundation for subsequent textile-design work.\nThe project suits a student with interests in experimental mechanics, additive manufacturing, and tribology. Good programming skills in Python are expected for data processing."}, {"id": "TC06", "title": "Robotic Deployable Meta-Surface from a Triangular Grid with Extensible Edges", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Design", "Experimental"], "skills": [], "description": "Transforming a flat sheet into a target three-dimensional shape by prescribing local length changes is a classical problem in differential geometry \u2014 and one with direct implications for deployable structures. A triangular grid whose edges can individually extend or contract provides an experimental realisation of this idea: by commanding each edge to a prescribed length, an initially planar grid deploys into a target 3D surface. When the prescribed lengths are derived from a conformal map, the deployed shape approximates a target surface in a geometrically controlled way.\nThis project will build and demonstrate a robotic deployable meta-surface based on a triangular grid with individually actuated edges. The student will design a modular triangular unit with an extensible edge actuator (linear actuator, shape-memory alloy, or equivalent), assemble a small grid of these units, and implement open-loop control that commands each edge to a specified length. A conformal-map-derived length field (provided or computed using existing tools) will be used to deploy the grid into a target surface. The project will produce a working demonstrator and a characterised mapping from commanded lengths to deployed geometry.\nThe project suits a student with strong design, fabrication, and coding skills. Prior exposure to robotics or Grasshopper is advantageous but not required."}, {"id": "TC07", "title": "Design and Fabrication of Frictional Interlocking Bistable Plates", "supervisor": "Chen, Tian Dr", "space": false, "bothTerms": true, "categories": ["Design", "Experimental", "Numerical"], "skills": ["CAD"], "description": "Interlocking plate assemblies \u2014 in which flat elements are arranged so that frictional and geometric contact produces a coherent structural response \u2014 offer a route to reconfigurable, demountable, and topologically interlocked structures. When the interlocking is engineered together with a bistable mechanical response, the assembly acquires discrete stable configurations, switchable by applied load, that could be exploited for deployment, locking, or energy absorption.\nThis project will design, fabricate, and characterise a set of frictional interlocking plates with an engineered bistable response. The student will iterate on plate geometry and contact features, fabricate specimens using 3D printing or laser cutting, and characterise the snap-through behaviour and the conditions under which interlocking is preserved across snap events. The project will produce a documented design with a characterised force\u2013 displacement response and a demonstration of controlled switching between stable configurations.\nThe project suits a student with strong design and hands-on instincts. Good CAD skills are expected; prior experience with mechanical testing is beneficial."}, {"id": "SC01", "title": "Sum-of-Squares of Polynomials Optimisation in Fluid Dynamics and Related Problems", "supervisor": "Chernyshenko, Sergei Prof", "space": true, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["MATLAB", "Python"], "description": "This is a group of related projects, offered to several students in parallel. All these projects are based on the same mathematical idea of an auxiliary function and in many cases rely on the same software (the Matlab toolbox YALMIP, or Python library SumOfSquares.py, or similar) implementing the sum of squares of polynomials/semialgebraic optimisation technique. The idea and the software can be applied to a large variety of problems. The students begin with studying this mathematical idea and the software and then choose a specific problem from the list of offered problems, or suggest their own problem, to which they will apply the idea and possibly the software. This then become the student\u2019s project.\nStrong mathematical background will be needed. Some topics might also require programming skills.\nBefore going any further, note that the heavily mathematical nature of these projects dictates deep concentration on the work, which has to be done full time without distractions and has, therefore, to be mostly concentrated in one term only. Highly important: do not select this project if you will not be able to devote yourself fully to this project in the spring term (this depends on your choice of optional modules).\nIf you can work full time on the project in the spring term, the next step is to watch a few short videos about this group of projects. The videos are highlighted in yellow at https://www.imperial.ac.uk/aeronautics/fluiddynamics/ChernyshenkoResearch/misc.php (If you like to watch videos, here is far a more serious video on this topic: at https://www.youtube.com/watch?v=NrF7n3MyCy4&list=PLf_ipOSbWC86n18q4JMn_1J04S90FpdeE&index=8) Next, read a short introduction to auxiliary functions at https://www.imperial.ac.uk/aeronautics/fluiddynamics/Projects/IntroToAuxiliaryFunctions.pdf This introduction, its content, and its style will give you an idea of what this group of projects is like. In specific projects this can be complemented with programming, but there are also purely theoretical, pen-and-paper versions.\nIn addition to the topics covered in the videos, namely bounds for time averages, finding orbits in space, and accelerating averaging, more will be offered. For example, consider a a pen-and-paper project on bounds for current in tokamaks and/or Hall thrusters, which would continue the work of previous students, see the report by ACM MSc 2022 project report by J.Gong at https://imperiallondon.sharepoint.com/:b:/r/sites/foe/aero/student-reports/MSc%20Advanced%20Computational%20Methods/2022%20Project%20Reports/GONG%20Jiayi.pdf?csf=1&web=1). There will be more. Another good sample is the FYP project report by M.Baber, 2014, at https://imperiallondon.sharepoint.com/:b:/r/sites/foe/aero/student-reports/Undergraduate%20Reports/Final%20Year%20Projects/2014%20Final%20Year%20Projects/BABER,%20Monib.pdf?csf=1&web=1&e=bict6b This project is aligned with ongoing research in the department."}, {"id": "AKD01", "title": "AI-Based Identification of Large-Scale Structures in Turbulence", "supervisor": "Doan, Anh Khoa Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical", "Theoretical"], "skills": ["AI", "MATLAB", "Machine Learning", "ParaView", "Python", "Turbulence"], "description": "The understanding of turbulence remains challenging given its chaotic and multiscale (in space and time) nature. Despite this complexity, many attempts have been made at describing turbulence as a hierarchy of coherent structures (so-called eddies) of different scales whose morphology and spatial clustering depend on the Reynolds number and who interact in a statistical manner explained via the concept of Kolmogorov\u2019s energy cascade. In this description, energy cascades from the large scale eddies down to the smaller ones, all the way down to the Kolmogorov scale where energy is dissipated through viscous effects. However, a consistent identification of these coherent structures is still lacking. The objective of this project is to leverage recent developments in Artificial Intelligence to enable the automated detection of such coherent structures in flows which would enable their tracking and the understanding of the physical process leading to their formation. This will be explored on a series of turbulent flows datasets.\nThis project is ideal for students with a strong interest in flows, applied mathematics, or machine learning. Prior exposure to numerical methods will be helpful but not strictly required."}, {"id": "AKD02", "title": "Machine Learning Based Detection of Flashback in Hydrogen Combustor", "supervisor": "Doan, Anh Khoa Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical", "Theoretical"], "skills": ["MATLAB", "Machine Learning", "PyTorch", "Python", "TensorFlow"], "description": "To move towards a sustainable aviation, increased attention is dedicated to the use of hydrogen as fuel for gas turbine. However, due to its high reactivity, clean hydrogen-based combustors are more prone to flashback, which is a rare transient event where the flame suddenly moves back into the injector.\nIn this project, you will aim to develop machine learning (ML) algorithms to identify precursors to flashback in hydrogen combustor. Precursors are measurable quantities that indicate that the flashback will occur, providing a horizon to react and prevent it. This will be developed using an experimental dataset of sensors on a combustor which exhibited flashback for different operating conditions. A combination of dimensionality reduction techniques with anomaly detection approaches will be explored.\nThis project is ideal for students with a strong interest in reacting flows, applied mathematics, or machine learning. Prior exposure to numerical methods would be advantageous."}, {"id": "AKD03", "title": "Hybrid Machine Learning/Differentiable Solver Approach to Flow Control", "supervisor": "Doan, Anh Khoa Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical", "Theoretical"], "skills": ["Deep Learning", "Machine Learning", "PyTorch", "Python", "Reinforcement Learning", "Turbulence"], "description": "The control of turbulent flow is very challenging due to the chaotic nature of flows and the nonlinear influence that flow actuators can impart on the flow. Typical approaches have relied on the combination of system identification and control strategies but have only performed well in a linear context. Alternatively, recent works have explored the use of deep reinforcement learning for such a task, but such an approach can be extremely costly. In this project, we will explore the use of a differentiable flow solver combined with a deep learning framework to control the behaviour of flows. Such a combination would use the differentiable capability of the flow solver to provide the gradients of the controller parameters with respect to the objective function over multiple timesteps, enabling an acceleration of the training of the controller and ensuring a stable control over longer period. This will be tested on typical flow control application.\nThis project is ideal for students with a strong interest in turbulence, applied mathematics, or machine learning. Prior exposure to machine learning and numerical methods is desirable for this project."}, {"id": "AKD04", "title": "Reduced-Order Modeling for Unsteady Reactive Flows", "supervisor": "Doan, Anh Khoa Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["Machine Learning"], "description": "Turbulent reacting flows are complex multiphysics systems which play a vital role in the transportation, and energy production sector. The simulations of these reacting flows is however computationally expensive due to the very large number of degrees of freedom and the complex chemistry that occurs therein.\nTo address this, this project will explore aim to develop reduced-order model (ROMs) of such unsteady reacting flows. Specifically, machine learning techniques will be leveraged for both the encoding/decoding of the full reacting flow states and time-evolution/prediction of the encoded flow state.\nThis will be applied on datasets of reacting flows under unsteady excitation. Investigations will focus on the dataset requirements to obtain a ROM able to generalize to other operating/excitation conditions and on the accuracy of the prediction of the ROM. This project is ideal for students with a strong interest in reacting flows, applied mathematics, or machine learning. Prior exposure to numerical methods would be advantageous."}, {"id": "AKD05", "title": "Machine Learning-Based Modelling of Hydrogen Reacting Flows", "supervisor": "Doan, Anh Khoa Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["Fortran", "Machine Learning", "Python", "Turbulence"], "description": "The transition towards a sustainable transportation and energy generation sector is requiring the investigation of alternate sustainable fuels, such as hydrogen. These investigations are often carried out through numerical simulations of hydrogen-based turbulent reacting flows, but these flows are complex multiphysics systems involving nonlinear interactions between turbulence and chemistry. These characteristics make them particularly challenging and expensive to simulate - a complexity which is compounded when considering hydrogen owing to its particular extreme reacting properties.\nIn this project, you will aim to develop machine learning (ML)-based models for hydrogen-based turbulent reacting flows. From high fidelity datasets simulations, you will identify features relevant for the modelling of hydrogen reaction and train models able to predict relevant quantities of interest (such as heat release rate, emission factors, ...).\nThis project is ideal for students with a strong interest in reacting flows, applied mathematics, or machine learning. Prior exposure to numerical methods would be advantageous."}, {"id": "DD01", "title": "Machine Learning/Quantum Machine Learning for Disease Screening", "supervisor": "Doorly, Denis Prof", "space": true, "bothTerms": true, "categories": ["Computational", "Numerical"], "skills": ["Anaconda", "MATLAB", "Machine Learning", "Python", "Qiskit"], "description": "This project will investigate the use of machine learning/quantum machine learning (ML/QML) to screen for disease from image data. It will may focus on ophthalmic image data - in which case it may start from a previous project, but could alternatively use CT airway data.\nFor those interested in QML, it is advisable they have gained experience through completing the short online course based on the Qiskit open simulator - see https://qiskit.org/learn/course/machine-learning-course/ It will best suit a person with good mathematical/computational skills who is also a capable self-learner."}, {"id": "DD02", "title": "Modelling Exhaled Aerosol Spreading and Containment", "supervisor": "Doorly, Denis Prof", "space": false, "bothTerms": true, "categories": ["Computational", "Experimental"], "skills": ["MATLAB", "Star-CCM+"], "description": "Up to 2 projects (1 MSc, 1 UG) can be offered on aerosol transport in external flows, where the aerosols are generated by exhalation. One of these may be primarily computational and one could be experimentally focussed. The objective of these projects is to characterise the spread of aerosols of different sizes, produced for example by laser surgery, to investigate means to contain or limit aerosol spread using screens and suction. The problem of trapping of a jet by a shield and applied suction is actually a fundamental problem in continuum fluid mechanics. Whereas the free jet, the jet in cross-flow and to a lesser extent the impacting jet have all been subject to many investigations, the effect of combined suction and impaction has not been greatly studied.\nIt is expected that the computational project will rely mostly on Star-CCM, though the use of one of the department's in-house flow solvers may be considered for comparison if a student is particularly interested. Although primarily computational, study of previous works on aerosol dispersion in turbulent plumes is an important component of the project. The experimental project will rely on simple but clearly defined configurations to facilitate comparison with computations. Given the broad nature of the topic, the projects is well-suited for a pair students to work on in complementary areas, but either part could be handled independently."}, {"id": "SE01", "title": "Adaptive Simulation of Aircraft to Support Projections of a Net-Zero Fleet", "supervisor": "Eastham, Sebastian Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["C++", "Julia"], "description": "Estimates of the environmental impacts of aviation (past, current, and future) rely on accurate estimates of the location, quantity, and timing of aircraft emissions. This in turn requires accurate models of aircraft performance. While economic models can provide estimates of demand for every airport pair, a flexible aircraft performance model is needed to determine the emissions along that route.\nThis project seeks a student who will apply the principles of aircraft design and performance to develop a flexible aircraft performance simulator. The simulator will need to be capable (to first order) of generating plausible aircraft performance models given simple constraints (e.g. range, fuel efficiency, payload) and then applying that model to estimate the rate of fuel burn at all stages along a simulated flight for multiple different airport pairs. A successful project will be able to reproduce publicly-available performance data for a set of representative aircraft, capturing broad trends in performance based on mission requirements."}, {"id": "SE02", "title": "Long-Term Evolution of High Altitude Exhaust Plumes", "supervisor": "Eastham, Sebastian Dr", "space": true, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["C++", "Julia"], "description": "The number of launch vehicles is increasing rapidly year by year, but very little is known regarding the emissions associated with these launches. A specific challenge is that there is very little observational data available, and there are few open-source options available which model the long-term dynamics of the exhaust plume. This makes quantifying the emissions (and therefore environmental impacts) from launches challenging.\nThis project aims to advance our understanding of rocket exhaust plumes, considering specifically how they will stretch, deform, and dilute at different altitudes. This project is intentionally open-ended, and you will have the freedom to experiment with different approaches at different levels of fidelity. However the end goal will be to generate a parameterisation of plume dilution rate as a function of emission altitude, time of year, and (if emitting aerosols) composition. Results will need to be compared against literature results and, where possible, observations which may become available during the course of the project."}, {"id": "SE03", "title": "Tracking the Environmental Dispersion of Aircraft Exhaust", "supervisor": "Eastham, Sebastian Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["C++", "Fortran", "Julia"], "description": "Aviation emissions contribute to growing environmental impacts, including ozone loss, air quality degradation, and climate change. However, some of these impacts can be greater or smaller depending on exactly where the emissions go in the atmosphere. It may be possible to optimize flight paths so that the overall effect of aviation on the environment is significantly reduced, by (for example) choosing flight paths where the emissions will soon be washed out of the atmosphere by precipitation. However, this requires the development of global atmospheric models which can rapidly simulate the path, chemistry, and fate of emissions. This project will require the development of exactly such a model. Starting from an existing framework which simulates the chemistry and trajectory of emissions from an aircraft, you will implement a representation of aerosol formation and washout along the trajectory to allow an improved understanding of the potential health consequences of aviation emissions. Combining this with a model of planetary boundary layer mixing, you will then be able to compare the results of your Lagrangian model against those from a conventional Eulerian model of aircraft exhaust. The end result will be a comparison of how the emissions from all flights over Europe affect our climate and our air quality, using two independent modelling approaches."}, {"id": "SE04", "title": "Appreciating Clouds", "supervisor": "Eastham, Sebastian Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Theoretical"], "skills": ["C#", "C++"], "description": "Condensation trails (contrails) forming in aircraft exhaust are estimated to be one of the three largest contributors to aviation's overall climate impact, potentially exceeding even that from aircraft CO2. However they are very poorly understood, largely due to the difficulty of developing verifiable models of contrail evolution over time. This challenge is made harder by the fact that contrails are hard to visualise; although their development is strongly dependent on their complex 3D structure, our intuitions about them are largely developed based on only a 2D image: viewed from below.\nThis project will require the student to develop a visual model of a contrail which allows it to be viewed in 3D. The simulation will need to take 3D information about contrail ice water content and properties, and use state-of-the-science radiative transfer calculations to simulate the path of light through the contrail to the viewer. Creativity will be strongly encouraged; for example, a productive approach may be to apply ray-tracing algorithms with a publicly-available game engine. If successful, the project will allow researchers (and the public) to better experience how a contrail forms, develops, and sublimates - and to understand what the different contrail features they see from the ground actually mean."}, {"id": "SE05", "title": "Speeding up Contrail Simulation", "supervisor": "Eastham, Sebastian Dr", "space": false, "bothTerms": false, "categories": ["Computational"], "skills": ["APCEMM", "C++"], "description": "The net climate impacts of the aerospace sector are dominated by CO2, nitrogen oxides, and condensation trails (contrails). Of these three factors, contrails are the least well understood - in part due to the difficulty of accurately simulating their behaviour and impacts. This project will seek to improve the performance and accuracy of the contrail model APCEMM, specifically by investigating its (non-)convergence with respect to ice crystal radius resolution, time step length, and spatial resolution. In this project you will learn to install, run, and modify the C++-based APCEMM contrail simulator; you will investigate convergence of the solution with respect to key simulation parameters; and you will quantify the degree to which the solution and its convergence vary with changes in meteorological and aircraft parameters. Success of the project will be defined by achieving at least a 35% improvement in runtime, verifying that any changes in integral quantities relative to a reference implementation are either less than 5% or justified based on improvements in the underlying science."}, {"id": "SE06", "title": "CFD of Rocket Exhaust", "supervisor": "Eastham, Sebastian Dr", "space": true, "bothTerms": false, "categories": ["Computational", "Numerical"], "skills": ["CFD", "PyFR"], "description": "The number of launch vehicles is increasing rapidly year by year, but very little is known regarding the emissions associated with these launches. A specific challenge is that there is very little observational data available, and there are few open-source options available which model the exhaust plume. This makes quantifying the emissions (and therefore environmental impacts) from launches challenging. One of the key limitations is the lack of open-source data on the temperature distribution - and therefore chemical behaviour - of the plume.\nThis project aims to fill that gap by performing a series of open-source simulations of the flow in a typical launch vehicle exhaust plume. You will need to familiarise yourself with an appropriate CFD package such as PyFR, develop meshes and boundary conditions relevant to recent rocket launches, and execute high-resolution 2D and/or 3D simulations. Results will need to be compared against literature results and, where possible, observations which may become available during the course of the project."}, {"id": "SE07", "title": "Novel Analytical Solutions for Contrail Evolution", "supervisor": "Eastham, Sebastian Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Python"], "description": "Condensation trails (contrails) are thought to be a significant contributor to aviation's climate impacts, but predicting their evolution over time faces a challenge of scales. Over 24 hours a single contrail can spread from a width of a few meters up to tens or hundreds of kilometers, with the behaviour dictated by complex microphysical relations which can be expensive to accurately represent in computational models. With millions of kilometres of contrail formed every day, this poses a significant challenge. It is thus far not clear how to simplify models of contrail evolution without fatally compromising their accuracy.\nIn this project, you will seek to define a new, analytical model of contrail formation. You will need to familiarise yourself with both the theory and practice of ice cloud physics and broader contrail modelling, at scales from single ice crystals up to the global atmosphere. A successful analytical model could dramatically accelerate efforts to understand and mitigate one of aviation's largest climate impacts."}, {"id": "SE08", "title": "Stratospheric Aerosol Injection and Chemistry", "supervisor": "Eastham, Sebastian Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical"], "skills": [], "description": "With energy consumption outpacing efficiency improvements, climate change continues to grow and is projected to continue doing so for the foreseeable future. Alongside mitigation, climate interventions such as stratospheric aerosol injection (SAI) are therefore becoming more heavily scrutinised as real possibilities which may be able to help mitigate some of the worst impacts of climate change while carbon emissions are drawn down. Most assessments of SAI, however, neglect the role that background chemistry - and the emissions from aircraft exhaust - might have in mitigating or enhancing the effectiveness and side effects of SAI.\nThis project will be dedicated to evaluating the effect that background chemistry and deployment platform emissions might have on the environmental effects of SAI. You will either develop a representation of the aircraft emissions plume or apply a global-scale model of atmospheric chemistry to evaluate these impacts, with a focus on a) the role of aircraft nitrogen oxides and b) the effect of background emissions on the development of the stratospheric aerosol. This project has the potential to inform ongoing scientific and political debate regarding the risks of such an unprecedented intervention."}, {"id": "UF01", "title": "Exploiting Natural Dynamics for Efficient Bio-Inspired Motion", "supervisor": "Fasel, Urban Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental"], "skills": ["CAD"], "description": "Throughout nature, many different systems, from human walking to cheetah sprinting, achieve remarkable energy efficiency by exploiting their natural dynamics. Instead of relying on high-gain control to suppress nonlinearities, these systems leverage passive dynamics and compliance to produce efficient, repeatable motion.\nIn this project, you will explore how such principles can be applied to engineered systems. You will work with an existing hardware platform designed to benchmark walking robots. The project may involve testing and comparing control strategies such as Model Predictive Control (MPC), Hybrid Zero Dynamics (HZD), and Zero Moment Point (ZMP), as well as incorporating compliant elements (e.g. springs or other flexible components) to enhance energy efficiency.\nThere is also scope to develop a computational pipeline for design optimisation, depending on your interests.\nThis project is well suited to students interested in control theory, dynamical systems, and robotics. Familiarity with CAD is recommended.\nDesigning a system to exhibit favorable natural dynamics: https://ieeexplore.ieee.org/stamp/stamp.jsp?arnumber=8710301&tag=1"}, {"id": "UF02", "title": "Robust Co-Design for Aerial Robots", "supervisor": "Fasel, Urban Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Computational", "Numerical", "Theoretical"], "skills": [], "description": "Designing autonomous aerial robots typically separates physical design (e.g. wing shape) from control. Co-design brings these together, enabling better-performing and more efficient systems.\nIn this project, you will work on improving a recently developed robust co-design framework for agile fixed-wing aerial robots that accounts for uncertainty and wind disturbances during optimisation. The current approach relies on trajectory planning combined with Monte Carlo simulations and LQR feedback control, which is computationally expensive and limits scalability.\nYour goal will be to investigate more efficient alternatives, such as differential flatness-based trajectory planning and dynamic tube Model Predictive Control (MPC), and evaluate their performance within the co-design framework.\nThis project is ideal for students interested in optimisation, control theory, and autonomous systems. Some familiarity with advanced control methods is recommended.\nRobust co-design: https://arxiv.org/pdf/2603.11130 Differential flatness: https://ieeexplore.ieee.org/stamp/stamp.jsp?arnumber=10224280 Dynamic tube MPC: https://arxiv.org/abs/1907.06553"}, {"id": "UF03", "title": "Design of Adaptive Wings for Agile Aerial Robots", "supervisor": "Fasel, Urban Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental"], "skills": ["CAD"], "description": "Avian-inspired morphing wings offer a promising way to improve the efficiency and manoeuvrability of autonomous aerial vehicles. Birds, for example, actively change their wing shape to hover in strong winds, respond rapidly to disturbances, and perform highly agile manoeuvres.\nIn this project, you will explore how similar capabilities can be achieved in engineered systems. Building on an existing indoor fixed-wing glider platform, you will design and prototype morphing wing mechanisms and develop control strategies to enable active, bird-like shape adaptation during flight. The resulting designs will be implemented and tested on the indoor glider.\nThis project combines wing design, control, and experimentation, and is well suited to students interested in aerial robotics and optimisation. Familiarity with CAD and an interest in flight testing are recommended.\nAvian-inspired morphing wings: https://www.sciencedirect.com/science/article/pii/S0376042122000173"}, {"id": "UF04", "title": "Co-Design for Wind-Resilient Lighter-Than-Air Systems", "supervisor": "Fasel, Urban Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental", "Literature"], "skills": [], "description": "Lighter-than-air (LTA) robots, such as blimps, are inherently energy-efficient and safe, making them attractive for indoor and urban applications. However, their low airspeed makes them highly sensitive to wind disturbances, creating a significant gap between simulated performance and real-world behaviour.\nIn this project, you will investigate how co-design optimisation can be used to improve the real-world robustness of LTA systems. Rather than developing models from scratch, you will build on existing LTA platforms, models, and controllers, and focus on bridging the gap between simulation and hardware.\nThe project will involve evaluating and refining optimisation strategies under realistic wind disturbances, and potentially validating results through experiments on a physical LTA platform. A key objective is to understand how design and control choices transfer from simulation to real-world performance.\nThis project is ideal for students interested in robotics experimentation, control, and optimisation. It will involve a combination of simulation and hands-on testing."}, {"id": "UF05", "title": "Multi-Agent Co-Design Optimisation for Lighter-Than-Air Systems", "supervisor": "Fasel, Urban Dr", "space": false, "bothTerms": true, "categories": ["Computational", "Design", "Numerical", "Theoretical"], "skills": [], "description": "Lighter-than-air (LTA) vehicles, such as blimps and balloon-based robots, offer a safe and energy-efficient alternative for urban aerial applications. However, their low airspeed makes them highly sensitive to wind disturbances, posing significant challenges for reliable operation in urban environments.\nIn this project, you will develop multi-agent co-design optimisation approaches to LTA systems. The goal is to jointly optimise vehicle design and control strategies for fleets of aerial robots operating in urban conditions. Key challenges include robustness to environmental disturbances, coordination between multiple agents, and scalability of the optimisation framework.\nDepending on your interests, the project may involve developing simplified models of LTA dynamics, implementing multi-agent control strategies, or incorporating realistic wind and urban environment effects into the optimisation process.\nThis project is well suited to students interested in optimisation, control, and autonomous systems. Experience in aerial or multi-agent robotics is recommended.\nCo-design for safe multi-agent navigation: https://arxiv.org/pdf/2604.06972"}, {"id": "IF01", "title": "Flow Around a Kirigami Sheet", "supervisor": "Fumarola, Isabella Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental", "Experimental: Ready-Made Experiment", "Literature"], "skills": ["Wind Tunnel"], "description": "A Kirigami, which literally means \u201cpaper with cuts,\u201d consists of a thin sheet of material featuring cuts and creases that enable them to adopt complex three-dimensional shapes when subjected to external forces. In recent years, kirigami structures have attracted significant attention across various engineering fields, with many potential applications still to be explored.\nOne particularly promising area is flow control. When placed in a fluid flow, the kirigami structures can deform in response to the flow conditions, generating a range of wake patterns. This adaptability makes them especially attractive for passive flow control applications.\nIn this project, building on the analysis of volumetric PTV measurements of the wake behind different existing kirigami configurations (https://doi.org/10.1016/j.eml.2024.102198), a new series of wind tunnel experiments will be designed and conducted. The study will focus on two main aspects: (i) characterising the fluid\u2013structure interaction (FSI) governing kirigami deployment in air and comparing it with previous experiments conducted in water, and (ii) investigating the complex wake dynamics generated downstream of the kirigami structures."}, {"id": "IF02", "title": "Aerodynamics of a Boxfish", "supervisor": "Fumarola, Isabella Dr", "space": false, "bothTerms": true, "categories": ["Analysis", "Design", "Experimental", "Literature"], "skills": ["Aerodynamics"], "description": "The boxfish is a common tropical species that inhabits shallow waters. It is characterised by a distinctive bluff body with a large cross-sectional area, in contrast to the streamlined shapes typical of most fish. Despite this, it exhibits remarkable hydrodynamic performance.\nThese features make the boxfish an interesting subject for the study of drag in bluff bodies.\nPart of its efficiency appears to be linked to the vortical structures that develop along the edges of its box-like geometry (https://hal.science/hal-03654472v1).\nIn this project, a model of a boxfish, based on a laser scan of a real specimen, will be 3D-printed and instrumented with pressure taps. Pressure and velocity measurements will be conducted to fully characterise the flow field and its temporal evolution, with the aim of uncovering new insights into this complex aerodynamic problem."}, {"id": "IF03", "title": "Travelling Surface Waves for Turbulent Skin-Friction Reduction", "supervisor": "Fumarola, Isabella Dr", "space": false, "bothTerms": true, "categories": ["Design", "Experimental", "Experimental: Structures"], "skills": ["Wind Tunnel"], "description": "Generating travelling surface waves beneath a turbulent boundary layer is one of the most promising techniques for reducing turbulent skin friction. However, several key questions remain regarding the effectiveness of this mechanism at high Reynolds numbers, representative of flight conditions. Recent work carried out at Melbourne suggests the existence of a parameter space suitable for operation in this regime (DOI: https://doi.org/10.1017/jfm.2023.498).\nAnother major challenge lies in the practical generation of spanwise velocity waves at the wall. To address this, experiments have been conducted over several years using a silicone skin deformed by a kagome lattice across different flow regimes (https://link.springer.com/article/10.1007/s10494-018-9926-2;https://link.springer.com/article/10.1007/s10494-024-00531-9). While this approach offers significant flexibility in laboratory settings, it remains too fragile for realistic applications.\nWe are currently exploting the use of engineered metamaterials (artificial materials with tailored properties, such as spatially varying density and bulk modulus) to generate two-dimensional surface acoustic waves. These are particularly suited to higher Reynolds number conditions, where wave amplitudes are small, \ud835\udcaa(mm), and frequencies are high, \ud835\udcaa(kHz).\nThe design phase, involving topology optimisation of the metamaterial microstructure for prescribed forcing amplitudes and frequencies, has been completed. The next stage of the project will focus on manufacturing a prototype and conducting bench-top experiments to characterise its structural response prior to wind tunnel testing."}, {"id": "IF04", "title": "Control System for a Magnetic Suspension Balance System (MSBS)", "supervisor": "Fumarola, Isabella Dr", "space": true, "bothTerms": true, "categories": ["Design", "Experimental", "Literature"], "skills": ["Control Systems", "LabVIEW", "Wind Tunnel"], "description": "The Magnetic Suspension Balance System (MSBS) is a force measurement system for wind tunnel applications based on the magnetic levitation of the test model. It provides a unique opportunity to perform sting-free measurements of time-dependent aerodynamic forces acting on the model.\nBy embedding permanent magnets within the model and controlling the magnetic field generated by external coils, it is also possible to actively adjust the model position. This enables experiments on spinning models or configurations undergoing complex prescribed motions within the same facility.\nAt Imperial College London, a new MSBS for low-speed applications is currently under development. The project is in the design phase, with a one-degree-of-freedom (1-DoF) system expected to become available soon.\nThis project will focus on the development of control algorithms for model positioning, which are a critical component of the feedback loop used to regulate the coil currents and, in turn, infer the aerodynamic forces. Different machine vision approaches will be explored for real-time position tracking. The 1-DoF system will be used to test and validate the control strategies, while a preliminary feasibility study will be conducted for a full 6-DoF implementation.\nFurther readings: https://doi.org/10.1109/TIM.2025.3629858"}, {"id": "LF01", "title": "Physics-Informed Data-Driven Flow Construction from Particle Tracks", "supervisor": "Fung, Lloyd Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Numerical"], "skills": ["CFD", "Data-driven", "JAX", "Julia", "Machine Learning", "PIV", "Python", "Turing.jl", "Waterlily.jl"], "description": "Particle Tracking Velocimetry (PTV) is a non-invasive optical technique that tracks the movement of microscopic tracer particles introduced into a fluid to quantify the flow field.\nUnlike Particle Image Velocimetry (PIV), an Eulerian technique that deduces local flow fields at fixed locations using cross-correlation, Particle Tracking Velocimetry (PTV) tracks particles in a Lagrangian framework to estimate flow velocity. The particle density employed in PTV for flow visualisation is frequently restricted by the tracking algorithm's capacity to monitor and distinguish individual particles in three-dimensional space from the two-dimensional images projected onto the image sensor. If the seeding density is too high, the algorithm will be unable to differentiate the particles. However, if it is too low, the signal may be insufficiently dense to derive an accurate flow measurement. Recent advancements, such as the Vortex-in-cell (VIC) approach, aim to address sparse observations by interpolating velocity across particles in space or time, utilising established physics, i.e., the Navier-Stokes equation, to interpolate the velocity field.\nWe propose that, rather than optimising for minimal discrepancies between the velocity field derived from PTV and the simulation, as done in the VIC method, we can simulate the particle trajectory with the flow and assimilate the particle tracking data by minimising the differences in particle trajectories between the measurements and the simulation. By utilising auto-differentiation in differentiable solvers like Waterlily.jl and the probabilistic programming framework Turing.jl, we can streamline our workflow, transforming a previously complicated endeavour into a rather straightforward script. Due to the considerable challenges associated with direct data assimilation in fully turbulent flow, we shall first deal with simpler problems, specifically the wake flow behind a bluff body at low Reynolds numbers.\nStudents undertaking this research do not require extensive knowledge of PIV or PTV; nonetheless, a solid comprehension of fluid dynamics and CFD will be beneficial. They will acquire knowledge on JULIA, automatic differentiation, and probabilistic programming during the project, which will be highly beneficial to students who are interested in a career in scientific machine learning. This project is programming-intensive and will necessitate students to acquire proficiency in a new programming language, JULIA."}, {"id": "LF02", "title": "Data-Driven Modeling of Micro-Plastic and Phytoplankton Sinking in a Tank", "supervisor": "Fung, Lloyd Dr", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Experimental: Ready-Made Experiment", "Theoretical"], "skills": ["Data-driven", "JAX", "MATLAB", "Machine Learning", "PySR", "Python", "SINDy"], "description": "Every year, humans generate hundreds of millions of tonnes of plastic waste, with around 20 million tonnes entering the ocean, where they may degrade into microplastics and harm the marine ecosystem. However, only a small portion of the 20 million tonnes have been spotted on the ocean\u2019s surface, raising questions about their whereabouts. On the other hand, phytoplankton in the ocean are responsible for half the carbon sequestration on earth. They sequester carbon by photosynthesis and then sink into the ocean deep. Hence, their average sinking rate directly dictates the rate of sequestration.\nPredicting the sinking trajectory of microplastics or phytoplankton in water can be treated as a simple drag problem in fluid dynamics, but the arbitrary and vast variety of densities, sizes, and shapes has made the problem intractable analytically and computationally. This project aims to relieve this difficulty by learning an empirical but interpretable equation for objects of arbitrary shape from a large amount of simulated data using recent advancements in symbolic regression and Bayesian-driven sparse regression, machine learning techniques that can recover interpretable equations from data.\nStudents embarking on this project will be expected to collect experiment data of the trajectory and flow around a sinking objects of arbitrary shape in a tank. They will then use the latest symbolic regression packages, such as Bayesian-SINDy or PySR, to learn a common model equation from the data. The project requires the student to be able to both conduct a simple experiment, collect data, and analyse the data using existing machine learning packages."}, {"id": "LF03", "title": "Inverting a Pole on a Cart to Benchmark Reinforcement and Active Symbolic Learning", "supervisor": "Fung, Lloyd Dr", "space": false, "bothTerms": false, "categories": ["Analysis", "Computational", "Experimental: Ready-Made Experiment", "Literature"], "skills": ["MATLAB", "Machine Learning", "PID", "PyTorch", "Python", "Reinforcement Learning", "SINDy"], "description": "The pendulum on a cart is a classical benchmarking task for reinforcement learning (RL). The problem's goal is for a learning algorithm to learn about the cart-pole system and control it through some actuation means, e.g., moving the cart left or right in this problem, to attain a goal, like inverting the pendulum in the cart-pole system. Classical RL techniques like soft actor-critic were demonstrated to be effective in performing this task, but the model learnt is not interpretable, putting doubt on its usability in real-world scenarios like flight control. In the meantime, traditional control strategies involve first identifying the system with a model and then manually designing a control algorithm based on the identified model, which is tedious and time-consuming.\nRecent advancement in automatic model identification of dynamics, such as SINDy, has offered an alternative approach that balances the interpretable model identification and the autonomy of modern machine learning approaches. However, the control strategy remains somewhat manual, as the system identification stage remains separate from the control stage. This project aims to combine the two stages into a streamlined and automated process to yield a completely automatic model discovery and control. Furthermore, we will explore the possibility of using an active learning strategy in (Bayesian-)SINDy to help the system explore state spaces that have not yet been quantified by the model, improving its data efficiency.\nStudents embarking on this project will gain experience in reinforcement learning and classical control strategies such as PID, MPC or LQR, as well as automatic model identification algorithms such as SINDy, Ensemble-SINDy and Bayesian-SINDy. The student is expected to be familiar with control theory and classical (open-loop and close-loop) feedback control, as well as concepts such as Lyapunov stability. If time allows, the student may also have the opportunity to implement their resulting control and learning algorithm in a real-world Cart Pole system built by previous student projects."}, {"id": "LF04", "title": "Complexity Scaling Law of Physics-Informed Neural Networks in Representing PDE Solutions", "supervisor": "Fung, Lloyd Dr", "space": false, "bothTerms": false, "categories": ["Computational", "Numerical", "Theoretical"], "skills": ["DNS", "Finite Element", "JAX", "Machine Learning", "Neural Networks", "Physics-Informed Neural Networks (PINNs)", "Python"], "description": "It is well known that some PDE solutions become more complex \u2014 i.e. requiring more degrees of freedom/memory to represent \u2014 as their parameters change. Most famously, the complexity of the solution to the Navier-Stokes equations scales with the Reynolds number ($Re$), due to the larger range of length scales that must be resolved as the Reynolds number increases. The implication of this result is that direct numerical simulation of the equations has a computational cost that scales with $Re^4$, rendering DNS impractical in many aeronautical applications.\nMeanwhile, Physics-Informed Neural Networks have been touted as a potentially breakthrough machine learning method that can improve the computational efficiency of solving PDEs. While much debate has centred on whether PINNs perform better than traditional Finite Element Methods (FEM), little attention has been paid to how the size of the neural network scales with the parameters in PDEs that control the complexity of the solution. While PINNs may not always perform better than FEM on small problems, the fact that neural networks can overcome the curse of dimensionality through their depth gives hope that PINNs might be better at compressing data with high degrees of freedom. The project aims to investigate this particular problem by demonstrating how the PINN representation of a PDE solution, upon training to a certain accuracy, scales with the parameters that control its complexity. The project is divided into two parts. In the first part, the student will train a standard NN to fit existing PDE solutions of increasing complexity, and observe the scaling law of the NN fit. Special techniques may be required to train such fits to numerical precision. In the second part, the student will learn how to train PINNs without a data loss term (also known as the NeuralPDE or Deep Galerkin Method), so as to remove the reliance on pre-existing data.\nStudents embarking on the project should have taken at least some machine learning modules, and have a basic understanding of neural networks and optimisation. Prior knowledge of JAX is preferable."}, {"id": "KG01", "title": "Transverse Correlation of Forces on a Circular Cylinder in an Atmospheric Boundary Layer (ABL)", "supervisor": "Gouder, Kevin Dr", "space": false, "bothTerms": true, "categories": ["Experimental"], "skills": ["Aerodynamics", "Wind Tunnel"], "description": "This project intends to answer questions about how a body in wind, a circular cylinder in this particular case, experiences wind loading when a) the oncoming flow is turbulent, and b) the oncoming flow is turbulent and there is a superimposed wind shear along the cylinder's central axis. Transverse (i.e. along the cylinder's central axis) 2-point correlations of measured turbulent velocity of the oncoming flow, in the absence of the cylinder, are made. In addition, then, 2-point correlations of measured forces on the cylinder, through integration of belts of pressure taps, are also made. Measurements better our understanding of loads from incident turbulent flows; widely-used quasi-steady theory makes an assumption that the corresponding velocity and force correlations are the same. This experimental aerodynamics project makes use of a slot in the 10x5 wind tunnel, set up with one of the Atmospheric Boundary Layers (ABL) already in the facility database. The loading behaviour is of extensive academic and industrial interest, while the 2-point velocity correlations are very valuable in an ongoing effort for better ABL modelling."}, {"id": "KG02", "title": "The Effect of Wind Shields on Bridge Flutter and Self-Excitation", "supervisor": "Gouder, Kevin Dr", "space": false, "bothTerms": true, "categories": ["Experimental"], "skills": ["Wind Tunnel"], "description": "This project investigates the effect of wind shields installed on bridge decks on the bridge's flutter speed and self-excitation response. Wind shields are installed as a wind mitigation device on bridges, sometimes post-bridge completion, completely altering the dynamic behaviour of the original deck. This has severe impacts on bridge safety and vehicle comfort. In this experiment, a section model of a bridge deck is mounted across the wind tunnel on a system of springs, giving the deck the scaled structural dynamic properties. Accelerometers and load cells already on the existing rig measure the deck response. Wind shields description varies across height, depth, porosity, slat-type... we will focus on a subset parameter systematic study, in discussion with an industrial partner with close association to the 10x5 Wind Tunnel. Data from this study contributes to and informs the next version of the design code, which to date does not address bridges with wind shields."}, {"id": "KG03", "title": "Boeing Common Research Model in High-Lift Configuration (CRM-HL)", "supervisor": "Gouder, Kevin Dr", "space": false, "bothTerms": true, "categories": ["Experimental"], "skills": ["CFD", "Wind Tunnel"], "description": "The CRM-HL is a global initiative being led by Boeing and NASA. A generic commercial transport aircraft with conventional high-lift system has been designed and the geometry has been made open source. The grand vision is that labs around the world would build and test the same common geometry provided, and make the data open access, for tunnel-tunnel and tunnel-CFD comparisons and validations. Data would improve our understanding of high-lift flow physics, and help establish and validate more advanced computational methods.\nIn collaboration with Boeing UK, we have started building a semi-span, 4% scale model for testing in the 10'x5' wind tunnel. The first round of projects have been tackling the conversion of the full-scale geometry into a wind tunnel model, installation of the model on a 6-axes balance and model motion system, and provision of symmetry plane boundary layer suction. The two projects now being offered will acquire and analyse direct load measurement and on-body / off-body flow data, and explore the effects that treatments of the symmetry plane (e.g. no treatment : where upstream tunnel floor boundary layer spillage onto the fuselage and wing leading edge is known to be detrimental; with peniche; without peniche; with boundary layer suction...) have on data reliability."}, {"id": "KG04", "title": "Addition of Complex Terrain to the Atmospheric Boundary Layer in the 10'X5' Large Test Section: Setup and Characterisation", "supervisor": "Gouder, Kevin Dr", "space": false, "bothTerms": true, "categories": ["Experimental"], "skills": ["Turbulence", "Wind Tunnel"], "description": "In a previous project, we set up and characterised a Marine Atmospheric Boundary Layer (ABL) in the 10'x5' wind tunnel larger test section. The Earth-normal distribution of the mean velocity, turbulence intensity, von Karman lengthscale, and spectrum were measured. We have also recently built a motorised turntable, and we are currently experimenting with a mini-wind farm of 6 instrumented wind turbines under coordinated control, with the marine ABL as inflow. This project builds upon these previous efforts. We will consider a wind farm in a coastal zone, or just off the coast in a hilly setting. We intend to place 3D-printed topographical models (e.g. hills, ridges, or cliffs) on the turntable, upstream of one or more of the instrumented wind turbines. The marine ABL will interact with the topography before it proceeds to interact with the wind turbines. We will study how the terrain-induced turbulence and speed-up effects (that will be characterised in this project) impact the structural loading and power output of the turbines (as measured using the existing instrumented wind turbines). This is critical in cases of micro-siting in hilly or mountainous regions."}, {"id": "KG05", "title": "Detection of Streaks from Sparse Measurements in Bypass Transition", "supervisor": "Gouder, Kevin Dr", "space": false, "bothTerms": true, "categories": ["Analysis"], "skills": ["Control Systems", "DNS", "Machine Learning", "Turbulence"], "description": "In the presence of a freestream flow with turbulence intensity exceeding approximately 1%, streaks form naturally and stochastically in the underlying, otherwise Blasius, boundary layer. Literature, such as JFM (2016) vol 801, pp 43-64, have aimed, through a Machine Learning (ML) framework, to identify the streaks that induce breakdown to turbulence in bypass transition, using data from Direct Numerical Simulation (DNS). Identifying streaks that are likely to cause bypass transition is important in a control strategy where turbulence needs to be delayed (e.g. maintaining a laminar flow over a gas turbine blade for longer). Streak identification could, in such an example, form part of a flow control system where the most dangerous (most likely to cause bypass transition) streaks are targeted and weakened before they become unstable. In the example from literature mentioned above, the input to the ML were geometric properties of streaks. In a physical experiment,\n1) sensing of streaks is likely to be limited to wall-based sensors (i.e. we do not have direct access to the streak properties away from the wall), and\n2) the physical size, and frequency response, of these sensors are likely to introduce spatial and temporal limitations, in contrast to DNS, where access to the time series everywhere in the flow is available. Therefore an experimental implementation of a streak detection technique needs to be able to make identifications from sparse data input. In this project, we will make use of an existing DNS database, and we will explore ways of detecting dangerous streaks solely from wall measurements, such as through, but not necessarily limited to ML training. We could then implement this strategy and observe the extent of success of the identification versus the DNS full data. The identification strategy could be implemented into a physical experiment in future projects."}, {"id": "EG01", "title": "Multifunctional Design & Analysis for Structural Power Composites in Defence", "supervisor": "Greenhalgh, Emile Prof", "space": true, "bothTerms": true, "categories": ["Analysis", "Design", "Theoretical"], "skills": ["Abaqus", "Composite", "MATLAB"], "description": "Background: To date, structural power studies have focussed on aerospace and automotive applications, but we want to explore other areas where we could potentially apply structural power composites. We feel that one such field is defence. We now have a good methodology for multifunctional design of structural power in a range of aerospace and automotive applications and want to apply these methodologies to defence.\nResearch question: What are the potential benefits, hurdles, performance targets and a route map for adoption of structural power in defence?"}, {"id": "EG02", "title": "Development of the Next Generation Structural Power Composites", "supervisor": "Greenhalgh, Emile Prof", "space": true, "bothTerms": true, "categories": ["Experimental"], "skills": ["Composite"], "description": "Background: Structural power composites has been recognised by the World Economic Forum as one of the key emerging technologies. The rewards of this technology are huge but there are some considerable technological challenges to be addressed. This is an open ended project focused on structural supercapacitors, and can be tailored to the particular interests of the student.\nFurther details of the technology can be found here (https://www.imperial.ac.uk/structural-power-composites/)"}, {"id": "EG03", "title": "Multifunctional Design for Structural Power in Robotics", "supervisor": "Greenhalgh, Emile Prof", "space": true, "bothTerms": false, "categories": ["Computational", "Design", "Numerical", "Theoretical"], "skills": ["Abaqus", "MATLAB"], "description": "Background: To date, structural power studies have focussed on aerospace and automotive applications, but we want to explore other areas where we could potentially apply structural power such as robotics. We now have a good methodology for multifunctional design of structural power in a range of aerospace and automotive applications and want to apply these methodologies to robotics. Research question: What are the potential benefits, hurdles, performance targets and a route map for adoption of structural power in robotics?"}, {"id": "EG04", "title": "Use of AI for Composite in-Service Failure Investigation", "supervisor": "Greenhalgh, Emile Prof", "space": true, "bothTerms": true, "categories": ["Analysis", "Computational", "Experimental", "Experimental: Ready-Made Experiment", "Numerical"], "skills": ["AI", "Composite", "Fracture"], "description": "This project will explore the application for AI to be used in the interpretation of composite fracture surfaces, and as a potential tool to improve in-service accident investigations. It will entail training software to interpret information about crack mode and growth direction from optical micrographs."}, {"id": "RH01", "title": "Topology Optimisation For Fluids", "supervisor": "Hewson, Robert Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Design", "Literature", "Numerical", "Theoretical"], "skills": ["JAX", "Python"], "description": "Topology optimisation for fluid flow usually represents solid regions using a bulk resistance term, most commonly Brinkman penalisation, on a fixed mesh. That is the standard approach in fluid topology optimisation. More recent work has also explored immersed-boundary and embedded-boundary methods, where walls are represented inside a non-body-fitted mesh rather than by remeshing the geometry.\nThis project will investigate a different idea using the discontinuous Galerkin (DG) method. In DG, neighbouring elements communicate through numerical fluxes on their shared faces.\nThe project will test whether a design variable can be used to smoothly change a face from behaving like a normal fluid interface to behaving like a no-slip wall. DG has already been used for fluid topology optimisation, but this direct flux-based wall interpolation appears to be much less explored than Brinkman-type methods.\nThe student will review the relevant literature, implement a simple 2D incompressible flow model, introduce a face-based design variable, and compare the resulting optimisation behaviour against a standard Brinkman formulation. The aim is to assess whether this DG-native approach can provide a simple and effective alternative for fluid topology optimisation."}, {"id": "RH02", "title": "Differentiable Thermo-Mechanical Modelling and Reduced-Order Distortion Prediction for Additive Manufacturing", "supervisor": "Hewson, Robert Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Design", "Numerical", "Theoretical"], "skills": ["JAX", "Python"], "description": "This project will develop a differentiable thermo-mechanical model for additive manufacturing using JAX-FEM, with a focus on efficient prediction of thermal distortion. The work will be based on a small-strain thermo-elastic formulation in which temperature changes induce thermal strain, which in turn generates stress and deformation due to mechanical constraints during layer-by-layer deposition.\nThe student will implement an incremental model in which each layer is activated sequentially and subjected to a prescribed temperature evolution. The governing equations will be solved to obtain the displacement field, allowing prediction of distortion and residual stress as the structure builds and cools. The emphasis will be on understanding how thermal strain acts as a driving term in the mechanical equilibrium problem, rather than being directly converted into displacement.\nBeyond the baseline model, the project will explore reduced-order approaches, particularly the inherent strain method, in which the full thermo-mechanical history is replaced by an equivalent strain field. The student will compare the full thermo-elastic simulation with this reduced model and assess its accuracy and computational efficiency.\nA key aspect of the project is the use of automatic differentiation within JAX-FEM. This enables gradient-based calibration of model parameters or inference of effective inherent strain fields from target deformation data. The student will investigate how sensitivities of distortion with respect to process parameters or strain assumptions can be computed and exploited.\nThe outcome will be a computational framework capable of predicting distortion in a simplified additive manufacturing setting, together with a critical comparison between high-fidelity and reduced-order approaches, and an assessment of the benefits of differentiable modelling for calibration and optimisation."}, {"id": "RH03", "title": "Topology Optimisation with Subtractive Manufacturing Constraints", "supervisor": "Hewson, Robert Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Design", "Numerical", "Theoretical"], "skills": ["Finite Element", "JAX", "Python"], "description": "Topology optimisation determines the optimal material layout within a design domain to maximise structural performance. However, most formulations produce complex geometries suited only to additive manufacturing. Subtractive processes such as milling, wire-EDM, waterjet cutting, remain the dominant industrial manufacturing route, offering superior surface quality, material integrity, and cost efficiency, yet impose fundamental geometric restrictions: material can only be removed via through-cuts from external faces. This project will develop a topology optimisation framework where the geometry is constrained to be realisable by subtractive manufacturing. Cut profiles are defined by 2D fields on each workpiece face, extruded along the face-normal direction; material survives only where all cuts retain it, guaranteeing manufacturability by construction. Smooth projection with continuation drives designs toward crisp boundaries.\nThe project will implement and verify the subtractive parameterisation within a finite element framework, solve benchmark structural problems (cantilever, MBB beam, L-bracket), and quantify the stiffness penalty relative to unconstrained designs. Extensions include investigating the effect of cutting direction (axis-aligned vs. diagonal), multiple load cases, and stress constraints.\nThe project combines structural mechanics, finite element analysis, and gradient-based optimisation using an existing Python codebase."}, {"id": "RH04", "title": "Project Vortex Cell - Cell Design", "supervisor": "Hewson, Robert Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Design", "Numerical", "Theoretical"], "skills": ["JAX", "Python"], "description": "This project focuses on the aerodynamic design optimisation of a wing profile incorporating a vortex cell, with the objective of achieving and maintaining a stable dividing streamline across the cavity opening. The dividing streamline effectively acts as a virtual moving wall, reducing downstream separation and improving aerodynamic performance, but only when the cavity geometry and flow conditions are carefully matched. The project will formulate a two-dimensional optimisation problem in which the airfoil shape and cavity geometry are parameterised and adjusted to satisfy flow constraints derived from high-Reynolds-number theory.\nAn adjoint-based framework will be used to compute sensitivities of aerodynamic objectives such as lift-to-drag ratio, while enforcing constraints on the stability and position of the trapped vortex. The project may also explore control co-design, where steady or distributed suction is introduced as an additional design variable to stabilise the vortex, reflecting the strong dependence of performance on active control observed in experiments. Sensitivity analysis will be used to understand robustness with respect to incidence and upstream boundary-layer conditions. The outcome will be a quantitative assessment of how tightly coupled geometry and control must be to realise performance gains, and whether a practical design space exists for stable, high-performance vortex-cell airfoils."}, {"id": "RH05", "title": "Project Vortex Cell - Aircraft Integration", "supervisor": "Hewson, Robert Prof", "space": true, "bothTerms": false, "categories": ["Analysis", "Computational", "Design", "Numerical", "Theoretical"], "skills": ["JAX", "Python"], "description": "This project investigates whether vortex-cell-enabled thick wings could make hydrogen storage within the wing a viable alternative to conventional fuselage-based storage. Hydrogen aircraft concepts typically assume bulky tanks in the fuselage, driving larger airframes and reducing overall efficiency. This project challenges that assumption by exploring whether thicker wings, augmented by vortex cells to delay separation, could offset the aerodynamic penalties and enable distributed fuel storage.\nThe student will develop a conceptual aircraft design framework linking wing thickness, aerodynamic efficiency, structural volume and fuel storage requirements. Using simplified aerodynamic models informed by vortex-cell behaviour, including the limited operating envelope and sensitivity to control and flow conditions, the project will quantify trade-offs between increased drag from thicker wings and reduced fuselage penalties. Parametric studies will explore whether a \u201csweet spot\u201d exists where overall aircraft performance improves, or whether the penalties associated with vortex-cell operation, including control power and instability, outweigh the benefits.\nThe outcome will be a system-level assessment of feasibility, providing clear numerical evidence on whether embedding hydrogen storage within vortex-cell-enabled wings is a viable design direction or fundamentally limited by aerodynamic and operational constraints."}, {"id": "AK01", "title": "Numerical Modelling of a Novel Plasma Lens Using Negative Ions", "supervisor": "Knoll, Aaron Dr", "space": true, "bothTerms": false, "categories": ["Computational", "Theoretical"], "skills": ["Julia", "PlasmaSim"], "description": "A plasma lens is a device that focuses a beam of charged particles using a plasma column. Such devices have applications in particle accelerators and for medical applications. The working principle to create a region of trapped negatively charged particles, which exert a radial force on a beam of positively charged particles passing through them. The effect i
